<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN DIARY - Firebase Debug</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; --card: #ffffff; --today: #fff9c4; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }
        #auth-container { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #auth-error { color: #d32f2f; font-size: 0.85rem; margin-top: 15px; background: #ffebee; padding: 10px; border-radius: 8px; display: none; text-align: left; white-space: pre-wrap; }
        .btn { width: 100%; padding: 14px; border-radius: 25px; border: none; margin-top: 10px; }
        .btn-save { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-box">
        <h2 style="color:var(--primary)">RUN DIARY</h2>
        <input type="email" id="email" placeholder="メールアドレス">
        <input type="password" id="password" placeholder="パスワード(6文字以上)">
        <button id="auth-btn" class="btn btn-save">ログイン / 新規登録</button>
        <div id="auth-error"></div>
    </div>
</div>

<div id="app-container" class="container" style="display:none;">
    <button onclick="saveDiary()">テスト保存</button>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyC0VeVEdEpcRP8dOvJokXq0lg2gBzloVls",
    authDomain: "runnikki-a7d37.firebaseapp.com",
    projectId: "runnikki-a7d37"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let selectedDateStr = new Date().toISOString().split('T')[0];

const authBtn = document.getElementById('auth-btn');
const errDiv = document.getElementById('auth-error');

authBtn.addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    errDiv.style.display = 'none';

    if (!email || !password || password.length < 6) {
        showError("メールと6文字以上のパスワードを入力してください");
        return;
    }

    authBtn.innerText = "通信中...";
    authBtn.disabled = true;

    try {
        await auth.signInWithEmailAndPassword(email, password);
    } catch (error) {
        if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-login-credentials') {
            try {
                await auth.createUserWithEmailAndPassword(email, password);
            } catch (regErr) {
                showError("登録失敗: " + regErr.message);
            }
        } else {
            showError("ログイン失敗: " + error.message);
        }
    }

    authBtn.innerText = "ログイン / 新規登録";
    authBtn.disabled = false;
});

function showError(msg) {
    errDiv.innerText = msg;
    errDiv.style.display = 'block';
}

auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';
    } else {
        document.getElementById('auth-container').style.display = 'flex';
        document.getElementById('app-container').style.display = 'none';
    }
});

function convertWeatherCode(code) {
    if (code === 0) return "☀️";
    if (code <= 3) return "🌤";
    if (code <= 48) return "☁️";
    if (code <= 67) return "🌧";
    return "☁️";
}

async function saveDiary() {
    let w = "☁️", t = "--°C";

    try {
        const startTime = "12:00";
        const [hour, minute] = startTime.split(":");
        const targetDateTime = `${selectedDateStr}T${hour}:${minute}`;

        const today = new Date().toISOString().split('T')[0];

        if (selectedDateStr <= today) {
            const pos = await new Promise((res, rej) =>
                navigator.geolocation.getCurrentPosition(res, rej)
            );

            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;

            const res = await fetch(
                `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${selectedDateStr}&end_date=${selectedDateStr}&hourly=temperature_2m,weathercode`
            );

            const data = await res.json();
            const index = data.hourly.time.findIndex(t => t === targetDateTime);

            if (index !== -1) {
                t = Math.round(data.hourly.temperature_2m[index]) + "°C";
                w = convertWeatherCode(data.hourly.weathercode[index]);
            }
        }

    } catch (e) {}

    await db.collection('users').doc(auth.currentUser.uid)
        .collection('diaries').doc(selectedDateStr)
        .set({ date: selectedDateStr, weather: w, temp: t });

    alert("保存完了");
}
</script>

</body>
</html>
