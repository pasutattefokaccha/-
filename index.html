<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN DIARY - Firebase Debug</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; --card: #ffffff; --today: #fff9c4; --danger: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }
        
        /* ログイン画面 */
        #auth-container { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        #auth-error { 
            color: #d32f2f; 
            font-size: 0.85rem; 
            margin-top: 15px; 
            background: #ffebee; 
            padding: 10px; 
            border-radius: 8px; 
            display: none; 
            text-align: left;
            word-break: break-all;
            white-space: pre-wrap;
        }

        .monthly-stats { background: var(--primary); color: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; text-align: center; }
        .monthly-stats-value { font-size: 1.8rem; font-weight: bold; }

        .cal-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-radius: 15px 15px 0 0; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); background: white; border-radius: 0 0 15px 15px; border-top: 1px solid #eee; overflow: hidden; }
        .day-label { text-align: center; font-size: 0.7rem; color: #888; padding: 10px 0; }
        .day { min-height: 85px; padding: 5px; border-right: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .day-num { font-size: 0.8rem; font-weight: bold; }
        .today { background: var(--today) !important; }
        
        .cal-record { font-size: 0.6rem; margin-top: 4px; padding: 2px 4px; border-radius: 4px; }
        .bg-jog { background-color: #e3f2fd; color: #1565c0; border-left: 3px solid #1565c0; }
        .bg-interval { background-color: #ffebee; color: #c62828; border-left: 3px solid #c62828; }
        .bg-tt { background-color: #fffde7; color: #f9a825; border-left: 3px solid #f9a825; }
        .bg-pace { background-color: #f1f8e9; color: #2e7d32; border-left: 3px solid #2e7d32; }
        .bg-bu { background-color: #f3e5f5; color: #7b1fa2; border-left: 3px solid #7b1fa2; }
        .bg-rest { background-color: #eeeeee; color: #616161; }
        .bg-other { background-color: #e0f7fa; color: #00838f; }

        .search-fab { position: fixed; right: 20px; bottom: 20px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 30px; display: none; justify-content: center; align-items: center; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: none; z-index: 90; }

        #entry-modal, #search-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; width: 90%; max-width: 450px; padding: 20px; border-radius: 20px; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 14px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-save { background: var(--primary); color: white; }
        .btn-cancel { background: #eee; color: #666; }
        .btn-delete { background: none; color: var(--danger); font-size: 0.9rem; margin-top: 20px; }
        .hidden { display: none !important; }
        .dynamic-section { background: #f9f9f9; padding: 10px; border-radius: 10px; margin-top: 10px; border-left: 4px solid var(--primary); }
        .result-box { margin-top: 10px; padding: 10px; background: #eef6ff; border-radius: 10px; font-size: 0.9rem; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-box">
        <h2 style="color:var(--primary)">RUN DIARY</h2>
        <input type="email" id="email" placeholder="メールアドレス">
        <input type="password" id="password" placeholder="パスワード(6文字以上)">
        <button id="auth-btn" class="btn btn-save">ログイン / 新規登録</button>
        <div id="auth-error"></div>
    </div>
</div>

<div id="app-container" class="container hidden">
    <div class="monthly-stats">
        <div id="stats-month-label">今月の合計距離</div>
        <div class="monthly-stats-value"><span id="month-total-val">0.00</span> <small>km</small></div>
    </div>
    <div class="cal-header">
        <button onclick="changeMonth(-1)">＜</button>
        <div id="current-month-display"></div>
        <button onclick="changeMonth(1)">＞</button>
    </div>
    <div class="calendar" id="calendar-grid"></div>
    <button id="logout-btn" style="width:100%; margin-top:20px; border:none; background:none; color:#999; font-size:0.8rem;">ログアウト</button>
</div>

<button class="search-fab" id="fab-search" onclick="openSearch()">🔍</button>

<div id="entry-modal">
    <div class="modal-content">
        <h3 id="modal-date-title"></h3>
        <label>走行時間</label>
        <div style="display:flex; gap:10px;"><input type="time" id="start-time"><span>〜</span><input type="time" id="end-time"></div>
        <label>メニュー</label>
        <select id="menu-select" onchange="toggleMenuFields()">
            <option value="ジョグ">ジョグ</option>
            <option value="インターバル">インターバル</option>
            <option value="タイムトライアル">タイムトライアル</option>
            <option value="ペース走">ペース走</option>
            <option value="ビルドアップ">ビルドアップ</option>
            <option value="レスト">レスト</option>
            <option value="その他">その他</option>
        </select>
        <div id="fields-jog" class="dynamic-section">
            <input type="number" id="jog-dist" step="0.01" placeholder="距離(km)" oninput="calcJog()">
            <input type="number" id="jog-min" placeholder="時間(分)" oninput="calcJog()">
            <div id="jog-res" class="result-box">平均ペース: --:--/km</div>
        </div>
        <div id="fields-int" class="dynamic-section" style="display:none;">
            <input type="number" id="int-dist" step="0.01" placeholder="1本の距離(km)" oninput="calcInt()">
            <input type="number" id="int-count" placeholder="本数" oninput="calcInt()">
            <input type="text" id="int-rest" placeholder="つなぎの内容">
            <div id="int-res" class="result-box">走行合計: 0.00 km</div>
        </div>
        <div id="fields-tt" class="dynamic-section" style="display:none;">
            <input type="number" id="tt-dist-km" step="0.01" placeholder="距離(km)">
            <div style="display:flex; gap:5px;">
                <input type="number" id="tt-min" placeholder="分">
                <input type="number" id="tt-sec" placeholder="秒">
                <input type="number" id="tt-msec" placeholder="秒(少数)">
            </div>
        </div>
        <div id="fields-pace" class="dynamic-section" style="display:none;">
            <input type="number" id="pace-dist" placeholder="距離(km)">
            <input type="text" id="pace-val" placeholder="設定ペース">
        </div>
        <div id="fields-bu" class="dynamic-section" style="display:none;">
            <input type="number" id="bu-dist" placeholder="距離(km)">
            <input type="text" id="bu-start" placeholder="開始ペース">
            <input type="text" id="bu-end" placeholder="終了ペース">
        </div>
        <div id="fields-other" class="dynamic-section" style="display:none;">
            <input type="number" id="other-dist" placeholder="距離(km)">
            <input type="text" id="other-menu-name" placeholder="メニュー名">
            <textarea id="other-content" placeholder="内容" style="height:60px;"></textarea>
        </div>
        <button class="btn btn-save" id="save-btn" onclick="saveDiary()">日誌を保存（天気取得）</button>
        <button class="btn btn-cancel" onclick="closeModal()">キャンセル</button>
        <button class="btn btn-delete" id="delete-btn" onclick="deleteDiary()" style="display:none;">この日の記録を削除</button>
    </div>
</div>

<div id="search-modal">
    <div class="modal-content">
        <h3>TT記録検索</h3>
        <input type="number" id="search-query" step="0.01" placeholder="検索距離(km)" oninput="searchTT()">
        <div id="search-results" style="margin-top:20px; max-height:300px; overflow-y:auto;"></div>
        <button class="btn btn-cancel" onclick="closeSearch()">閉じる</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC0VeVEdEpcRP8dOvJokXq0lg2gBzloVls",
        authDomain: "runnikki-a7d37.firebaseapp.com",
        projectId: "runnikki-a7d37",
        storageBucket: "runnikki-a7d37.firebasestorage.app",
        messagingSenderId: "623990853537",
        appId: "1:623990853537:web:68417f21002106b5c745e0"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentViewDate = new Date();
    let selectedDateStr = "";
    let cachedDiaries = [];

    const authBtn = document.getElementById('auth-btn');
    const errDiv = document.getElementById('auth-error');

    authBtn.addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        errDiv.style.display = 'none';
        
        if (!email || !password || password.length < 6) {
            showError("メールと6文字以上のパスワードを入力してください");
            return;
        }

        authBtn.innerText = "通信中...";
        authBtn.disabled = true;

        try {
            await auth.signInWithEmailAndPassword(email, password);
        } catch (error) {
            if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-login-credentials') {
                try {
                    await auth.createUserWithEmailAndPassword(email, password);
                } catch (regErr) {
                    showError(`【重要】Firebaseの設定を確認してください。\nコード: ${regErr.code}\n理由: Authenticationで「メール/パスワード」が有効になっていない可能性があります。`);
                }
            } else {
                showError(`エラー: ${error.code}\n${error.message}`);
            }
        }
        authBtn.innerText = "ログイン / 新規登録";
        authBtn.disabled = false;
    });

    function showError(msg) {
        errDiv.innerText = msg;
        errDiv.style.display = 'block';
    }

    auth.onAuthStateChanged(user => {
        const fab = document.getElementById('fab-search');
        if (user) {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            fab.style.display = 'flex';
            loadCloudData();
        } else {
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('app-container').classList.add('hidden');
            fab.style.display = 'none';
        }
    });

    async function loadCloudData() {
        const user = auth.currentUser;
        if(!user) return;
        try {
            const snap = await db.collection('users').doc(user.uid).collection('diaries').get();
            cachedDiaries = snap.docs.map(doc => doc.data());
            renderCalendar();
        } catch(e) { console.error(e); }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = "";
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        document.getElementById('current-month-display').innerText = `${year}年 ${month + 1}月`;
        ['日','月','火','水','木','金','土'].forEach(l => {
            const el = document.createElement('div'); el.className = 'day-label'; el.innerText = l; grid.appendChild(el);
        });
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
        let monthlyTotal = 0;
        for (let d = 1; d <= lastDate; d++) {
            const dateStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
            const dayEl = document.createElement('div'); dayEl.className = 'day';
            if (new Date().toISOString().split('T')[0] === dateStr) dayEl.classList.add('today');
            
            const dayNumEl = document.createElement('div');
            dayNumEl.className = 'day-num';
            dayNumEl.innerText = d;
            dayEl.appendChild(dayNumEl);

            const record = cachedDiaries.find(item => item.date === dateStr);
            if (record) {
                const recordEl = document.createElement('div');
                recordEl.className = `cal-record ${getColorClass(record.type)}`;
                recordEl.style.pointerEvents = 'none';
                recordEl.innerHTML = `<span style="font-weight:bold">${record.dist}k</span>`;
                dayEl.appendChild(recordEl);
                monthlyTotal += parseFloat(record.dist);
            }
            dayEl.onclick = () => openModal(dateStr);
            grid.appendChild(dayEl);
        }
        document.getElementById('month-total-val').innerText = monthlyTotal.toFixed(2);
    }

    function toggleMenuFields() {
        const menu = document.getElementById('menu-select').value;
        ['fields-jog', 'fields-int', 'fields-tt', 'fields-pace', 'fields-bu', 'fields-other'].forEach(id => document.getElementById(id).style.display = 'none');
        if(menu === 'ジョグ') document.getElementById('fields-jog').style.display = 'block';
        if(menu === 'インターバル' || menu === 'レスト') document.getElementById('fields-int').style.display = 'block';
        if(menu === 'タイムトライアル') document.getElementById('fields-tt').style.display = 'block';
        if(menu === 'ペース走') document.getElementById('fields-pace').style.display = 'block';
        if(menu === 'ビルドアップ') document.getElementById('fields-bu').style.display = 'block';
        if(menu === 'その他') document.getElementById('fields-other').style.display = 'block';
    }

    function calcJog() {
        const d = parseFloat(document.getElementById('jog-dist').value);
        const m = parseFloat(document.getElementById('jog-min').value);
        if(d > 0 && m > 0) {
            const paceSec = (m * 60) / d;
            const min = Math.floor(paceSec / 60);
            const sec = Math.round(paceSec % 60);
            document.getElementById('jog-res').innerText = `平均ペース: ${min}:${sec.toString().padStart(2,'0')}/km`;
        }
    }

    function calcInt() {
        const d = parseFloat(document.getElementById('int-dist').value) || 0;
        const c = parseFloat(document.getElementById('int-count').value) || 0;
        document.getElementById('int-res').innerText = `走行合計: ${(d * c).toFixed(2)} km`;
    }

    function getColorClass(type) {
        const classes = { 'ジョグ':'bg-jog', 'インターバル':'bg-interval', 'タイムトライアル':'bg-tt', 'ペース走':'bg-pace', 'ビルドアップ':'bg-bu', 'レスト':'bg-rest' };
        return classes[type] || 'bg-other';
    }

    function clearInputs() {
        document.querySelectorAll('#entry-modal input, #entry-modal textarea').forEach(el => el.value = "");
        document.getElementById('menu-select').value = "ジョグ";
        document.getElementById('jog-res').innerText = "平均ペース: --:--/km";
        document.getElementById('int-res').innerText = "走行合計: 0.00 km";
    }

    function openModal(dateStr) {
        selectedDateStr = dateStr;
        document.getElementById('modal-date-title').innerText = dateStr.replace(/-/g, '/');
        clearInputs();
        
        const record = cachedDiaries.find(item => item.date === dateStr);
        if (record) {
            document.getElementById('menu-select').value = record.type;
            if (record.type === 'ジョグ') {
                const detailParts = record.detail.match(/(\d+):(\d+)/); // ペースから逆算は難しいため入力値があれば望ましいが、今回は記録のみ
                document.getElementById('jog-dist').value = record.dist;
            } else if (record.type === 'タイムトライアル') {
                document.getElementById('tt-dist-km').value = record.dist;
                if(record.ttTime) {
                    const t = record.ttTime.split(/[:.]/);
                    document.getElementById('tt-min').value = t[0];
                    document.getElementById('tt-sec').value = t[1];
                    document.getElementById('tt-msec').value = t[2];
                }
            } else if (record.type === 'その他') {
                document.getElementById('other-dist').value = record.dist;
                document.getElementById('other-content').value = record.detail;
            }
            document.getElementById('delete-btn').style.display = 'block';
        } else {
            document.getElementById('delete-btn').style.display = 'none';
        }
        
        document.getElementById('entry-modal').style.display = 'block';
        toggleMenuFields();
    }

    function closeModal() { document.getElementById('entry-modal').style.display = 'none'; }
    function openSearch() { document.getElementById('search-modal').style.display = 'block'; }
    function closeSearch() { document.getElementById('search-modal').style.display = 'none'; }
    function changeMonth(diff) { currentViewDate.setMonth(currentViewDate.getMonth() + diff); renderCalendar(); }
    
    function searchTT() {
        const queryVal = parseFloat(document.getElementById('search-query').value);
        const resultsDiv = document.getElementById('search-results');
        const filtered = cachedDiaries.filter(d => d.type === 'タイムトライアル' && parseFloat(d.dist) === queryVal);
        resultsDiv.innerHTML = filtered.map(d => `<div style="padding:10px; border-bottom:1px solid #eee;">${d.date}: ${d.ttTime}</div>`).join('');
    }

    async function saveDiary() {
        const menuType = document.getElementById('menu-select').value;
        let dist = 0, detail = "", ttTime = "";
        if (menuType === 'ジョグ') {
            dist = parseFloat(document.getElementById('jog-dist').value);
            detail = document.getElementById('jog-res').innerText;
        } else if (menuType === 'インターバル' || menuType === 'レスト') {
            const d = parseFloat(document.getElementById('int-dist').value) || 0;
            const c = parseFloat(document.getElementById('int-count').value) || 0;
            dist = d * c;
            detail = `${d}k×${c}`;
        } else if (menuType === 'タイムトライアル') {
            dist = parseFloat(document.getElementById('tt-dist-km').value) || 0;
            ttTime = `${document.getElementById('tt-min').value}:${document.getElementById('tt-sec').value}.${document.getElementById('tt-msec').value}`;
            detail = `${dist}k TT [${ttTime}]`;
        } else if (menuType === 'ペース走') {
            dist = parseFloat(document.getElementById('pace-dist').value) || 0;
            detail = `ペース走: ${document.getElementById('pace-val').value}`;
        } else if (menuType === 'ビルドアップ') {
            dist = parseFloat(document.getElementById('bu-dist').value) || 0;
            detail = `BU: ${document.getElementById('bu-start').value}〜${document.getElementById('bu-end').value}`;
        } else if (menuType === 'その他') {
            dist = parseFloat(document.getElem
