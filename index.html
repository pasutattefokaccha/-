<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN LOG - GPS Auto Save</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --primary-color: #007AFF; --bg-color: #f4f7f9; --card-bg: #ffffff; }
        body { font-family: sans-serif; background: var(--bg-color); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* 集計表示 */
        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--primary-color); color: white; padding: 10px; border-radius: 12px; text-align: center; }
        .stat-value { font-size: 1.1em; font-weight: bold; }
        .stat-label { font-size: 0.7em; }

        #map { height: 250px; width: 100%; border-radius: 15px; margin-bottom: 20px; border: 2px solid #fff; }
        
        .form-group { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-gps { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 30px; border: none; font-weight: bold; font-size: 16px; }
        .start { background: #28a745; color: white; }
        .stop { background: #dc3545; color: white; }
        
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 0.9em; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .btn-save { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 30px; font-weight: bold; margin-top: 20px; font-size: 18px; }
        .log-item { background: white; padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 5px solid var(--primary-color); }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color:var(--primary-color); font-style:italic;">RUN LOG</h1>

    <div class="stats-container">
        <div class="stat-card"><div class="stat-label">週(km)</div><div id="stat-week" class="stat-value">0.0</div></div>
        <div class="stat-card"><div class="stat-label">月(km)</div><div id="stat-month" class="stat-value">0.0</div></div>
        <div class="stat-card"><div class="stat-label">累計(km)</div><div id="stat-total" class="stat-value">0.0</div></div>
    </div>

    <div id="map"></div>

    <div class="form-group">
        <button id="gpsBtn" class="btn-gps start" onclick="toggleGPS()">GPS計測開始</button>
        
        <label>走行距離 (km)</label>
        <input type="number" id="distance" step="0.01" placeholder="GPS停止で自動入力されます">

        <label>メニュー</label>
        <input type="text" id="menu" placeholder="例: 1000m x 5">

        <label>シューズ</label>
        <select id="shoe">
            <option>練習用シューズ</option>
            <option>厚底レーシング</option>
            <option>スパイク</option>
        </select>

        <button class="btn-save" onclick="saveLog()">練習を保存</button>
    </div>

    <div id="history"></div>
</div>

<script>
    let map, pathLine, watchId = null;
    let coordinates = [];
    let totalDistance = 0;

    function initMap() {
        map = L.map('map').setView([35.6812, 139.7671], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        pathLine = L.polyline([], {color: '#007AFF', weight: 6}).addTo(map);
    }
    initMap();

    function toggleGPS() {
        const btn = document.getElementById('gpsBtn');
        if (watchId === null) {
            if (!navigator.geolocation) return alert("GPS非対応です");
            coordinates = []; totalDistance = 0;
            pathLine.setLatLngs([]);
            watchId = navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                if (coordinates.length > 0) {
                    const last = coordinates[coordinates.length - 1];
                    totalDistance += calculateDistance(last[0], last[1], lat, lng);
                    // リアルタイムで入力欄に数値を反映
                    document.getElementById('distance').value = totalDistance.toFixed(2);
                }
                coordinates.push([lat, lng]);
                pathLine.addLatLng([lat, lng]);
                map.panTo([lat, lng]);
            }, null, { enableHighAccuracy: true });
            btn.innerText = "計測停止 (距離を確定)";
            btn.className = "btn-gps stop";
        } else {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
            btn.innerText = "GPS計測開始";
            btn.className = "btn-gps start";
        }
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function saveLog() {
        const log = {
            date: new Date().toLocaleDateString('sv-SE'), // YYYY-MM-DD
            distance: parseFloat(document.getElementById('distance').value) || 0,
            menu: document.getElementById('menu').value,
            shoe: document.getElementById('shoe').value
        };
        if(!log.menu) return alert("メニューを入力してください");

        let logs = JSON.parse(localStorage.getItem('runLogs')) || [];
        logs.unshift(log);
        localStorage.setItem('runLogs', JSON.stringify(logs));
        
        // リセット
        document.getElementById('distance').value = '';
        document.getElementById('menu').value = '';
        displayLogs();
    }

    function displayLogs() {
        const historyDiv = document.getElementById('history');
        const logs = JSON.parse(localStorage.getItem('runLogs')) || [];
        let total = 0, month = 0, week = 0;
        const now = new Date();
        const oneWeekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);

        historyDiv.innerHTML = '<h3>練習履歴</h3>';
        logs.forEach(log => {
            const d = parseFloat(log.distance);
            total += d;
            const logDate = new Date(log.date);
            if(logDate.getMonth() === now.getMonth()) month += d;
            if(logDate >= oneWeekAgo) week += d;

            const item = document.createElement('div');
            item.className = 'log-item';
            item.innerHTML = `<strong>${log.date}</strong> - ${log.shoe}<br>${log.menu}<br>🏃‍♂️ ${d.toFixed(2)}km`;
            historyDiv.appendChild(item);
        });
        document.getElementById('stat-total').innerText = total.toFixed(1);
        document.getElementById('stat-month').innerText = month.toFixed(1);
        document.getElementById('stat-week').innerText = week.toFixed(1);
    }
    window.onload = displayLogs;
</script>
</body>
</html>
