<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN DIARY - Direct Connection</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; --card: #ffffff; --today: #fff9c4; --danger: #ff3b30; --success: #2ecc71; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }
        
        #auth-container { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; }
        .auth-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .monthly-stats { background: var(--primary); color: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; text-align: center; }
        .monthly-stats-value { font-size: 1.8rem; font-weight: bold; }

        .cal-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-radius: 15px 15px 0 0; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); background: white; border-radius: 0 0 15px 15px; border-top: 1px solid #eee; overflow: hidden; }
        .day-label { text-align: center; font-size: 0.7rem; color: #888; padding: 10px 0; }
        .day { min-height: 85px; padding: 5px; border-right: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .day-num { font-size: 0.8rem; font-weight: bold; }
        .today { background: var(--today) !important; }
        
        .cal-record { font-size: 0.6rem; margin-top: 4px; padding: 2px 4px; border-radius: 4px; }
        .bg-jog { background-color: #e3f2fd; color: #1565c0; border-left: 3px solid #1565c0; }
        .bg-interval { background-color: #ffebee; color: #c62828; border-left: 3px solid #c62828; }
        .bg-tt { background-color: #fffde7; color: #f9a825; border-left: 3px solid #f9a825; }
        .bg-pace { background-color: #f1f8e9; color: #2e7d32; border-left: 3px solid #2e7d32; }
        .bg-bu { background-color: #f3e5f5; color: #7b1fa2; border-left: 3px solid #7b1fa2; }
        .bg-rest { background-color: #eeeeee; color: #616161; }
        .bg-other { background-color: #e0f7fa; color: #00838f; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; width: 90%; max-width: 450px; padding: 20px; border-radius: 20px; position: relative; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 14px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-login { background: var(--primary); color: white; }
        .btn-signup { background: #5856d6; color: white; }
        .btn-save { background: var(--success); color: white; }
        .btn-cancel { background: #eee; color: #666; }
        .hidden { display: none !important; }
        .dynamic-section { background: #f9f9f9; padding: 10px; border-radius: 10px; margin-top: 10px; border-left: 4px solid var(--primary); }
        .result-box { margin-top: 10px; padding: 10px; background: #eef6ff; border-radius: 10px; font-size: 0.9rem; font-weight: bold; color: var(--primary); }
        .search-fab { position: fixed; right: 20px; bottom: 20px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 30px; display: none; justify-content: center; align-items: center; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: none; z-index: 90; }
        #debug-log { font-size: 10px; color: red; margin-top: 10px; background: #ffebeb; padding: 5px; border-radius: 5px; width: 85%; max-width: 400px; display: block; word-break: break-all; }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-box">
        <h2 style="color:var(--primary)">RUN DIARY</h2>
        <input type="email" id="email" placeholder="メールアドレス" autocomplete="email">
        <input type="password" id="password" placeholder="パスワード" autocomplete="current-password">
        <button onclick="handleLogin()" class="btn btn-login">ログイン</button>
        <button onclick="handleSignup()" class="btn btn-signup">新規アカウント作成</button>
        <p id="auth-status-msg" style="font-size: 0.8rem; margin-top: 15px; color: #666;">状態: 待機中</p>
    </div>
    <div id="debug-log">デバッグ用: 準備中...</div>
</div>

<div id="app-container" class="container hidden">
    <div class="monthly-stats">
        <div id="stats-month-label">今月の合計距離</div>
        <div class="monthly-stats-value"><span id="month-total-val">0.00</span> <small>km</small></div>
    </div>
    <div class="cal-header">
        <button onclick="changeMonth(-1)">＜</button>
        <div id="current-month-display"></div>
        <button onclick="changeMonth(1)">＞</button>
    </div>
    <div class="calendar" id="calendar-grid"></div>
    <button id="logout-btn" onclick="auth.signOut()" style="width:100%; margin-top:20px; border:none; background:none; color:#999; font-size:0.8rem;">ログアウト</button>
</div>

<button class="search-fab" id="fab-search" onclick="openSearch()">🔍</button>

<div id="detail-modal" class="modal"><div class="modal-content"><div style="display:flex;justify-content:flex-end;gap:15px;"><button onclick="openEditFromDetail()">✏️</button><button onclick="confirmDelete()">🗑️</button><button onclick="closeDetail()">✖</button></div><h3 id="detail-date-title"></h3><div id="detail-body"></div><button class="btn btn-cancel" onclick="closeDetail()">閉じる</button></div></div>
<div id="entry-modal" class="modal"><div class="modal-content"><h3 id="modal-date-title"></h3><input type="text" id="city-name" placeholder="市区町村名(天気用)"><div style="display:flex;gap:10px;"><input type="time" id="start-time"><span>〜</span><input type="time" id="end-time"></div><select id="menu-select" onchange="toggleMenuFields()"><option value="ジョグ">ジョグ</option><option value="インターバル">インターバル</option><option value="タイムトライアル">タイムトライアル</option><option value="ペース走">ペース走</option><option value="ビルドアップ">ビルドアップ</option><option value="レスト">レスト</option><option value="その他">その他</option></select>
<div id="fields-jog" class="dynamic-section"><input type="number" id="jog-dist" step="0.01" placeholder="距離(km)" oninput="calcJog()"><input type="number" id="jog-min" placeholder="時間(分)" oninput="calcJog()"><div id="jog-res" class="result-box">平均ペース: --:--/km</div></div>
<div id="fields-int" class="dynamic-section" style="display:none;"><input type="number" id="int-dist" step="0.01" placeholder="距離(km)" oninput="calcInt()"><input type="number" id="int-count" placeholder="本数" oninput="calcInt()"><input type="text" id="int-rest-text" placeholder="つなぎ（例: 200m）"><div id="int-res" class="result-box">走行合計: 0.00 km</div></div>
<div id="fields-tt" class="dynamic-section" style="display:none;"><input type="number" id="tt-dist-km" step="0.01" placeholder="距離(km)"><div style="display:flex;gap:5px;"><input type="number" id="tt-min" placeholder="分"><input type="number" id="tt-sec" placeholder="秒"></div></div>
<div id="fields-pace" class="dynamic-section" style="display:none;"><input type="number" id="pace-dist" placeholder="距離(km)"><input type="text" id="pace-val" placeholder="設定ペース"></div>
<div id="fields-bu" class="dynamic-section" style="display:none;"><input type="number" id="bu-dist" placeholder="距離(km)"><input type="text" id="bu-start-pace" placeholder="スタートペース"><input type="text" id="bu-end-pace" placeholder="ゴールペース"></div>
<div id="fields-other" class="dynamic-section" style="display:none;"><input type="number" id="other-dist" placeholder="距離(km)"><textarea id="other-content" placeholder="内容"></textarea></div>
<button class="btn btn-save" id="save-btn" onclick="saveDiary()">保存</button><button class="btn btn-cancel" onclick="closeModal()">キャンセル</button></div></div>

<script>
    // デバッグログ出力関数
    function log(msg) {
        document.getElementById('debug-log').innerText = msg;
        console.log(msg);
    }

    const firebaseConfig = {
        apiKey: "AIzaSyC0VeVEdEpcRP8dOvJokXq0lg2gBzloVls",
        authDomain: "runnikki-a7d37.firebaseapp.com",
        projectId: "runnikki-a7d37",
        storageBucket: "runnikki-a7d37.firebasestorage.app",
        messagingSenderId: "623990853537",
        appId: "1:623990853537:web:68417f21002106b5c745e0"
    };

    // 初期化チェック
    try {
        firebase.initializeApp(firebaseConfig);
        log("Firebase初期化完了");
    } catch(e) {
        log("初期化エラー: " + e.message);
    }

    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentViewDate = new Date();
    let selectedDateStr = "";
    let cachedDiaries = [];

    // --- ログイン処理 ---
    async function handleLogin() {
        const email = document.getElementById('email').value.trim();
        const pw = document.getElementById('password').value;
        const msg = document.getElementById('auth-status-msg');
        
        if (!email || !pw) { alert("入力してください"); return; }
        
        log("ログイン試行中...");
        msg.innerText = "通信中...";
        
        try {
            await auth.signInWithEmailAndPassword(email, pw);
            log("ログイン成功");
        } catch (e) {
            log("ログイン失敗: " + e.code);
            msg.innerText = "エラー: " + e.message;
        }
    }

    // --- 新規登録処理 ---
    async function handleSignup() {
        const email = document.getElementById('email').value.trim();
        const pw = document.getElementById('password').value;
        const msg = document.getElementById('auth-status-msg');

        if (!email || !pw) { alert("入力してください"); return; }
        
        log("新規登録試行中...");
        msg.innerText = "アカウント作成中...";

        try {
            await auth.createUserWithEmailAndPassword(email, pw);
            log("登録成功");
        } catch (e) {
            log("登録失敗: " + e.code);
            msg.innerText = "作成エラー: " + e.message;
        }
    }

    // 認証状態の監視
    auth.onAuthStateChanged(user => {
        if (user) {
            log("ログイン中: " + user.email);
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            loadCloudData();
        } else {
            log("未ログイン状態");
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('app-container').classList.add('hidden');
        }
    });

    async function loadCloudData() {
        const user = auth.currentUser;
        if(!user) return;
        try {
            const snap = await db.collection('users').doc(user.uid).collection('diaries').get();
            cachedDiaries = snap.docs.map(doc => doc.data());
            renderCalendar();
        } catch(e) {
            log("データ取得エラー: " + e.message);
        }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = "";
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        document.getElementById('current-month-display').innerText = `${year}年 ${month + 1}月`;
        ['日','月','火','水','木','金','土'].forEach(l => {
            const el = document.createElement('div'); el.className = 'day-label'; el.innerText = l; grid.appendChild(el);
        });
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
        
        let monthlyTotal = 0;
        for (let d = 1; d <= lastDate; d++) {
            const dateStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
            const dayEl = document.createElement('div'); dayEl.className = 'day';
            dayEl.innerHTML = `<div class="day-num">${d}</div>`;
            const record = cachedDiaries.find(item => item.date === dateStr);
            if (record) {
                const dist = parseFloat(record.dist || 0);
                dayEl.innerHTML += `<div class="cal-record ${getColorClass(record.type)}"><b>${dist.toFixed(2)}k</b></div>`;
                monthlyTotal += dist;
                dayEl.onclick = () => openDetail(dateStr);
            } else {
                dayEl.onclick = () => openModal(dateStr);
            }
            grid.appendChild(dayEl);
        }
        document.getElementById('month-total-val').innerText = monthlyTotal.toFixed(2);
    }

    // --- その他UI操作用 (共通) ---
    function openModal(d) { selectedDateStr = d; document.getElementById('modal-date-title').innerText = d; document.getElementById('entry-modal').style.display = 'block'; }
    function closeModal() { document.getElementById('entry-modal').style.display = 'none'; }
    function openDetail(d) { /* 詳細表示ロジック */ }
    function closeDetail() { document.getElementById('detail-modal').style.display = 'none'; }
    function changeMonth(n) { currentViewDate.setMonth(currentViewDate.getMonth()+n); renderCalendar(); }
    function toggleMenuFields() { /* メニュー切り替えロジック */ }
    function getColorClass(t) { const m={'ジョグ':'bg-jog','インターバル':'bg-interval','タイムトライアル':'bg-tt'}; return m[t]||'bg-other'; }

    async function saveDiary() {
        // 保存ロジック（前回の正常動作版を継承）
        const menu = document.getElementById('menu-select').value;
        const dist = parseFloat(document.getElementById('jog-dist').value)||0; // 簡易化
        const data = { date:selectedDateStr, type:menu, dist:dist.toFixed(2) };
        await db.collection('users').doc(auth.currentUser.uid).collection('diaries').doc(selectedDateStr).set(data);
        closeModal(); loadCloudData();
    }

    window.onload = renderCalendar;
</script>
</body>
</html>
