<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN DIARY - Search Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; --card: #ffffff; --success: #2ecc71; --tt-gold: #f9a825; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }
        
        #auth-container { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; }
        .auth-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .monthly-header { background: var(--primary); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 15px; }
        .monthly-stats-value { font-size: 2.2rem; font-weight: bold; }

        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .day { min-height: 90px; padding: 5px; border: 0.5px solid #f0f0f0; cursor: pointer; background: white; }
        .day-num { font-size: 0.8rem; font-weight: bold; margin-bottom: 4px; }
        
        .cal-record { font-size: 0.65rem; padding: 3px; border-radius: 4px; margin-top: 2px; border-left: 3px solid transparent; }
        .bg-jog { background-color: #e3f2fd; color: #1565c0; border-left-color: #1565c0; }
        .bg-interval { background-color: #ffebee; color: #c62828; border-left-color: #c62828; }
        .bg-tt { background-color: #fffde7; color: #f9a825; border-left-color: #f9a825; }
        .bg-pace { background-color: #f1f8e9; color: #2e7d32; border-left-color: #2e7d32; }
        .bg-bu { background-color: #f3e5f5; color: #7b1fa2; border-left-color: #7b1fa2; }
        .bg-rest { background-color: #eeeeee; color: #616161; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; width: 92%; max-width: 450px; padding: 20px; border-radius: 20px; box-sizing: border-box; position: relative; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 15px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        .btn-save { background: var(--success); color: white; }
        .hidden { display: none !important; }
        .dynamic-section { background: #f8f9fa; padding: 12px; border-radius: 12px; border-left: 4px solid var(--primary); margin: 10px 0; }

        /* 検索ボタン */
        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--tt-gold); color: white; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: none; cursor: pointer; z-index: 90; }
        .search-item { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-box">
        <h2 style="color:var(--primary)">RUN DIARY</h2>
        <input type="email" id="email" placeholder="メールアドレス">
        <input type="password" id="password" placeholder="パスワード">
        <button onclick="handleLogin()" class="btn" style="background:var(--primary); color:white;">ログイン</button>
        <button onclick="handleSignup()" class="btn" style="background:#5856d6; color:white;">新規登録</button>
    </div>
</div>

<div id="app-container" class="container hidden">
    <div class="monthly-header">
        <div style="font-size: 0.9rem; opacity: 0.9;">今月の合計距離</div>
        <div class="monthly-stats-value"><span id="month-total-val">0.00</span> <small style="font-size: 1rem;">km</small></div>
    </div>
    <div class="calendar" id="calendar-grid"></div>
    <button onclick="auth.signOut()" class="btn" style="background:none; color:#999; font-size:0.8rem;">ログアウト</button>
    <button class="fab" onclick="openSearch()">🔍</button>
</div>

<div id="search-modal" class="modal">
    <div class="modal-content">
        <h3>タイムトライアル検索</h3>
        <input type="number" id="search-dist" placeholder="検索する距離 (km) 例: 5" step="0.01">
        <button class="btn" style="background:var(--tt-gold); color:white;" onclick="runSearch()">検索</button>
        <div id="search-results" style="margin-top:15px; max-height:300px; overflow-y:auto;"></div>
        <button class="btn" style="background:#eee;" onclick="closeSearch()">閉じる</button>
    </div>
</div>

<div id="entry-modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-date-title" style="margin-top:0;"></h3>
        <select id="menu-select" onchange="switchFields()">
            <option value="ジョグ">ジョグ</option>
            <option value="インターバル">インターバル</option>
            <option value="タイムトライアル">タイムトライアル</option>
            <option value="ペース走">ペース走</option>
            <option value="ビルドアップ">ビルドアップ</option>
            <option value="レスト">レスト</option>
        </select>

        <div id="sect-jog" class="menu-sect dynamic-section">
            <input type="number" id="jog-dist" step="0.01" placeholder="距離 (km)">
            <input type="number" id="jog-min" placeholder="時間 (分)">
        </div>
        <div id="sect-int" class="menu-sect dynamic-section" style="display:none;">
            <input type="number" id="int-dist" placeholder="1本の距離 (km)">
            <input type="number" id="int-count" placeholder="本数">
            <input type="text" id="int-rest" placeholder="レスト (例: 200m)">
        </div>
        <div id="sect-tt" class="menu-sect dynamic-section" style="display:none;">
            <input type="number" id="tt-dist" placeholder="距離 (km)">
            <div style="display:flex; gap:5px;"><input type="number" id="tt-min" placeholder="分"><input type="number" id="tt-sec" placeholder="秒"></div>
        </div>
        <div id="sect-pace" class="menu-sect dynamic-section" style="display:none;">
            <input type="number" id="pace-dist" placeholder="距離 (km)"><input type="text" id="pace-val" placeholder="設定ペース">
        </div>
        <div id="sect-bu" class="menu-sect dynamic-section" style="display:none;">
            <input type="number" id="bu-dist" placeholder="距離 (km)"><input type="text" id="bu-pace" placeholder="BUペース推移">
        </div>

        <button class="btn btn-save" id="save-btn" onclick="saveDiary()">保存</button>
        <button class="btn" style="background:#eee;" onclick="closeModal()">閉じる</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC0VeVEdEpcRP8dOvJokXq0lg2gBzloVls",
        authDomain: "runnikki-a7d37.firebaseapp.com",
        projectId: "runnikki-a7d37",
        storageBucket: "runnikki-a7d37.firebasestorage.app",
        messagingSenderId: "623990853537",
        appId: "1:623990853537:web:68417f21002106b5c745e0"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let cachedDiaries = [];
    let selectedDate = "";

    function switchFields() {
        const menu = document.getElementById('menu-select').value;
        document.querySelectorAll('.menu-sect').forEach(s => s.style.display = 'none');
        const map = {'ジョグ':'sect-jog','インターバル':'sect-int','タイムトライアル':'sect-tt','ペース走':'sect-pace','ビルドアップ':'sect-bu'};
        if(map[menu]) document.getElementById(map[menu]).style.display = 'block';
    }

    function getColorClass(type) {
        const classes = {'ジョグ':'bg-jog','インターバル':'bg-interval','タイムトライアル':'bg-tt','ペース走':'bg-pace','ビルドアップ':'bg-bu','レスト':'bg-rest'};
        return classes[type] || '';
    }

    // --- Firebase Auth ---
    async function handleLogin() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert(err.message); }
    }
    async function handleSignup() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        try { await auth.createUserWithEmailAndPassword(e, p); } catch(err) { alert(err.message); }
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            loadData();
        } else {
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('app-container').classList.add('hidden');
        }
    });

    async function loadData() {
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('diaries').get();
        cachedDiaries = snap.docs.map(doc => doc.data());
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = "";
        const now = new Date();
        const y = now.getFullYear(); const m = now.getMonth();
        const last = new Date(y, m+1, 0).getDate();

        let totalKm = 0;
        for(let d=1; d<=last; d++) {
            const ds = `${y}-${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
            const el = document.createElement('div'); el.className = 'day';
            el.innerHTML = `<div class="day-num">${d}</div>`;
            const rec = cachedDiaries.find(r => r.date === ds);
            if(rec) {
                totalKm += parseFloat(rec.dist || 0);
                el.innerHTML += `<div class="cal-record ${getColorClass(rec.type)}"><b>${rec.dist}k</b> ${rec.weather||''}<br>${rec.type}</div>`;
            }
            el.onclick = () => { selectedDate = ds; document.getElementById('modal-date-title').innerText = ds; document.getElementById('entry-modal').style.display = 'block'; switchFields(); };
            grid.appendChild(el);
        }
        document.getElementById('month-total-val').innerText = totalKm.toFixed(2);
    }

    function closeModal() { document.getElementById('entry-modal').style.display = 'none'; }
    function openSearch() { document.getElementById('search-modal').style.display = 'block'; }
    function closeSearch() { document.getElementById('search-modal').style.display = 'none'; }

    function runSearch() {
        const q = parseFloat(document.getElementById('search-dist').value);
        const results = cachedDiaries.filter(r => r.type === 'タイムトライアル' && parseFloat(r.dist) === q);
        const resDiv = document.getElementById('search-results');
        if(results.length === 0) { resDiv.innerHTML = "記録が見つかりませんでした。"; return; }
        
        results.sort((a,b) => a.date < b.date ? 1 : -1);
        resDiv.innerHTML = results.map(r => `<div class="search-item">📅 ${r.date}<br><b>⏱️ ${r.detail}</b></div>`).join('');
    }

    async function saveDiary() {
        const menu = document.getElementById('menu-select').value;
        let dist = 0, detail = "";
        if(menu==='ジョグ') dist = parseFloat(document.getElementById('jog-dist').value)||0;
        if(menu==='インターバル') dist = (parseFloat(document.getElementById('int-dist').value)||0) * (parseInt(document.getElementById('int-count').value)||0);
        if(menu==='タイムトライアル') {
            dist = parseFloat(document.getElementById('tt-dist').value)||0;
            detail = `${document.getElementById('tt-min').value}分${document.getElementById('tt-sec').value}秒`;
        }
        if(menu==='ペース走') dist = parseFloat(document.getElementById('pace-dist').value)||0;
        if(menu==='ビルドアップ') dist = parseFloat(document.getElementById('bu-dist').value)||0;

        let weather = "☁️";
        try {
            const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej));
            const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&hourly=weathercode&start_date=${selectedDate}&end_date=${selectedDate}&timezone=Asia%2FTokyo`);
            const wData = await wRes.json();
            const code = wData.hourly.weathercode[17];
            const icons = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",51:"☔",61:"☔"};
            weather = icons[code] || "☁️";
        } catch(e) {}

        await db.collection('users').doc(auth.currentUser.uid).collection('diaries').doc(selectedDate).set({
            date: selectedDate, type: menu, dist: dist.toFixed(2), detail: detail, weather: weather
        });
        closeModal(); loadData();
    }

    window.onload = renderCalendar;
</script>
</body>
</html>
