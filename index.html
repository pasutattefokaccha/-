<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN DIARY - Calendar</title>
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; --card: #ffffff; --today: #fff9c4; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* カレンダーヘッダー */
        .cal-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-radius: 15px 15px 0 0; }
        .cal-title { font-weight: bold; font-size: 1.2rem; }

        /* カレンダー本体 */
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); background: white; border-radius: 0 0 15px 15px; border-top: 1px solid #eee; overflow: hidden; }
        .day-label { text-align: center; font-size: 0.7rem; color: #888; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .day { min-height: 80px; padding: 5px; border-right: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; position: relative; cursor: pointer; }
        .day:nth-child(7n) { border-right: none; }
        .day-num { font-size: 0.8rem; font-weight: bold; }
        .today { background: var(--today) !important; }
        
        /* カレンダー内の記録表示 */
        .cal-record { font-size: 0.65rem; margin-top: 4px; line-height: 1.2; }
        .cal-dist { color: var(--primary); font-weight: bold; display: block; }
        .cal-weather { color: #666; font-size: 0.6rem; }

        /* 入力フォーム（モーダル風） */
        #entry-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; }
        .modal-content { background: white; margin: 15% auto; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        label { font-size: 0.75rem; color: #888; display: block; margin-top: 10px; }
        input, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; background: #fafafa; }
        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 14px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; }
        .btn-save { background: var(--primary); color: white; }
        .btn-cancel { background: #eee; color: #666; }

        .total-box { background: var(--primary); color: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="total-box">
        <div style="font-size:0.8rem; opacity:0.9;">今月の累計</div>
        <div style="font-size:1.8rem; font-weight:bold;"><span id="month-total">0.0</span> km</div>
    </div>

    <div class="cal-header">
        <button onclick="changeMonth(-1)" style="border:none; background:none; font-size:1.2rem;">＜</button>
        <div class="cal-title" id="current-month-display">2026年 4月</div>
        <button onclick="changeMonth(1)" style="border:none; background:none; font-size:1.2rem;">＞</button>
    </div>
    
    <div class="calendar" id="calendar-grid">
        </div>
</div>

<div id="entry-modal">
    <div class="modal-content">
        <h3 id="modal-date-title" style="margin-top:0;">2026/04/17</h3>
        
        <label>走行時刻</label>
        <input type="time" id="time-input">
        
        <label>走行距離 (km)</label>
        <input type="number" id="dist-input" step="0.01" placeholder="0.00">

        <label>メニュー</label>
        <input type="text" id="menu-input" placeholder="ジョグなど">

        <button class="btn btn-save" id="save-btn" onclick="saveDiary()">日誌を保存（天気取得）</button>
        <button class="btn btn-cancel" onclick="closeModal()">キャンセル</button>
    </div>
</div>

<script>
    let currentViewDate = new Date();
    let selectedDateStr = "";
    let weatherData = { temp: "", text: "" };

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = "";
        
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        document.getElementById('current-month-display').innerText = `${year}年 ${month + 1}月`;

        // 曜日ラベル
        const labels = ['日', '月', '火', '水', '木', '金', '土'];
        labels.forEach(l => {
            const el = document.createElement('div');
            el.className = 'day-label';
            el.innerText = l;
            grid.appendChild(el);
        });

        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const diaries = JSON.parse(localStorage.getItem('runDiaries')) || [];

        // 空白
        for (let i = 0; i < firstDay; i++) {
            grid.appendChild(document.createElement('div'));
        }

        let monthTotal = 0;

        // 日付生成
        for (let d = 1; d <= lastDate; d++) {
            const dateStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
            const dayEl = document.createElement('div');
            dayEl.className = 'day';
            
            // 今日の色付け
            const today = new Date();
            if (year === today.getFullYear() && month === today.getMonth() && d === today.getDate()) {
                dayEl.classList.add('today');
            }

            dayEl.innerHTML = `<div class="day-num">${d}</div>`;
            
            // 記録の表示
            const record = diaries.find(item => item.date === dateStr);
            if (record) {
                dayEl.innerHTML += `
                    <div class="cal-record">
                        <span class="cal-dist">${record.dist}k</span>
                        <span class="cal-weather">${record.weather}</span>
                    </div>`;
                if (month === new Date(dateStr).getMonth()) monthTotal += record.dist;
            }

            dayEl.onclick = () => openModal(dateStr);
            grid.appendChild(dayEl);
        }
        document.getElementById('month-total').innerText = monthTotal.toFixed(1);
    }

    function openModal(dateStr) {
        selectedDateStr = dateStr;
        document.getElementById('modal-date-title').innerText = dateStr.replace(/-/g, '/');
        const now = new Date();
        document.getElementById('time-input').value = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        document.getElementById('entry-modal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('entry-modal').style.display = 'none';
    }

    function changeMonth(diff) {
        currentViewDate.setMonth(currentViewDate.getMonth() + diff);
        renderCalendar();
    }

    // 天気取得ロジック
    async function fetchWeather() {
        return new Promise((resolve) => {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true&timezone=auto`);
                    const data = await res.json();
                    const c = data.current_weather;
                    const texts = {0:"☀️", 1:"🌤️", 2:"☁️", 3:"☁️", 45:"🌫️", 51:"☔", 61:"☔", 71:"❄️", 95:"⚡"};
                    weatherData.temp = Math.round(c.temperature) + "°C";
                    weatherData.text = texts[c.weathercode] || "☁️";
                    resolve(true);
                } catch (e) { resolve(false); }
            }, () => resolve(false), {timeout: 5000});
        });
    }

    async function saveDiary() {
        const btn = document.getElementById('save-btn');
        const dist = parseFloat(document.getElementById('dist-input').value);
        if (!dist) return alert("距離を入れてね！");

        btn.innerText = "取得中...";
        btn.disabled = true;
        await fetchWeather();

        const diary = {
            date: selectedDateStr,
            time: document.getElementById('time-input').value,
            dist: dist,
            menu: document.getElementById('menu-input').value || "RUN",
            temp: weatherData.temp,
            weather: weatherData.text
        };

        let diaries = JSON.parse(localStorage.getItem('runDiaries')) || [];
        // 同じ日の記録があれば上書き、なければ追加
        const idx = diaries.findIndex(d => d.date === selectedDateStr);
        if (idx > -1) diaries[idx] = diary;
        else diaries.unshift(diary);

        localStorage.setItem('runDiaries', JSON.stringify(diaries));
        closeModal();
        renderCalendar();
        btn.innerText = "日誌を保存（天気取得）";
        btn.disabled = false;
    }

    window.onload = renderCalendar;
</script>

</body>
</html>
