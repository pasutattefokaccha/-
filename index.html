<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN DIARY - Fix Build</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; --card: #ffffff; --today: #fff9c4; --danger: #ff3b30; --success: #2ecc71; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }
        
        #auth-container { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .monthly-stats { background: var(--primary); color: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; text-align: center; }
        .monthly-stats-value { font-size: 1.8rem; font-weight: bold; }

        .cal-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-radius: 15px 15px 0 0; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); background: white; border-radius: 0 0 15px 15px; border-top: 1px solid #eee; overflow: hidden; }
        .day-label { text-align: center; font-size: 0.7rem; color: #888; padding: 10px 0; }
        .day { min-height: 85px; padding: 5px; border-right: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .day-num { font-size: 0.8rem; font-weight: bold; }
        .today { background: var(--today) !important; }
        
        .cal-record { font-size: 0.6rem; margin-top: 4px; padding: 2px 4px; border-radius: 4px; }
        .bg-jog { background-color: #e3f2fd; color: #1565c0; border-left: 3px solid #1565c0; }
        .bg-interval { background-color: #ffebee; color: #c62828; border-left: 3px solid #c62828; }
        .bg-tt { background-color: #fffde7; color: #f9a825; border-left: 3px solid #f9a825; }
        .bg-pace { background-color: #f1f8e9; color: #2e7d32; border-left: 3px solid #2e7d32; }
        .bg-bu { background-color: #f3e5f5; color: #7b1fa2; border-left: 3px solid #7b1fa2; }
        .bg-rest { background-color: #eeeeee; color: #616161; }
        .bg-other { background-color: #e0f7fa; color: #00838f; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; width: 90%; max-width: 450px; padding: 20px; border-radius: 20px; position: relative; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 14px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-auth { background: var(--success); color: white; }
        .btn-save { background: var(--success); color: white; }
        .btn-cancel { background: #eee; color: #666; }
        .hidden { display: none !important; }
        .dynamic-section { background: #f9f9f9; padding: 10px; border-radius: 10px; margin-top: 10px; border-left: 4px solid var(--primary); }
        .result-box { margin-top: 10px; padding: 10px; background: #eef6ff; border-radius: 10px; font-size: 0.9rem; font-weight: bold; color: var(--primary); }
        .search-fab { position: fixed; right: 20px; bottom: 20px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 30px; display: none; justify-content: center; align-items: center; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: none; z-index: 90; }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-box">
        <h2 style="color:var(--primary)">RUN DIARY</h2>
        <input type="email" id="email" placeholder="メールアドレス">
        <input type="password" id="password" placeholder="パスワード">
        <button id="auth-btn" class="btn btn-auth">ログイン / 新規登録</button>
        <p id="auth-msg" style="color:red; font-size:0.8rem; margin-top:10px;"></p>
    </div>
</div>

<div id="app-container" class="container hidden">
    <div class="monthly-stats">
        <div id="stats-month-label">今月の合計距離</div>
        <div class="monthly-stats-value"><span id="month-total-val">0.00</span> <small>km</small></div>
    </div>
    <div class="cal-header">
        <button onclick="changeMonth(-1)">＜</button>
        <div id="current-month-display"></div>
        <button onclick="changeMonth(1)">＞</button>
    </div>
    <div class="calendar" id="calendar-grid"></div>
    <button id="logout-btn" style="width:100%; margin-top:20px; border:none; background:none; color:#999; font-size:0.8rem;">ログアウト</button>
</div>

<button class="search-fab" id="fab-search" onclick="openSearch()">🔍</button>

<div id="detail-modal" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:flex-end; gap:15px; margin-bottom:10px;">
            <button onclick="openEditFromDetail()" style="border:none; background:none; font-size:1.2rem; cursor:pointer;">✏️</button>
            <button onclick="confirmDelete()" style="border:none; background:none; font-size:1.2rem; cursor:pointer;">🗑️</button>
            <button onclick="closeDetail()" style="border:none; background:none; font-size:1.2rem; cursor:pointer;">✖</button>
        </div>
        <h3 id="detail-date-title" style="margin-top:0;"></h3>
        <div id="detail-body"></div>
        <button class="btn btn-cancel" onclick="closeDetail()">閉じる</button>
    </div>
</div>

<div id="entry-modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-date-title"></h3>
        <div style="background:#f0f0f0; padding:10px; border-radius:10px; font-size:0.8rem; margin-bottom:10px;">
            <label>📍 取得場所 (空欄で現在地)</label>
            <input type="text" id="city-name" placeholder="市区町村名" style="margin-bottom:0; font-size:0.8rem;">
        </div>
        <label>走行時間</label>
        <div style="display:flex; gap:10px;"><input type="time" id="start-time"><span>〜</span><input type="time" id="end-time"></div>
        <label>メニュー</label>
        <select id="menu-select" onchange="toggleMenuFields()">
            <option value="ジョグ">ジョグ</option>
            <option value="インターバル">インターバル</option>
            <option value="タイムトライアル">タイムトライアル</option>
            <option value="ペース走">ペース走</option>
            <option value="ビルドアップ">ビルドアップ</option>
            <option value="レスト">レスト</option>
            <option value="その他">その他</option>
        </select>

        <div id="fields-jog" class="dynamic-section">
            <input type="number" id="jog-dist" step="0.01" placeholder="距離(km)" oninput="calcJog()">
            <input type="number" id="jog-min" placeholder="時間(分)" oninput="calcJog()">
            <div id="jog-res" class="result-box">平均ペース: --:--/km</div>
        </div>

        <div id="fields-int" class="dynamic-section" style="display:none;">
            <input type="number" id="int-dist" step="0.01" placeholder="距離(km)" oninput="calcInt()">
            <input type="number" id="int-count" placeholder="本数" oninput="calcInt()">
            <input type="text" id="int-rest-text" placeholder="つなぎ（例: 200m / 60秒）">
            <div id="int-res" class="result-box">走行合計: 0.00 km</div>
        </div>

        <div id="fields-tt" class="dynamic-section" style="display:none;">
            <input type="number" id="tt-dist-km" step="0.01" placeholder="距離(km)">
            <div style="display:flex; gap:5px;"><input type="number" id="tt-min" placeholder="分"><input type="number" id="tt-sec" placeholder="秒"></div>
        </div>

        <div id="fields-pace" class="dynamic-section" style="display:none;">
            <input type="number" id="pace-dist" placeholder="距離(km)"><input type="text" id="pace-val" placeholder="設定ペース">
        </div>

        <div id="fields-bu" class="dynamic-section" style="display:none;">
            <input type="number" id="bu-dist" placeholder="距離(km)">
            <input type="text" id="bu-start-pace" placeholder="スタート時のペース">
            <input type="text" id="bu-end-pace" placeholder="ゴール時のペース">
        </div>

        <div id="fields-other" class="dynamic-section" style="display:none;">
            <input type="number" id="other-dist" placeholder="距離(km)"><textarea id="other-content" placeholder="内容"></textarea>
        </div>

        <button class="btn btn-save" id="save-btn" onclick="saveDiary()">日誌を保存</button>
        <button class="btn btn-cancel" onclick="closeModal()">キャンセル</button>
    </div>
</div>

<div id="search-modal" class="modal">
    <div class="modal-content">
        <h3>TT記録検索</h3>
        <input type="number" id="search-query" step="0.01" placeholder="検索距離(km)" oninput="searchTT()">
        <div id="search-results"></div>
        <button class="btn btn-cancel" onclick="closeSearch()">閉じる</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC0VeVEdEpcRP8dOvJokXq0lg2gBzloVls",
        authDomain: "runnikki-a7d37.firebaseapp.com",
        projectId: "runnikki-a7d37",
        storageBucket: "runnikki-a7d37.firebasestorage.app",
        messagingSenderId: "623990853537",
        appId: "1:623990853537:web:68417f21002106b5c745e0"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentViewDate = new Date();
    let selectedDateStr = "";
    let cachedDiaries = [];

    // --- ログイン処理（極限までシンプルに） ---
    const authBtn = document.getElementById('auth-btn');
    const authMsg = document.getElementById('auth-msg');

    authBtn.onclick = async () => {
        const email = document.getElementById('email').value.trim();
        const pw = document.getElementById('password').value;
        if (!email || !pw) { authMsg.innerText="メールとパスワードを入力してください"; return; }
        
        authMsg.innerText = "通信中...";
        try {
            await auth.signInWithEmailAndPassword(email, pw);
        } catch (e) {
            if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-login-credentials') {
                try {
                    await auth.createUserWithEmailAndPassword(email, pw);
                } catch (regErr) { authMsg.innerText = "登録失敗: " + regErr.message; }
            } else { authMsg.innerText = "エラー: " + e.message; }
        }
    };

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('fab-search').style.display = 'flex';
            loadCloudData();
        } else {
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('app-container').classList.add('hidden');
            document.getElementById('fab-search').style.display = 'none';
        }
    });

    async function loadCloudData() {
        const user = auth.currentUser;
        if(!user) return;
        const snap = await db.collection('users').doc(user.uid).collection('diaries').get();
        cachedDiaries = snap.docs.map(doc => doc.data());
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = "";
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        document.getElementById('current-month-display').innerText = `${year}年 ${month + 1}月`;
        ['日','月','火','水','木','金','土'].forEach(l => {
            const el = document.createElement('div'); el.className = 'day-label'; el.innerText = l; grid.appendChild(el);
        });
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
        
        let monthlyTotal = 0;
        for (let d = 1; d <= lastDate; d++) {
            const dateStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
            const dayEl = document.createElement('div'); dayEl.className = 'day';
            dayEl.innerHTML = `<div class="day-num">${d}</div>`;
            const record = cachedDiaries.find(item => item.date === dateStr);
            if (record) {
                const dist = parseFloat(record.dist || 0);
                dayEl.innerHTML += `<div class="cal-record ${getColorClass(record.type)}"><b>${dist.toFixed(2)}k</b><br>${record.weather||''} ${record.temp||''}</div>`;
                monthlyTotal += dist;
                dayEl.onclick = () => openDetail(dateStr);
            } else {
                dayEl.onclick = () => openModal(dateStr);
            }
            grid.appendChild(dayEl);
        }
        document.getElementById('month-total-val').innerText = monthlyTotal.toFixed(2);
    }

    function openDetail(dateStr) {
        selectedDateStr = dateStr;
        const record = cachedDiaries.find(item => item.date === dateStr);
        if(!record) return;
        document.getElementById('detail-date-title').innerText = dateStr.replace(/-/g, '/');
        const body = document.getElementById('detail-body');
        body.innerHTML = `
            <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee;"><span style="color:#888;">メニュー</span><b>${record.type}</b></div>
            <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee;"><span style="color:#888;">合計距離</span><b>${record.dist} km</b></div>
            <div style="padding:10px 0; border-bottom:1px solid #eee;"><span style="color:#888;">詳細:</span><br><b>${record.detail ? record.detail.replace(/\n/g, '<br>') : 'なし'}</b></div>
            <div style="display:flex; justify-content:space-between; padding:10px 0;"><span style="color:#888;">環境</span><b>${record.weather||''} ${record.temp||''}</b></div>
        `;
        document.getElementById('detail-modal').style.display = 'block';
    }

    function closeDetail() { document.getElementById('detail-modal').style.display = 'none'; }
    function openEditFromDetail() { closeDetail(); openModal(selectedDateStr); }

    async function confirmDelete() {
        if(!confirm("削除しますか？")) return;
        await db.collection('users').doc(auth.currentUser.uid).collection('diaries').doc(selectedDateStr).delete();
        closeDetail(); loadCloudData();
    }

    function toggleMenuFields() {
        const menu = document.getElementById('menu-select').value;
        ['fields-jog', 'fields-int', 'fields-tt', 'fields-pace', 'fields-bu', 'fields-other'].forEach(id => document.getElementById(id).style.display = 'none');
        const map = {'ジョグ':'fields-jog','インターバル':'fields-int','タイムトライアル':'fields-tt','ペース走':'fields-pace','ビルドアップ':'fields-bu','レスト':'fields-int','その他':'fields-other'};
        if(map[menu]) document.getElementById(map[menu]).style.display = 'block';
    }

    function calcJog() {
        const d = parseFloat(document.getElementById('jog-dist').value);
        const m = parseFloat(document.getElementById('jog-min').value);
        if(d>0 && m>0) {
            const s = (m*60)/d;
            document.getElementById('jog-res').innerText = `平均ペース: ${Math.floor(s/60)}:${Math.round(s%60).toString().padStart(2,'0')}/km`;
        }
    }

    function calcInt() {
        const d = parseFloat(document.getElementById('int-dist').value)||0;
        const c = parseFloat(document.getElementById('int-count').value)||0;
        document.getElementById('int-res').innerText = `走行合計: ${(d*c).toFixed(2)} km`;
    }

    function getColorClass(t) {
        const m = {'ジョグ':'bg-jog','インターバル':'bg-interval','タイムトライアル':'bg-tt','ペース走':'bg-pace','ビルドアップ':'bg-bu','レスト':'bg-rest'};
        return m[t] || 'bg-other';
    }

    function openModal(d) { selectedDateStr = d; document.getElementById('modal-date-title').innerText = d; document.getElementById('entry-modal').style.display = 'block'; toggleMenuFields(); }
    function closeModal() { document.getElementById('entry-modal').style.display = 'none'; }
    function openSearch() { document.getElementById('search-modal').style.display = 'block'; }
    function closeSearch() { document.getElementById('search-modal').style.display = 'none'; }
    function changeMonth(n) { currentViewDate.setMonth(currentViewDate.getMonth()+n); renderCalendar(); }

    async function saveDiary() {
        const menu = document.getElementById('menu-select').value;
        const start = document.getElementById('start-time').value || "12:00";
        const city = document.getElementById('city-name').value.trim();
        let dist = 0, detail = "";
        
        if(menu==='ジョグ'){ dist=parseFloat(document.getElementById('jog-dist').value)||0; detail=document.getElementById('jog-res').innerText; } 
        else if(menu==='インターバル'||menu==='レスト'){ 
            const d = parseFloat(document.getElementById('int-dist').value)||0;
            const c = parseFloat(document.getElementById('int-count').value)||0;
            const r = document.getElementById('int-rest-text').value;
            dist=d*c; detail=`${d}k × ${c}\nつなぎ: ${r}`; 
        } else if(menu==='タイムトライアル'){ dist=parseFloat(document.getElementById('tt-dist-km').value)||0; detail=`記録: ${document.getElementById('tt-min').value}分${document.getElementById('tt-sec').value}秒`; } 
        else if(menu==='ペース走'){ dist=parseFloat(document.getElementById('pace-dist').value)||0; detail=`設定: ${document.getElementById('pace-val').value}`; } 
        else if(menu==='ビルドアップ'){ dist=parseFloat(document.getElementById('bu-dist').value)||0; detail=`スタート: ${document.getElementById('bu-start-pace').value}\nゴール: ${document.getElementById('bu-end-pace').value}`; } 
        else if(menu==='その他'){ dist=parseFloat(document.getElementById('other-dist').value)||0; detail=document.getElementById('other-content').value; }

        const btn = document.getElementById('save-btn');
        btn.innerText = "取得中..."; btn.disabled = true;

        let lat, lon, w = "☁️", t = "--°C";
        try {
            if (city) {
                const g = await (await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=ja&format=json`)).json();
                if(g.results) { lat = g.results[0].latitude; lon = g.results[0].longitude; }
            }
            if(!lat) {
                const p = await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej));
                lat = p.coords.latitude; lon = p.coords.longitude;
            }
            const wr = await (await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,weathercode&start_date=${selectedDateStr}&end_date=${selectedDateStr}&timezone=Asia%2FTokyo`)).json();
            const hour = parseInt(start.split(':')[0]);
            t = Math.round(wr.hourly.temperature_2m[hour]) + "°C";
            const icons = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",51:"☔",61:"☔",71:"❄️",95:"⚡"};
            w = icons[wr.hourly.weathercode[hour]] || "☁️";
        } catch(e){}

        const data = { date:selectedDateStr, type:menu, dist:dist.toFixed(2), detail:detail, weather:w, temp:t };
        await db.collection('users').doc(auth.curre
