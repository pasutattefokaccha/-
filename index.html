<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN DIARY - Perfect Cloud</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

    <style>
        :root { --primary: #007AFF; --accent: #34c759; --bg: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        #auth-container { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 15px; background: #fff; }
        .stat-card { background: white; padding: 10px; border-radius: 12px; text-align: center; border: 2px solid #007AFF; }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: var(--primary); }
        #map { height: 300px; margin: 10px; border-radius: 15px; }
        .btn-gps { width: 100%; padding: 15px; border-radius: 30px; background: var(--accent); color: white; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); background: white; border-radius: 15px; padding: 10px; margin: 10px; }
        .day { min-height: 60px; border: 0.1px solid #eee; font-size: 0.7rem; padding: 2px; }
        .bg-jog { background: #e3f2fd; border-left: 3px solid #1565c0; }
        .bg-tt { background: #fffde7; border-left: 3px solid #f9a825; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-box">
        <h2 style="color:var(--primary)">RUN NIKKI</h2>
        <input type="email" id="email" placeholder="メールアドレス">
        <input type="password" id="password" placeholder="パスワード(6文字以上)">
        <button id="auth-btn" class="btn-gps">ログイン / 新規登録</button>
        <p id="auth-error" style="color:red; font-size:0.8rem; margin-top:10px;"></p>
    </div>
</div>

<div id="app-container" class="hidden">
    <div class="stats-grid">
        <div class="stat-card"><div>週</div><div class="stat-val" id="week-dist">0.0</div></div>
        <div class="stat-card"><div>月</div><div class="stat-val" id="month-dist">0.0</div></div>
        <div class="stat-card"><div>累計</div><div class="stat-val" id="total-dist">0.0</div></div>
    </div>
    <div id="map"></div>
    <div style="padding:15px;">
        <button id="gps-btn" class="btn-gps">GPS計測開始</button>
        <div style="background:white; padding:15px; border-radius:15px; margin-top:15px;">
            <input type="number" id="manual-dist" placeholder="距離(km)" step="0.01">
            <select id="menu-type">
                <option value="ジョグ">ジョグ</option>
                <option value="タイムトライアル">タイムトライアル</option>
            </select>
            <button id="save-btn" class="btn-gps" style="background:var(--primary)">クラウド保存</button>
        </div>
        <button id="logout-btn" style="width:100%; margin-top:20px; background:none; border:none; color:#999;">ログアウト</button>
    </div>
    <div id="calendar" class="calendar"></div>
</div>

<script>
    // --- 1. Firebase初期化設定 ---
    const firebaseConfig = {
        apiKey: "AIzaSyC0VeVEdEpcRP8dOvJokXq0lg2gBzloVls",
        authDomain: "runnikki-a7d37.firebaseapp.com",
        projectId: "runnikki-a7d37",
        storageBucket: "runnikki-a7d37.firebasestorage.app",
        messagingSenderId: "623990853537",
        appId: "1:623990853537:web:68417f21002106b5c745e0"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // --- 2. 認証処理 ---
    const authBtn = document.getElementById('auth-btn');
    const errEl = document.getElementById('auth-error');

    authBtn.addEventListener('click', async () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        errEl.innerText = "通信中...";

        if(!e || !p) { errEl.innerText = "入力してください"; return; }

        try {
            // ログイン試行
            await auth.signInWithEmailAndPassword(e, p);
        } catch (error) {
            console.log("SignIn Error:", error.code);
            // ユーザーがいない、または新しい認証方式のエラーコードの場合に新規登録
            if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-login-credentials' || error.code === 'auth/invalid-credential') {
                try {
                    await auth.createUserWithEmailAndPassword(e, p);
                } catch (regError) {
                    errEl.innerText = "登録エラー: " + regError.message;
                }
            } else {
                errEl.innerText = "エラー: " + error.message;
            }
        }
    });

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            initMap();
            loadCloudData();
        } else {
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('app-container').classList.add('hidden');
        }
    });

    // --- 3. GPS & 地図 ---
    let map, pathLine, watchId, totalKm = 0;
    function initMap() {
        if(map) return;
        map = L.map('map').setView([35.68, 139.76], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        pathLine = L.polyline([], {color: '#007AFF'}).addTo(map);
    }

    document.getElementById('gps-btn').addEventListener('click', function() {
        if (watchId) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
            this.innerText = "GPS計測開始";
            this.style.background = "var(--accent)";
            document.getElementById('manual-dist').value = totalKm.toFixed(2);
        } else {
            totalKm = 0;
            this.innerText = "計測停止";
            this.style.background = "#ff3b30";
            watchId = navigator.geolocation.watchPosition(pos => {
                const latlng = [pos.coords.latitude, pos.coords.longitude];
                pathLine.addLatLng(latlng);
                map.panTo(latlng);
            }, null, {enableHighAccuracy: true});
        }
    });

    // --- 4. 保存 & 読み込み ---
    document.getElementById('save-btn').addEventListener('click', async () => {
        const dist = document.getElementById('manual-dist').value;
        const type = document.getElementById('menu-type').value;
        const date = new Date().toLocaleDateString('sv-SE');
        if(!dist) return alert("距離を入力してください");

        try {
            await db.collection('users').doc(auth.currentUser.uid).collection('diaries').doc(date).set({
                date, dist, type
            });
            alert("保存完了！");
            loadCloudData();
        } catch(e) { alert("保存エラー"); }
    });

    async function loadCloudData() {
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('diaries').get();
        const data = snap.docs.map(d => d.data());
        renderCalendar(data);
    }

    function renderCalendar(records) {
        const cal = document.getElementById('calendar');
        cal.innerHTML = "";
        const today = new Date();
        const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
        for(let i=1; i<=lastDay; i++) {
            const dateStr = `${today.getFullYear()}-${(today.getMonth()+1).toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
            const rec = records.find(r => r.date === dateStr);
            const div = document.createElement('div');
            div.className = 'day' + (rec ? (rec.type==='ジョグ' ? ' bg-jog':' bg-tt'):'');
            div.innerHTML = `<div>${i}</div>${rec ? `<b>${rec.dist}k</b>`:''}`;
            cal.appendChild(div);
        }
    }

    document.getElementById('logout-btn').addEventListener('click', () => auth.signOut());
</script>
</body>
</html>
