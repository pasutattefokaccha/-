<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO RUN DIARY</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; --card: #ffffff; --today: #fff9c4; --success: #2ecc71; --accent: #f9a825; --danger: #ff3b30; --text-secondary: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }
        #system-monitor { font-size: 10px; background: #222; color: #0f0; padding: 8px; border-radius: 8px; margin-bottom: 10px; font-family: monospace; border-left: 4px solid #0f0; word-break: break-all; }
        .auth-box { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 380px; text-align: center; margin: 50px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .monthly-header { background: var(--primary); color: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .total-val { font-size: 1.8rem; font-weight: bold; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); background: white; border-radius: 15px; overflow: hidden; border: 1px solid #ddd; }
        .day-label { text-align: center; font-size: 0.7rem; color: #888; padding: 5px 0; background: #fafafa; border-bottom: 1px solid #eee; }
        .day { aspect-ratio: 1 / 1.3; padding: 4px; border-right: 0.1px solid #f0f0f0; border-bottom: 0.1px solid #f0f0f0; cursor: pointer; position: relative; }
        .day-num { font-size: 0.75rem; font-weight: bold; }
        .is-today { background-color: var(--today) !important; border: 1.5px solid var(--accent) !important; z-index: 1; }
        .cal-record { font-size: 0.6rem; border-radius: 3px; border-left: 2px solid #ccc; line-height: 1.2; padding: 1px 2px; margin-top: 1px; }
        .rec-dist { font-weight: 800; font-size: 0.7rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; width: 92%; max-width: 500px; padding: 25px; border-radius: 25px; box-sizing: border-box; }
        input, select, textarea { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 15px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        .btn-save { background: var(--success); color: white; }
        .btn-edit { background: var(--accent); color: white; }
        .dynamic-section { background: #f8f9fa; padding: 12px; border-radius: 12px; border-left: 4px solid var(--primary); margin: 8px 0; }
        .res-preview { color: var(--primary); font-weight: bold; font-size: 0.9rem; margin-top: 4px; }
        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--accent); color: white; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: none; z-index: 90; }
        .bg-jog { background: #e3f2fd; border-left-color: #1565c0; } .bg-tt { background: #fffde7; border-left-color: #f9a825; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; } th, td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.8rem; }
        .hidden { display: none !important; }
        .view-label { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 2px; }
        .view-value { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; }
        .view-memo { background: #f4f4f4; padding: 15px; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="system-monitor">Initializing...</div>

<div id="auth-container">
    <div class="auth-box">
        <h2 style="color:var(--primary)">RUN DIARY</h2>
        <input type="email" id="email" placeholder="メールアドレス">
        <input type="password" id="password" placeholder="パスワード">
        <button onclick="handleLogin()" class="btn" style="background:var(--primary); color:white;">ログイン</button>
        <button onclick="handleSignup()" class="btn" style="background:#5856d6; color:white;">新規登録</button>
    </div>
</div>

<div id="app-container" class="container hidden">
    <div class="monthly-header">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <div style="text-align:center">
            <div id="month-label" style="font-size:0.8rem"></div>
            <div class="total-val"><span id="month-total-val">0.00</span> km</div>
        </div>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar" id="calendar-grid"></div>
    <button class="fab" onclick="openSearch()">🔍</button>
    <div style="text-align:center; margin-top:20px;">
        <button onclick="auth.signOut()" style="background:none; border:none; color:#999; text-decoration:underline;">ログアウト</button>
    </div>
</div>

<div id="entry-modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-date-title" style="margin-top:0; color:var(--primary)"></h3>
        
        <div id="modal-view-mode">
            <div class="view-label">メニュー / 開始時間</div>
            <div class="view-value"><span id="view-type"></span> <span id="view-time" style="font-size:0.85rem; font-weight:normal;"></span></div>
            <div class="view-label">天気 / 気温</div>
            <div class="view-value" id="view-weather">--</div>
            <div id="view-detail-area">
                <div class="view-label">距離 / 内容</div>
                <div class="view-value"><span id="view-dist"></span>km - <span id="view-detail" style="font-size:0.9rem;"></span></div>
            </div>
            <div class="view-label">メモ・感想</div>
            <div class="view-memo" id="view-memo"></div>
            <button class="btn btn-edit" onclick="enableEditMode()">編集する</button>
        </div>

        <div id="modal-edit-mode" class="hidden">
            <input type="time" id="start-time" value="17:00">
            <select id="menu-select" onchange="switchFields()">
                <option value="ジョグ">ジョグ</option>
                <option value="インターバル">インターバル</option>
                <option value="レストトレーニング">レストトレーニング</option>
                <option value="タイムトライアル">タイムトライアル</option>
                <option value="ペース走">ペース走</option>
                <option value="ビルドアップ">ビルドアップ</option>
                <option value="レスト">レスト(完全休養)</option>
            </select>

            <div id="sect-jog" class="menu-sect dynamic-section">
                <input type="number" id="jog-dist" step="0.01" placeholder="距離 (km)" oninput="calcJog()">
                <input type="number" id="jog-min" placeholder="走行時間 (分)" oninput="calcJog()">
                <div id="jog-res" class="res-preview">ペース: --:--/km</div>
            </div>

            <div id="sect-int" class="menu-sect dynamic-section" style="display:none;">
                <input type="text" id="int-dist-v2" placeholder="距離 (例: 400m)">
                <input type="text" id="int-time-v2" placeholder="タイム (例: 72秒)">
                <input type="text" id="int-connect-v2" placeholder="つなぎ (例: 200m または 60秒)">
            </div>

            <div id="sect-rest-tr" class="menu-sect dynamic-section" style="display:none;">
                <input type="number" id="rt-dist" placeholder="何m">
                <input type="number" id="rt-count" placeholder="何本">
                <input type="number" id="rt-rest" placeholder="休憩何秒">
                <input type="number" id="rt-time" placeholder="タイム何秒">
            </div>

            <div id="sect-tt" class="menu-sect dynamic-section" style="display:none;">
                <input type="number" id="tt-dist" placeholder="距離 (km)">
                <div style="display:flex; gap:5px; align-items:center;">
                    <input type="number" id="tt-min" placeholder="分" style="width:30%">:
                    <input type="number" id="tt-sec" placeholder="秒" style="width:30%">.
                    <input type="number" id="tt-msec" placeholder="0" style="width:20%">
                </div>
            </div>

            <div id="sect-pace" class="menu-sect dynamic-section" style="display:none;">
                <input type="number" id="pace-dist" placeholder="距離 (km)" oninput="calcPaceTime()">
                <input type="text" id="pace-val" placeholder="設定ペース (例: 4:15)" oninput="calcPaceTime()">
                <div id="pace-res" class="res-preview">合計走行時間: --分--秒</div>
            </div>

            <div id="sect-bu" class="menu-sect dynamic-section" style="display:none;">
                <input type="number" id="bu-dist" placeholder="距離 (km)">
                <input type="text" id="bu-start" placeholder="開始ペース">
                <input type="text" id="bu-end" placeholder="終了ペース">
            </div>

            <div id="sect-rest" class="menu-sect dynamic-section" style="display:none;">
                <p style="font-size:0.8rem; color:#666;">※完全休養のメモを下に記入してください</p>
            </div>

            <textarea id="common-memo" placeholder="メモ・感想" rows="3"></textarea>
            <button class="btn btn-save" id="save-btn" onclick="saveDiary()">保存 (天気を取得)</button>
        </div>
        <button class="btn btn-delete hidden" id="delete-btn" onclick="deleteDiary()" style="background:var(--danger); color:white; margin-top:15px;">削除</button>
        <button class="btn" style="background:#eee;" onclick="closeModal()">閉じる</button>
    </div>
</div>

<div id="search-modal" class="modal">
    <div class="modal-content">
        <h3>TT記録検索</h3>
        <input type="number" id="search-dist" placeholder="検索する距離 (km)">
        <button class="btn" style="background:var(--primary); color:white;" onclick="runSearch()">検索開始</button>
        <div style="max-height:300px; overflow-y:auto; margin-top:15px;">
            <table id="search-table"><thead><tr><th>日付</th><th>距離</th><th>記録</th></tr></thead><tbody id="search-body"></tbody></table>
        </div>
        <button class="btn" style="background:#eee;" onclick="closeSearch()">閉じる</button>
    </div>
</div>

<script>
    const log = (m) => { document.getElementById('system-monitor').innerText = "Status: " + m; };
    const firebaseConfig = {
        apiKey: "AIzaSyC0VeVEdEpcRP8dOvJokXq0lg2gBzloVls",
        authDomain: "runnikki-a7d37.firebaseapp.com",
        projectId: "runnikki-a7d37",
        storageBucket: "runnikki-a7d37.firebasestorage.app",
        messagingSenderId: "623990853537",
        appId: "1:623990853537:web:68417f21002106b5c745e0"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(); const db = firebase.firestore();
    let cachedDiaries = [], selectedDate = "", currentViewDate = new Date();

    auth.onAuthStateChanged(user => {
        if (user) { log("Logged in: " + user.email); document.getElementById('auth-container').classList.add('hidden'); document.getElementById('app-container').classList.remove('hidden'); loadData(); }
        else { log("Please Login"); document.getElementById('auth-container').classList.remove('hidden'); document.getElementById('app-container').classList.add('hidden'); }
    });

    async function handleLogin() { 
        const e = document.getElementById('email').value.trim();
        const p = document.getElementById('password').value.trim();
        if(!e || !p) { alert("入力してください"); return; }
        log("Logging in...");
        try { 
            await auth.signInWithEmailAndPassword(e, p); 
        } catch(e) { 
            log("Error: " + e.code); alert("失敗: " + e.message); 
        } 
    }
    
    async function handleSignup() { 
        const e = document.getElementById('email').value.trim();
        const p = document.getElementById('password').value.trim();
        try { 
            await auth.createUserWithEmailAndPassword(e, p); alert("登録完了"); 
        } catch(e) { alert(e.message); } 
    }

    async function loadData() {
        if(!auth.currentUser) return;
        try {
            const snap = await db.collection('users').doc(auth.currentUser.uid).collection('diaries').get();
            cachedDiaries = snap.docs.map(doc => doc.data());
            renderCalendar();
        } catch(e) { log("Load Error: " + e.message); }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid'); grid.innerHTML = "";
        const y = currentViewDate.getFullYear(), m = currentViewDate.getMonth();
        document.getElementById('month-label').innerText = `${y}年 ${m + 1}月`;
        ['日','月','火','水','木','金','土'].forEach(d => grid.innerHTML += `<div class="day-label">${d}</div>`);
        const first = new Date(y, m, 1).getDay(), last = new Date(y, m + 1, 0).getDate();
        for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));
        let total = 0;
        const nowStr = new Date().toISOString().split('T')[0];
        for(let d=1; d<=last; d++) {
            const ds = `${y}-${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
            const el = document.createElement('div'); 
            el.className = 'day' + (ds === nowStr ? ' is-today' : '');
            el.innerHTML = `<div class="day-num">${d}</div>`;
            const rec = cachedDiaries.find(r => r.date === ds);
            if(rec) {
                total += parseFloat(rec.dist || 0);
                const cls = {'ジョグ':'bg-jog','タイムトライアル':'bg-tt'}[rec.type] || '';
                el.innerHTML += `<div class="cal-record ${cls}"><div style="font-size:0.5rem">${rec.weather||''}</div><div class="rec-dist">${rec.dist}k</div></div>`;
            }
            el.onclick = () => openModal(ds);
            grid.appendChild(el);
        }
        document.getElementById('month-total-val').innerText = total.toFixed(2);
    }

    function changeMonth(o) { currentViewDate.setMonth(currentViewDate.getMonth() + o); renderCalendar(); }
    function enableEditMode() { document.getElementById('modal-view-mode').classList.add('hidden'); document.getElementById('modal-edit-mode').classList.remove('hidden'); }
    function closeModal() { document.getElementById('entry-modal').style.display = 'none'; }
    function openSearch() { document.getElementById('search-modal').style.display = 'block'; }
    function closeSearch() { document.getElementById('search-modal').style.display = 'none'; }

    function openModal(d) {
        selectedDate = d; document.getElementById('modal-date-title').innerText = d;
        const rec = cachedDiaries.find(r => r.date === d);
        document.getElementById('delete-btn').classList.toggle('hidden', !rec);
        if(rec) {
            document.getElementById('modal-view-mode').classList.remove('hidden');
            document.getElementById('modal-edit-mode').classList.add('hidden');
            document.getElementById('view-type').innerText = rec.type;
            document.getElementById('view-time').innerText = (rec.time || "17:00") + "〜";
            document.getElementById('view-weather').innerText = rec.weather || "--";
            document.getElementById('view-memo').innerText = rec.memo || "なし";
            if(rec.type === 'レスト') { document.getElementById('view-detail-area').classList.add('hidden'); }
            else {
                document.getElementById('view-detail-area').classList.remove('hidden');
                document.getElementById('view-dist').innerText = rec.dist || "0";
                document.getElementById('view-detail').innerText = rec.detail || "";
            }
            document.getElementById('menu-select').value = rec.type;
            document.getElementById('start-time').value = rec.time || "17:00";
            document.getElementById('common-memo').value = rec.memo || "";
        } else {
            document.getElementById('modal-view-mode').classList.add('hidden');
            document.getElementById('modal-edit-mode').classList.remove('hidden');
            document.getElementById('menu-select').value = "ジョグ";
            document.getElementById('start-time').value = "17:00";
            document.getElementById('common-memo').value = "";
            document.querySelectorAll('#modal-edit-mode input:not([type="time"])').forEach(i => i.value = "");
        }
        document.getElementById('entry-modal').style.display = 'block';
        if(!document.getElementById('modal-edit-mode').classList.contains('hidden')) switchFields();
    }

    function switchFields() {
        const v = document.getElementById('menu-select').value;
        document.querySelectorAll('.menu-sect').forEach(s => s.style.display = 'none');
        const id = {'ジョグ':'sect-jog','インターバル':'sect-int','レストトレーニング':'sect-rest-tr','タイムトライアル':'sect-tt','ペース走':'sect-pace','ビルドアップ':'sect-bu','レスト':'sect-rest'}[v];
        if(id) document.getElementById(id).style.display = 'block';
    }

    function calcJog() {
        const d = parseFloat(document.getElementById('jog-dist').value), min = parseFloat(document.getElementById('jog-min').value);
        if(d && min) { const s = (min*60)/d; document.getElementById('jog-res').innerText = `ペース: ${Math.floor(s/60)}:${Math.round(s%60).toString().padStart(2,'0')}/km`; }
    }

    function calcPaceTime() {
        const d = parseFloat(document.getElementById('pace-dist').value), p = document.getElementById('pace-val').value;
        if(d && p.includes(':')) {
            const [m, s] = p.split(':').map(Number); const total = (m*60+s)*d;
            document.getElementById('pace-res').innerText = `合計走行時間: ${Math.floor(total/60)}分${Math.round(total%60)}秒`;
        }
    }

    async function runSearch() {
        const d = document.getElementById('search-dist').value;
        const res = cachedDiaries.filter(r => r.type === 'タイムトライアル' && (!d || parseFloat(r.dist) == d));
        const body = document.getElementById('search-body'); body.innerHTML = "";
        res.sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(r => { body.innerHTML += `<tr><td>${r.date}</td><td>${r.dist}km</td><td>${r.detail}</td></tr>`; });
    }

    async function deleteDiary() { if(confirm("削除しますか？")) { await db.collection('users').doc(auth.currentUser.uid).collection('diaries').doc(selectedDate).delete(); closeModal(); loadData(); } }

    async function saveDiary() {
        const btn = document.getElementById('save-btn'); btn.disabled = true; btn.innerText = "取得中...";
        const menu = document.getElementById('menu-select').value;
        let dist = 0, detail = "";
        if(menu==='ジョグ') { dist = parseFloat(document.getElementById('jog-dist').value)||0; detail = `${document.getElementById('jog-min').value}分 / ${document.getElementById('jog-res').innerText}`; }
        else if(menu==='タイムトライアル') { dist = parseFloat(document.getElementById('tt-dist').value)||0; detail = `${document.getElementById('tt-min').value}:${document.getElementById('tt-sec').value.padStart(2,'0')}.${document.getElementById('tt-msec').value}`; }
        else if(menu==='インターバル') { detail = `${document.getElementById('int-dist-v2').value} / ${document.getElementById('int-time-v2').value} / R:${document.getElementById('int-c
