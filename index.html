<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN DIARY - Unit Unified</title>
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; --card: #ffffff; --today: #fff9c4; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }
        
        .monthly-stats { background: var(--primary); color: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,122,255,0.2); }
        .monthly-stats-label { font-size: 0.8rem; opacity: 0.9; }
        .monthly-stats-value { font-size: 1.8rem; font-weight: bold; margin-top: 2px; }

        .cal-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-radius: 15px 15px 0 0; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); background: white; border-radius: 0 0 15px 15px; border-top: 1px solid #eee; overflow: hidden; }
        .day-label { text-align: center; font-size: 0.7rem; color: #888; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .day { min-height: 85px; padding: 5px; border-right: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .day-num { font-size: 0.8rem; font-weight: bold; }
        .today { background: var(--today) !important; }
        
        .cal-record { font-size: 0.6rem; margin-top: 4px; line-height: 1.2; padding: 2px 4px; border-radius: 4px; }
        .bg-jog { background-color: #e3f2fd; color: #1565c0; border-left: 3px solid #1565c0; }
        .bg-interval { background-color: #ffebee; color: #c62828; border-left: 3px solid #c62828; }
        .bg-tt { background-color: #fffde7; color: #f9a825; border-left: 3px solid #f9a825; }
        .bg-pace { background-color: #f1f8e9; color: #2e7d32; border-left: 3px solid #2e7d32; }
        .bg-bu { background-color: #f3e5f5; color: #7b1fa2; border-left: 3px solid #7b1fa2; }
        .bg-rest { background-color: #eeeeee; color: #616161; }
        .bg-other { background-color: #e0f7fa; color: #00838f; }

        .cal-dist { font-weight: bold; display: block; }

        .search-fab { position: fixed; right: 20px; bottom: 20px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 30px; display: flex; justify-content: center; align-items: center; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; border: none; z-index: 90; }

        #entry-modal, #search-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; width: 90%; max-width: 450px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        label { font-size: 0.75rem; color: #888; display: block; margin-top: 12px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; background: #fafafa; }
        
        .time-range { display: flex; align-items: center; gap: 10px; background: #f0f7ff; padding: 10px; border-radius: 10px; margin-top: 5px; }
        .time-range input { margin: 0; background: white; }

        .dynamic-section { background: #f9f9f9; padding: 10px; border-radius: 10px; margin-top: 10px; border-left: 4px solid var(--primary); }
        .result-box { margin-top: 10px; padding: 10px; background: #eef6ff; border-radius: 10px; font-size: 0.9rem; font-weight: bold; color: var(--primary); }

        .tt-input-group { display: flex; align-items: center; gap: 5px; }
        .tt-input-group input { text-align: center; }

        .search-result-item { border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .search-result-date { font-size: 0.8rem; color: #888; }
        .search-result-info { font-weight: bold; }

        .btn { width: 100%; padding: 14px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-save { background: var(--primary); color: white; }
        .btn-cancel { background: #eee; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="monthly-stats">
        <div class="monthly-stats-label" id="stats-month-label">月間走行距離</div>
        <div class="monthly-stats-value"><span id="month-total-val">0.00</span> <small style="font-size: 1rem;">km</small></div>
    </div>

    <div class="cal-header">
        <button onclick="changeMonth(-1)" style="border:none; background:none; font-size:1.2rem;">＜</button>
        <div id="current-month-display" style="font-weight:bold;"></div>
        <button onclick="changeMonth(1)" style="border:none; background:none; font-size:1.2rem;">＞</button>
    </div>
    <div class="calendar" id="calendar-grid"></div>
</div>

<button class="search-fab" onclick="openSearch()">🔍</button>

<div id="entry-modal">
    <div class="modal-content">
        <h3 id="modal-date-title" style="margin-top:0;"></h3>
        <label>走行時間</label>
        <div class="time-range"><input type="time" id="start-time"><span>〜</span><input type="time" id="end-time"></div>
        <label>メニュー</label>
        <select id="menu-select" onchange="toggleMenuFields()">
            <option value="ジョグ">ジョグ</option>
            <option value="インターバル">インターバル</option>
            <option value="タイムトライアル">タイムトライアル</option>
            <option value="ペース走">ペース走</option>
            <option value="ビルドアップ">ビルドアップ</option>
            <option value="レスト">レスト</option>
            <option value="その他">その他</option>
        </select>
        
        <div id="fields-jog" class="dynamic-section">
            <div style="display:flex; gap:10px;">
                <div><label>距離(km)</label><input type="number" id="jog-dist" step="0.01" oninput="calcJog()"></div>
                <div><label>時間(分)</label><input type="number" id="jog-min" oninput="calcJog()"></div>
            </div>
            <div id="jog-res" class="result-box">平均ペース: --:--/km</div>
        </div>
        
        <div id="fields-int" class="dynamic-section" style="display:none;">
            <div style="display:flex; gap:10px;">
                <div><label>1本の距離(km) ※400mなら0.4</label><input type="number" id="int-dist" step="0.01" placeholder="1.0" oninput="calcInt()"></div>
                <div><label>本数</label><input type="number" id="int-count" placeholder="5" oninput="calcInt()"></div>
            </div>
            <label>つなぎの内容</label><input type="text" id="int-rest" placeholder="200mジョグなど">
            <div id="int-res" class="result-box">走行合計: 0.00 km</div>
        </div>
        
        <div id="fields-tt" class="dynamic-section" style="display:none;">
            <label>設定距離(km) ※3000mなら3.0</label><input type="number" id="tt-dist-km" step="0.01" placeholder="5.0">
            <label>タイム</label>
            <div class="tt-input-group">
                <input type="number" id="tt-min" placeholder="分"><span>分</span>
                <input type="number" id="tt-sec" placeholder="秒"><span>.</span>
                <input type="number" id="tt-msec" placeholder="0" max="9"><span>秒</span>
            </div>
        </div>

        <div id="fields-pace" class="dynamic-section" style="display:none;">
            <label>走行距離(km)</label><input type="number" id="pace-dist" step="0.1"><label>設定ペース(/km)</label><input type="text" id="pace-val" placeholder="3:50">
        </div>
        <div id="fields-bu" class="dynamic-section" style="display:none;">
            <label>走行距離(km)</label><input type="number" id="bu-dist" step="0.1">
            <div style="display:flex; gap:10px;">
                <div><label>開始ペース</label><input type="text" id="bu-start" placeholder="4:30"></div>
                <div><label>終了ペース</label><input type="text" id="bu-end" placeholder="3:40"></div>
            </div>
        </div>
        <div id="fields-other" class="dynamic-section" style="display:none;">
            <label>走行距離(km)</label><input type="number" id="other-dist" step="0.01"><label>メニュー名</label><input type="text" id="other-menu-name"><label>内容</label><textarea id="other-content" style="height:60px;"></textarea>
        </div>
        <button class="btn btn-save" id="save-btn" onclick="saveDiary()">日誌を保存（天気取得）</button>
        <button class="btn btn-cancel" onclick="closeModal()">キャンセル</button>
    </div>
</div>

<div id="search-modal">
    <div class="modal-content">
        <h3>TT記録検索 (km単位)</h3>
        <label>検索する距離 (km)</label>
        <input type="number" id="search-query" step="0.01" placeholder="例: 5.0" oninput="searchTT()">
        <div id="search-results" style="margin-top:20px; max-height:300px; overflow-y:auto;">
            <p style="color:#888; text-align:center;">kmを入力してください</p>
        </div>
        <button class="btn btn-cancel" onclick="closeSearch()">閉じる</button>
    </div>
</div>

<script>
    let currentViewDate = new Date();
    let selectedDateStr = "";

    function toggleMenuFields() {
        const menu = document.getElementById('menu-select').value;
        const ids = ['fields-jog', 'fields-int', 'fields-tt', 'fields-pace', 'fields-bu', 'fields-other'];
        ids.forEach(id => document.getElementById(id).style.display = 'none');
        if(menu === 'ジョグ') document.getElementById('fields-jog').style.display = 'block';
        if(menu === 'インターバル' || menu === 'レスト') document.getElementById('fields-int').style.display = 'block';
        if(menu === 'タイムトライアル') document.getElementById('fields-tt').style.display = 'block';
        if(menu === 'ペース走') document.getElementById('fields-pace').style.display = 'block';
        if(menu === 'ビルドアップ') document.getElementById('fields-bu').style.display = 'block';
        if(menu === 'その他') document.getElementById('fields-other').style.display = 'block';
    }

    function calcJog() {
        const d = parseFloat(document.getElementById('jog-dist').value);
        const m = parseFloat(document.getElementById('jog-min').value);
        if(d > 0 && m > 0) {
            const paceSec = (m * 60) / d;
            const min = Math.floor(paceSec / 60);
            const sec = Math.round(paceSec % 60);
            document.getElementById('jog-res').innerText = `平均ペース: ${min}:${sec.toString().padStart(2,'0')}/km`;
        }
    }

    function calcInt() {
        const d = parseFloat(document.getElementById('int-dist').value) || 0;
        const c = parseFloat(document.getElementById('int-count').value) || 0;
        document.getElementById('int-res').innerText = `走行合計: ${(d * c).toFixed(2)} km`;
    }

    function getColorClass(menuType) {
        if(menuType === 'ジョグ') return 'bg-jog';
        if(menuType === 'インターバル') return 'bg-interval';
        if(menuType === 'タイムトライアル') return 'bg-tt';
        if(menuType === 'ペース走') return 'bg-pace';
        if(menuType === 'ビルドアップ') return 'bg-bu';
        if(menuType === 'レスト') return 'bg-rest';
        return 'bg-other';
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = "";
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        document.getElementById('current-month-display').innerText = `${year}年 ${month + 1}月`;
        document.getElementById('stats-month-label').innerText = `${month + 1}月の合計走行距離`;
        ['日','月','火','水','木','金','土'].forEach(l => {
            const el = document.createElement('div'); el.className = 'day-label'; el.innerText = l; grid.appendChild(el);
        });
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const diaries = JSON.parse(localStorage.getItem('runDiaries')) || [];
        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
        let monthlyTotal = 0;
        for (let d = 1; d <= lastDate; d++) {
            const dateStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
            const dayEl = document.createElement('div'); dayEl.className = 'day';
            if (new Date().toISOString().split('T')[0] === dateStr) dayEl.classList.add('today');
            dayEl.innerHTML = `<div class="day-num">${d}</div>`;
            const record = diaries.find(item => item.date === dateStr);
            if (record) {
                dayEl.innerHTML += `<div class="cal-record ${getColorClass(record.type)}">
                    <span class="cal-dist">${record.dist}k</span>
                    <span style="font-size:0.5rem">${record.weather} ${record.temp}</span>
                </div>`;
                monthlyTotal += parseFloat(record.dist);
            }
            dayEl.onclick = () => openModal(dateStr);
            grid.appendChild(dayEl);
        }
        document.getElementById('month-total-val').innerText = monthlyTotal.toFixed(2);
    }

    function openModal(dateStr) {
        selectedDateStr = dateStr;
        document.getElementById('modal-date-title').innerText = dateStr.replace(/-/g, '/');
        const now = new Date();
        const hourAgo = new Date(now.getTime() - (60 * 60 * 1000));
        document.getElementById('start-time').value = hourAgo.toTimeString().slice(0,5);
        document.getElementById('end-time').value = now.toTimeString().slice(0,5);
        document.getElementById('entry-modal').style.display = 'block';
        toggleMenuFields();
    }

    function closeModal() { document.getElementById('entry-modal').style.display = 'none'; }
    function openSearch() { document.getElementById('search-modal').style.display = 'block'; }
    function closeSearch() { document.getElementById('search-modal').style.display = 'none'; }
    function changeMonth(diff) { currentViewDate.setMonth(currentViewDate.getMonth() + diff); renderCalendar(); }

    function searchTT() {
        const queryVal = parseFloat(document.getElementById('search-query').value);
        const resultsDiv = document.getElementById('search-results');
        const diaries = JSON.parse(localStorage.getItem('runDiaries')) || [];
        if(isNaN(queryVal)) {
            resultsDiv.innerHTML = '<p style="color:#888; text-align:center;">kmを入力してください</p>';
            return;
        }
        const filtered = diaries.filter(d => d.type === 'タイムトライアル' && parseFloat(d.dist) === queryVal);
        if(filtered.length === 0) {
            resultsDiv.innerHTML = '<p style="color:#888; text-align:center;">記録が見つかりません</p>';
            return;
        }
        resultsDiv.innerHTML = filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).map(d => `
            <div class="search-result-item">
                <div>
                    <div class="search-result-date">${d.date} (${d.weather} ${d.temp})</div>
                    <div class="search-result-info">${d.ttTime}</div>
                </div>
            </div>
        `).join('');
    }

    async function saveDiary() {
        const menuType = document.getElementById('menu-select').value;
        const startTime = document.getElementById('start-time').value;
        const endTime = document.getElementById('end-time').value;
        let dist = 0, detail = "", finalMenuName = menuType, ttTime = "";

        if (menuType === 'ジョグ') {
            dist = parseFloat(document.getElementById('jog-dist').value);
            detail = document.getElementById('jog-res').innerText;
        } else if (menuType === 'インターバル' || menuType === 'レスト') {
            const d = parseFloat(document.getElementById('int-dist').value) || 0;
            const c = parseFloat(document.getElementById('int-count').value) || 0;
            dist = d * c;
            detail = `${d}km×${c} (${document.getElementById('int-rest').value})`;
        } else if (menuType === 'タイムトライアル') {
            dist = parseFloat(document.getElementById('tt-dist-km').value) || 0;
            const m = document.getElementById('tt-min').value || "0";
            const s = document.getElementById('tt-sec').value || "00";
            const ms = document.getElementById('tt-msec').value || "0";
            ttTime = `${m}:${s.toString().padStart(2,'0')}.${ms}`;
            detail = `${dist.toFixed(2)}km TT [${ttTime}]`;
        } else if (menuType === 'ペース走') {
            dist = parseFloat(document.getElementById('pace-dist').value);
            detail = `設定:${document.getElementById('pace-val').value}`;
        } else if (menuType === 'ビルドアップ') {
            dist = parseFloat(document.getElementById('bu-dist').value);
            detail = `${document.getElementById('bu-start').value}→${document.getElementById('bu-end').value}`;
        } else if (menuType === 'その他') {
            dist = parseFloat(document.getElementById('other-dist').value) || 0;
            finalMenuName = document.getElementById('other-menu-name').value || "その他";
            detail = document.getElementById('other-content').value;
        }

        if (isNaN(dist) && menuType !== 'レスト') return alert("データを入力してください");
        const btn = document.getElementById('save-btn');
        btn.innerText = "データ取得中..."; btn.disabled = true;
        let w = "☁️", t = "--°C";
        try {
            const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej));
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true&hourly=temperature_2m,weathercode`);
            const data = await res.json();
            const targetHour = parseInt(startTime.split(':')[0]);
            w = "☀️🌤️☁️☁️🌫️☔☔❄️⚡"[Math.min(data.hourly.weathercode[targetHour] || 0, 8)] || "☁️";
            t = Math.round(data.hourly.temperature_2m[targetHour] || data.current_weather.temperature) + "°C";
        } catch(e) {}
        const diary = { date: selectedDateStr, type: menuType, menu: finalMenuName, dist: dist.toFixed(2), detail: detail, weather: w, temp: t, ttTime: ttTime };
        let diaries = JSON.parse(localStorage.getItem('runDiaries')) || [];
        const idx = diaries.findIndex(d => d.date === selectedDateStr);
        if (idx > -1) diaries[idx] = diary; else diaries.unshift(diary);
        localStorage.setItem('runDiaries', JSON.stringify(diaries));
        btn.innerText = "日誌を保存（天気取得）"; btn.disabled = false;
        closeModal(); renderCalendar();
    }
    window.onload = renderCalendar;
</script>
</body>
</html>
