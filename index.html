<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RUN DIARY - ULTIMATE</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; --card: #ffffff; --today: #fff9c4; --accent: #f9a825; --success: #2ecc71; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }
        
        /* システムモニター (デバッグ用) */
        #system-monitor { font-size: 10px; background: #222; color: #0f0; padding: 8px; border-radius: 8px; margin-bottom: 10px; font-family: monospace; border-left: 4px solid #0f0; word-break: break-all; }

        /* 認証画面 */
        #auth-container { display: flex; align-items: center; justify-content: center; height: 90vh; }
        .auth-box { background: white; padding: 30px; border-radius: 25px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #auth-error { color: #d32f2f; font-size: 0.85rem; margin-top: 15px; background: #ffebee; padding: 10px; border-radius: 8px; display: none; text-align: left; word-break: break-all; white-space: pre-wrap; }

        /* メイン画面 */
        .monthly-stats { background: var(--primary); color: white; padding: 20px; border-radius: 20px; margin-bottom: 15px; text-align: center; }
        .monthly-stats-value { font-size: 2.2rem; font-weight: bold; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-radius: 20px 20px 0 0; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); background: white; border-radius: 0 0 20px 20px; border-top: 1px solid #eee; overflow: hidden; }
        .day-label { text-align: center; font-size: 0.75rem; color: #888; padding: 10px 0; background: #fdfdfd; }
        .day { min-height: 90px; padding: 5px; border-right: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; cursor: pointer; position: relative; }
        .day-num { font-size: 0.8rem; font-weight: bold; }
        .is-today { background: var(--today) !important; border: 2px solid var(--accent) !important; z-index: 1; }
        
        /* 履歴表示 */
        .cal-record { font-size: 0.6rem; margin-top: 4px; padding: 2px 4px; border-radius: 4px; line-height: 1.2; }
        .bg-jog { background-color: #e3f2fd; color: #1565c0; border-left: 3px solid #1565c0; }
        .bg-tt { background-color: #fffde7; color: #f9a825; border-left: 3px solid #f9a825; }
        .bg-rest { background-color: #eeeeee; color: #616161; }

        /* モーダル */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; width: 92%; max-width: 500px; padding: 25px; border-radius: 25px; box-sizing: border-box; }
        input, select, textarea { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 15px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        .btn-save { background: var(--success); color: white; }
        .btn-cancel { background: #eee; color: #666; }
        .dynamic-section { background: #f8f9fa; padding: 12px; border-radius: 12px; border-left: 4px solid var(--primary); margin: 8px 0; }
        .res-preview { color: var(--primary); font-weight: bold; font-size: 0.9rem; margin-top: 4px; }
        .hidden { display: none !important; }
        .search-fab { position: fixed; right: 20px; bottom: 20px; width: 65px; height: 65px; background: var(--accent); color: white; border-radius: 35px; display: flex; justify-content: center; align-items: center; font-size: 28px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: none; z-index: 90; }
    </style>
</head>
<body>

<div id="system-monitor">Wait...</div>

<div id="auth-container">
    <div class="auth-box">
        <h2 style="color:var(--primary)">RUN DIARY</h2>
        <input type="email" id="email" placeholder="メールアドレス">
        <input type="password" id="password" placeholder="パスワード(6文字以上)">
        <button id="auth-btn" class="btn" style="background:var(--primary); color:white;">ログイン / 新規登録</button>
        <div id="auth-error"></div>
    </div>
</div>

<div id="app-container" class="container hidden">
    <div class="monthly-stats">
        <div id="stats-month-label">今月の合計距離</div>
        <div class="monthly-stats-value"><span id="month-total-val">0.00</span> <small>km</small></div>
    </div>
    <div class="cal-header">
        <button onclick="changeMonth(-1)" style="border:none; background:none; font-size:1.5rem;">◀</button>
        <div id="current-month-display" style="font-weight:bold;"></div>
        <button onclick="changeMonth(1)" style="border:none; background:none; font-size:1.5rem;">▶</button>
    </div>
    <div class="calendar" id="calendar-grid"></div>
    <button class="search-fab" onclick="openSearch()">🔍</button>
    <button id="logout-btn" style="width:100%; margin-top:30px; border:none; background:none; color:#999; font-size:0.8rem; text-decoration:underline;">ログアウト</button>
</div>

<div id="entry-modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-date-title" style="margin-top:0; color:var(--primary)"></h3>
        <label style="font-size:0.8rem; color:#666;">開始時間</label>
        <input type="time" id="start-time" value="17:00" oninput="calcJog()">
        
        <label style="font-size:0.8rem; color:#666;">メニュー</label>
        <select id="menu-select" onchange="toggleMenuFields()">
            <option value="ジョグ">ジョグ</option>
            <option value="インターバル">インターバル</option>
            <option value="レストトレーニング">レストトレーニング</option>
            <option value="タイムトライアル">タイムトライアル</option>
            <option value="ペース走">ペース走</option>
            <option value="ビルドアップ">ビルドアップ</option>
            <option value="レスト">レスト(完全休養)</option>
        </select>

        <div id="fields-jog" class="dynamic-section">
            <label style="font-size:0.75rem; color:#666;">終了時刻 (自動計算用)</label>
            <input type="time" id="jog-end-time" oninput="calcJog()">
            <input type="number" id="jog-dist" step="0.01" placeholder="距離 (km)" oninput="calcJog()">
            <input type="number" id="jog-min" placeholder="走行時間 (分)" oninput="calcJog()">
            <div id="jog-res" class="res-preview">ペース: --:--/km</div>
        </div>

        <div id="fields-int" class="dynamic-section" style="display:none;">
            <input type="text" id="int-dist-v2" placeholder="距離 (例: 400m)">
            <input type="text" id="int-time-v2" placeholder="タイム (例: 72秒)">
            <input type="text" id="int-connect-v2" placeholder="つなぎ (例: 200m)">
        </div>

        <div id="fields-rt" class="dynamic-section" style="display:none;">
            <input type="number" id="rt-dist" placeholder="距離(m)">
            <input type="number" id="rt-count" placeholder="本数">
            <input type="number" id="rt-rest" placeholder="休憩(秒)">
            <input type="number" id="rt-time" placeholder="設定タイム(秒)">
        </div>

        <div id="fields-tt" class="dynamic-section" style="display:none;">
            <input type="number" id="tt-dist-km" step="0.01" placeholder="距離 (km)">
            <div style="display:flex; gap:5px; align-items:center;">
                <input type="number" id="tt-min" placeholder="分" style="width:30%">:
                <input type="number" id="tt-sec" placeholder="秒" style="width:30%">.
                <input type="number" id="tt-msec" placeholder="0" style="width:20%">
            </div>
        </div>

        <div id="fields-pace" class="dynamic-section" style="display:none;">
            <input type="number" id="pace-dist" placeholder="距離 (km)">
            <input type="text" id="pace-val" placeholder="設定ペース (例: 4:15)">
        </div>

        <div id="fields-bu" class="dynamic-section" style="display:none;">
            <input type="number" id="bu-dist" placeholder="距離 (km)">
            <input type="text" id="bu-start" placeholder="開始ペース">
            <input type="text" id="bu-end" placeholder="終了ペース">
        </div>

        <textarea id="common-memo" placeholder="メモ・感想" rows="3"></textarea>
        <button class="btn btn-save" id="save-btn" onclick="saveDiary()">保存 (天気を取得)</button>
        <button class="btn btn-cancel" onclick="closeModal()">キャンセル</button>
        <button id="delete-btn" class="btn" style="background:#ff3b30; color:white; display:none;" onclick="deleteDiary()">削除</button>
    </div>
</div>

<div id="search-modal" class="modal">
    <div class="modal-content">
        <h3>TT記録検索</h3>
        <input type="number" id="search-query" step="0.01" placeholder="距離 (km) を入力して検索" oninput="searchTT()">
        <div id="search-results" style="margin-top:20px; max-height:350px; overflow-y:auto; border-top:1px solid #eee;"></div>
        <button class="btn btn-cancel" onclick="closeSearch()">閉じる</button>
    </div>
</div>

<script>
    const log = (m) => { document.getElementById('system-monitor').innerText = "Status: " + m; };

    const firebaseConfig = {
        apiKey: "AIzaSyC0VeVEdEpcRP8dOvJokXq0lg2gBzloVls",
        authDomain: "runnikki-a7d37.firebaseapp.com",
        projectId: "runnikki-a7d37",
        storageBucket: "runnikki-a7d37.appspot.com",
        messagingSenderId: "623990853537",
        appId: "1:623990853537:web:68417f21002106b5c745e0"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentViewDate = new Date();
    let selectedDateStr = "";
    let cachedDiaries = [];

    // --- 認証処理 ---
    const authBtn = document.getElementById('auth-btn');
    const errDiv = document.getElementById('auth-error');

    authBtn.addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        errDiv.style.display = 'none';
        if (!email || !password) return showError("入力してください");

        authBtn.innerText = "通信中...";
        authBtn.disabled = true;

        try {
            await auth.signInWithEmailAndPassword(email, password);
        } catch (error) {
            if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                try {
                    await auth.createUserWithEmailAndPassword(email, password);
                } catch (regErr) {
                    showError("登録エラー: " + regErr.message);
                }
            } else {
                showError("エラー: " + error.code);
            }
        }
        authBtn.innerText = "ログイン / 新規登録";
        authBtn.disabled = false;
    });

    auth.onAuthStateChanged(user => {
        if (user) {
            log("Logged in: " + user.email);
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            loadCloudData();
        } else {
            log("Please Login");
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('app-container').classList.add('hidden');
        }
    });

    function showError(msg) { errDiv.innerText = msg; errDiv.style.display = 'block'; }

    // --- データ処理 ---
    async function loadCloudData() {
        if(!auth.currentUser) return;
        try {
            const snap = await db.collection('users').doc(auth.currentUser.uid).collection('diaries').get();
            cachedDiaries = snap.docs.map(doc => doc.data());
            renderCalendar();
        } catch(e) { log("Sync Error"); }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = "";
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        document.getElementById('current-month-display').innerText = `${year}年 ${month + 1}月`;
        
        ['日','月','火','水','木','金','土'].forEach(l => {
            const el = document.createElement('div'); el.className = 'day-label'; el.innerText = l; grid.appendChild(el);
        });

        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

        let monthlyTotal = 0;
        const nowStr = new Date().toLocaleDateString('sv-SE');

        for (let d = 1; d <= lastDate; d++) {
            const dateStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
            const dayEl = document.createElement('div'); dayEl.className = 'day';
            if (nowStr === dateStr) dayEl.classList.add('is-today');
            dayEl.innerHTML = `<div class="day-num">${d}</div>`;
            
            const record = cachedDiaries.find(item => item.date === dateStr);
            if (record) {
                const typeClass = getColorClass(record.type);
                dayEl.innerHTML += `<div class="cal-record ${typeClass}"><b>${record.dist}k</b><br>${record.weather||''}</div>`;
                monthlyTotal += parseFloat(record.dist || 0);
            }
            dayEl.onclick = () => openModal(dateStr);
            grid.appendChild(dayEl);
        }
        document.getElementById('month-total-val').innerText = monthlyTotal.toFixed(2);
    }

    function toggleMenuFields() {
        const m = document.getElementById('menu-select').value;
        ['fields-jog', 'fields-int', 'fields-rt', 'fields-tt', 'fields-pace', 'fields-bu'].forEach(id => document.getElementById(id).style.display = 'none');
        const target = {'ジョグ':'fields-jog','インターバル':'fields-int','レストトレーニング':'fields-rt','タイムトライアル':'fields-tt','ペース走':'fields-pace','ビルドアップ':'fields-bu'}[m];
        if(target) document.getElementById(target).style.display = 'block';
    }

    function calcJog() {
        const start = document.getElementById('start-time').value;
        const end = document.getElementById('jog-end-time').value;
        const distInput = document.getElementById('jog-dist');
        const minInput = document.getElementById('jog-min');

        // 時刻からの自動計算
        if(start && end) {
            const [sH, sM] = start.split(':').map(Number);
            const [eH, eM] = end.split(':').map(Number);
            let diff = (eH * 60 + eM) - (sH * 60 + sM);
            if(diff < 0) diff += 1440; // 日またぎ対応
            minInput.value = diff;
        }

        const d = parseFloat(distInput.value);
        const m = parseFloat(minInput.value);
        if(d > 0 && m > 0) {
            const paceSec = (m * 60) / d;
            document.getElementById('jog-res').innerText = `ペース: ${Math.floor(paceSec/60)}:${Math.round(paceSec%60).toString().padStart(2,'0')}/km`;
        }
    }

    function getColorClass(type) {
        return {'ジョグ':'bg-jog', 'タイムトライアル':'bg-tt', 'レスト':'bg-rest'}[type] || 'bg-jog';
    }

    function openModal(dateStr) {
        selectedDateStr = dateStr;
        document.getElementById('modal-date-title').innerText = dateStr.replace(/-/g, '/');
        const rec = cachedDiaries.find(r => r.date === dateStr);
        document.getElementById('delete-btn').style.display = rec ? 'block' : 'none';
        
        if(rec) {
            document.getElementById('menu-select').value = rec.type;
            document.getElementById('start-time').value = rec.time || "17:00";
            document.getElementById('common-memo').value = rec.memo || "";
        }
        document.getElementById('entry-modal').style.display = 'block';
        toggleMenuFields();
    }

    function closeModal() { document.getElementById('entry-modal').style.display = 'none'; }
    function openSearch() { document.getElementById('search-modal').style.display = 'block'; }
    function closeSearch() { document.getElementById('search-modal').style.display = 'none'; }
    function changeMonth(diff) { currentViewDate.setMonth(currentViewDate.getMonth() + diff); renderCalendar(); }
    
    function searchTT() {
        const q = parseFloat(document.getElementById('search-query').value);
        const resDiv = document.getElementById('search-results');
        const filtered = cachedDiaries.filter(d => d.type === 'タイムトライアル' && (!q || parseFloat(d.dist) === q));
        resDiv.innerHTML = filtered.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(d => 
            `<div style="padding:12px; border-bottom:1px solid #eee;"><b>${d.date}</b>: ${d.dist}km [${d.ttTime}]</div>`
        ).join('');
    }

    async function deleteDiary() {
        if(confirm("削除しますか？")) {
            await db.collection('users').doc(auth.currentUser.uid).collection('diaries').doc(selectedDateStr).delete();
            closeModal(); loadCloudData();
        }
    }

    async function saveDiary() {
        const menu = document.getElementById('menu-select').value;
        let dist = 0, detail = "", ttTime = "";
        
        if (menu === 'ジョグ') {
            dist = parseFloat(document.getElementById('jog-dist').value) || 0;
            detail = document.getElementById('jog-res').innerText;
        } else if (menu === 'タイムトライアル') {
            dist = parseFloat(document.getElementById('tt-dist-km').value) || 0;
            ttTime = `${document.getElementById('tt-min').value}:${document.getElementById('tt-sec').value.padStart(2,'0')}.${document.getElementById('tt-msec').value}`;
            detail = `TT: ${ttTime}`;
        } else if (menu === 'レストトレーニング') {
            const d = parseFloat(document.getElementById('rt-dist').value)||0;
            const c = parseFloat(document.getElementById('rt-count').value)||0;
            dist = (d * c) / 1000;
            detail = `${d}m×${c} (T:${document.getElementById('rt-time').value}s / R:${document.getElementById('rt-rest').value}s)`;
        } else if (menu === 'インターバル') {
            detail = `${document.getElementById('int-dist-v2').value} / ${document.getElementById('int-time-v2').value}`;
        }

        const btn = document.getElementById('save-btn');
        btn.innerText = "天気取得＆保存中..."; btn.disabled = true;

        let weather = "☁️--";
        try {
            const pos = await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:3000}));
            const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&hourly=weathercode,temperature_2m&start_date=${selectedDateStr}&end_date=${selectedDateStr}&timezone=Asia%2FTokyo`);
            const wData = await wRes.json();
            const h = parseInt(document.getElementById('start-time').value.split(':')[0]);
            const icons = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",61:"☔",95:"⚡"};
            weather = (icons[wData.hourly.weathercode[h]] || "☁️") + Math.round(wData.hourly.temperature_2m[h]) + "℃";
        } catch(e) { log("Weather Skip"); }

        const data = {
            date: selectedDateStr, type: menu, dist: dist.toFixed(2), detail: detail, 
            weather: weather, ttTime: ttTime, memo: document.getElementById('common-memo').value,
            time: document.getElementById('start-time').value
        };

        try {
            await db.collection('users').doc(auth.currentUser.uid).collection('diaries').doc(selected
