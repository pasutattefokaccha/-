<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Running Share</title>
    <!-- CSS: Tailwind CSS (デザイン) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- JS: Vue.js (動く仕組み) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- JS: Supabase (データベース) -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-4">
    <div id="app" class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold text-center mb-6">🏃‍♂️ ラン記録共有</h1>

        <!-- 入力フォーム -->
        <div class="space-y-3 mb-8">
            <input v-model="newName" type="text" placeholder="名前" class="w-full border p-2 rounded">
            <div class="flex gap-2">
                <input v-model="newDistance" type="number" step="0.1" placeholder="距離(km)" class="flex-1 border p-2 rounded">
                <button @click="saveRun" class="bg-blue-500 text-white px-4 py-2 rounded font-bold">記録！</button>
            </div>
        </div>

        <!-- 記録一覧 -->
        <div class="space-y-4">
            <div v-for="run in runs" :key="run.id" class="border-b pb-2 flex justify-between items-center">
                <div>
                    <div class="font-bold text-lg">{{ run.distance }} km</div>
                    <div class="text-sm text-gray-500">{{ run.name }}</div>
                </div>
                <div class="text-xs text-gray-400">{{ formatDate(run.date) }}</div>
            </div>
        </div>
    </div>

    <script>
        // --- 設定：SupabaseのURLとキーに書き換えてください ---
        const SUPABASE_URL = 'あなたのURL';
        const SUPABASE_KEY = 'あなたのAPIキー';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const runs = ref([]);
                const newName = ref('');
                const newDistance = ref('');

                // データを取得する
                const fetchRuns = async () => {
                    const { data } = await supabase.from('runs').select('*').order('date', { ascending: false });
                    runs.value = data;
                };

                // データを保存する
                const saveRun = async () => {
                    if (!newName.value || !newDistance.value) return alert('入力してください');
                    await supabase.from('runs').insert([{ name: newName.value, distance: parseFloat(newDistance.value) }]);
                    newName.value = '';
                    newDistance.value = '';
                    fetchRuns();
                };

                const formatDate = (dateStr) => new Date(dateStr).toLocaleDateString();

                onMounted(fetchRuns);

                return { runs, newName, newDistance, saveRun, formatDate };
            }
        }).mount('#app');
    </script>
</body>
</html>
