<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO RUN DIARY - Full Spec</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; --card: #ffffff; --today: #fff9c4; --success: #2ecc71; --accent: #f9a825; --rest: #95a5a6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }
        
        /* 認証デバッグ表示 */
        #debug-monitor { font-size: 10px; background: #333; color: #0f0; padding: 5px 10px; border-radius: 5px; margin-bottom: 10px; font-family: monospace; }
        
        #auth-container { display: flex; align-items: center; justify-content: center; height: 80vh; flex-direction: column; }
        .auth-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .monthly-header { background: var(--primary); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 15px; }
        .monthly-total { font-size: 2.2rem; font-weight: bold; }

        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .day-label { text-align: center; font-size: 0.7rem; color: #888; padding: 8px 0; border-bottom: 1px solid #eee; }
        .day { min-height: 90px; padding: 5px; border-right: 0.5px solid #f0f0f0; border-bottom: 0.5px solid #f0f0f0; cursor: pointer; transition: 0.2s; }
        .day:active { background: #f0f0f0; }
        .day-num { font-size: 0.8rem; font-weight: bold; margin-bottom: 4px; }
        .is-today { background-color: var(--today) !important; border: 2px solid var(--accent) !important; z-index: 1; }
        
        /* メニュー別色分け */
        .cal-record { font-size: 0.6rem; padding: 3px; border-radius: 4px; margin-top: 2px; border-left: 3px solid #ccc; line-height: 1.2; }
        .bg-jog { background: #e3f2fd; color: #1565c0; border-left-color: #1565c0; }
        .bg-int { background: #ffebee; color: #c62828; border-left-color: #c62828; }
        .bg-tt { background: #fffde7; color: #f9a825; border-left-color: #f9a825; }
        .bg-pace { background: #f1f8e9; color: #2e7d32; border-left-color: #2e7d32; }
        .bg-bu { background: #f3e5f5; color: #7b1fa2; border-left-color: #7b1fa2; }
        .bg-rest { background: #f5f5f5; color: #616161; border-left-color: var(--rest); }
        .bg-other { background: #f0f4f8; color: #334e68; border-left-color: #334e68; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; width: 92%; max-width: 500px; padding: 20px; border-radius: 20px; box-sizing: border-box; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 15px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        .btn-save { background: var(--success); color: white; }
        .hidden { display: none !important; }
        .dynamic-section { background: #f8f9fa; padding: 12px; border-radius: 12px; border-left: 4px solid var(--primary); margin: 8px 0; }
        .res-preview { color: var(--primary); font-weight: bold; font-size: 0.9rem; margin: 5px 0; }

        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--accent); color: white; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: none; z-index: 90; }
        
        /* 検索テーブル */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; background: white; }
        th { background: #f8f9fa; padding: 12px 5px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 12px 5px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="debug-monitor">System: Initializing...</div>

<div id="auth-container">
    <div class="auth-box">
        <h2 style="color:var(--primary); margin-top:0;">RUN DIARY</h2>
        <input type="email" id="email" placeholder="メールアドレス">
        <input type="password" id="password" placeholder="パスワード">
        <button onclick="handleLogin()" class="btn" style="background:var(--primary); color:white;">ログイン</button>
        <button onclick="handleSignup()" class="btn" style="background:#5856d6; color:white;">新規登録</button>
        <p id="auth-error" style="color:red; font-size:0.8rem; margin-top:10px; font-weight:bold;"></p>
    </div>
</div>

<div id="app-container" class="container hidden">
    <div class="monthly-header">
        <div id="month-label" style="font-size:0.9rem; opacity:0.9;"></div>
        <div class="monthly-total"><span id="month-total-val">0.00</span> <small style="font-size: 1rem;">km</small></div>
    </div>
    <div class="calendar" id="calendar-grid"></div>
    <button onclick="auth.signOut()" class="btn" style="background:none; color:#999; font-size:0.8rem;">ログアウト</button>
    <button class="fab" onclick="openSearch()">🔍</button>
</div>

<div id="entry-modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-date-title" style="margin-top:0;"></h3>
        
        <label style="font-size:0.8rem; color:#666;">練習時間</label>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="time" id="start-time" value="17:00"><span>〜</span><input type="time" id="end-time" value="18:00">
        </div>

        <div style="background:#f0f4f8; padding:12px; border-radius:12px; margin-bottom:12px;">
            <label style="font-size:0.85rem; font-weight:bold;">📍 天気取得地点</label>
            <div style="display:flex; gap:15px; margin-top:8px;">
                <label><input type="radio" name="loc-type" value="gps" checked onchange="toggleLoc()"> GPS</label>
                <label><input type="radio" name="loc-type" value="manual" onchange="toggleLoc()"> 手動(市区町村)</label>
            </div>
            <input type="text" id="loc-manual-input" placeholder="例: 西東京市" style="display:none; border-color:#ccc; margin-top:8px;">
        </div>

        <select id="menu-select" onchange="switchFields()">
            <option value="ジョグ">ジョグ</option>
            <option value="インターバル">インターバル</option>
            <option value="タイムトライアル">タイムトライアル</option>
            <option value="ペース走">ペース走</option>
            <option value="ビルドアップ">ビルドアップ</option>
            <option value="レスト">レスト</option>
            <option value="その他">その他</option>
        </select>

        <div id="sect-jog" class="menu-sect dynamic-section">
            <input type="number" id="jog-dist" step="0.01" placeholder="距離 (km)" oninput="calcJog()">
            <input type="number" id="jog-min" placeholder="時間 (分)" oninput="calcJog()">
            <div id="jog-res" class="res-preview">ペース: --:--/km</div>
        </div>

        <div id="sect-int" class="menu-sect dynamic-section" style="display:none;">
            <input type="number" id="int-dist" placeholder="1本の距離 (km)">
            <input type="number" id="int-count" placeholder="本数">
            <input type="text" id="int-rest" placeholder="レスト (例: 200m 70秒)">
        </div>

        <div id="sect-tt" class="menu-sect dynamic-section" style="display:none;">
            <input type="number" id="tt-dist" placeholder="距離 (km)">
            <div style="display:flex; gap:5px; align-items:center;">
                <input type="number" id="tt-min" placeholder="分"><span>:</span>
                <input type="number" id="tt-sec" placeholder="秒" max="59"><span>.</span>
                <input type="number" id="tt-msec" placeholder="0" max="9">
            </div>
        </div>

        <div id="sect-pace" class="menu-sect dynamic-section" style="display:none;">
            <input type="number" id="pace-dist" placeholder="距離 (km)" oninput="calcPaceTime()">
            <input type="text" id="pace-val" placeholder="設定ペース (例: 4:15)" oninput="calcPaceTime()">
            <div id="pace-res" class="res-preview">合計タイム: --:--</div>
        </div>

        <div id="sect-bu" class="menu-sect dynamic-section" style="display:none;">
            <input type="number" id="bu-dist" placeholder="距離 (km)">
            <input type="text" id="bu-min-pace" placeholder="開始(最小)ペース">
            <input type="text" id="bu-max-pace" placeholder="終了(最大)ペース">
        </div>

        <div id="sect-rest" class="menu-sect dynamic-section" style="display:none;">
            <input type="text" id="rest-memo" placeholder="レスト内容 (例: 20分完全休養)">
        </div>

        <div id="sect-other" class="menu-sect dynamic-section" style="display:none;">
            <input type="number" id="other-dist" placeholder="距離 (km)">
            <textarea id="other-memo" placeholder="メニュー内容を自由に記載" rows="3"></textarea>
        </div>

        <button class="btn btn-save" id="save-btn" onclick="saveDiary()">保存 (天気を取得)</button>
        <button class="btn" style="background:#eee;" onclick="closeModal()">キャンセル</button>
    </div>
</div>

<div id="search-modal" class="modal">
    <div class="modal-content" style="max-width:650px;">
        <h3>タイムトライアル記録一覧</h3>
        <input type="number" id="search-dist" placeholder="距離(km)でフィルタ">
        <button class="btn" style="background:var(--accent); color:white;" onclick="runSearch()">検索</button>
        <div style="max-height: 400px; overflow-y: auto; margin-top:15px;">
            <table id="search-results-table">
                <thead><tr><th>日付</th><th>距離</th><th>タイム</th><th>天気</th></tr></thead>
                <tbody id="search-body"></tbody>
            </table>
        </div>
        <button class="btn" style="background:#eee; margin-top:20px;" onclick="closeSearch()">閉じる</button>
    </div>
</div>

<script>
    const debug = (msg) => { document.getElementById('debug-monitor').innerText = "System: " + msg; };

    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyC0VeVEdEpcRP8dOvJokXq0lg2gBzloVls",
        authDomain: "runnikki-a7d37.firebaseapp.com",
        projectId: "runnikki-a7d37",
        storageBucket: "runnikki-a7d37.firebasestorage.app",
        messagingSenderId: "623990853537",
        appId: "1:623990853537:web:68417f21002106b5c745e0"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let cachedDiaries = [];
    let selectedDate = "";

    // 認証監視
    auth.onAuthStateChanged(user => {
        if (user) {
            debug("Logged in as " + user.email);
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            loadData();
        } else {
            debug("Not logged in.");
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('app-container').classList.add('hidden');
        }
    });

    async function handleLogin() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        debug("Attempting Login...");
        try { await auth.signInWithEmailAndPassword(e, p); } 
        catch(err) { debug("Error: " + err.code); document.getElementById('auth-error').innerText = err.message; }
    }

    async function handleSignup() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        debug("Attempting Signup...");
        try { await auth.createUserWithEmailAndPassword(e, p); } 
        catch(err) { debug("Error: " + err.code); document.getElementById('auth-error').innerText = err.message; }
    }

    // データ処理
    async function loadData() {
        if(!auth.currentUser) return;
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('diaries').get();
        cachedDiaries = snap.docs.map(doc => doc.data());
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = "";
        const now = new Date();
        const y = now.getFullYear(); const m = now.getMonth();
        const last = new Date(y, m+1, 0).getDate();
        const firstDay = new Date(y, m, 1).getDay();
        
        document.getElementById('month-label').innerText = `${y}年 ${m+1}月`;
        
        ['日','月','火','水','木','金','土'].forEach(d => {
            const el = document.createElement('div'); el.className = 'day-label'; el.innerText = d; grid.appendChild(el);
        });

        for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));

        const todayStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;
        let total = 0;

        for(let d=1; d<=last; d++) {
            const ds = `${y}-${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
            const el = document.createElement('div'); 
            el.className = 'day' + (ds === todayStr ? ' is-today' : '');
            el.innerHTML = `<div class="day-num">${d}</div>`;
            
            const rec = cachedDiaries.find(r => r.date === ds);
            if(rec) {
                total += parseFloat(rec.dist || 0);
                const typeClass = {'ジョグ':'bg-jog','インターバル':'bg-int','タイムトライアル':'bg-tt','ペース走':'bg-pace','ビルドアップ':'bg-bu','レスト':'bg-rest','その他':'bg-other'}[rec.type] || '';
                el.innerHTML += `<div class="cal-record ${typeClass}">
                    <b>${rec.dist}k</b> ${rec.weather.split('℃')[0]}<br>
                    <span style="font-size:0.55rem">${rec.type}</span>
                </div>`;
            }
            el.onclick = () => openModal(ds);
            grid.appendChild(el);
        }
        document.getElementById('month-total-val').innerText = total.toFixed(2);
    }

    // 計算・UI制御
    function toggleLoc() {
        document.getElementById('loc-manual-input').style.display = 
            document.querySelector('input[name="loc-type"]:checked').value === 'manual' ? 'block' : 'none';
    }

    function switchFields() {
        const menu = document.getElementById('menu-select').value;
        document.querySelectorAll('.menu-sect').forEach(s => s.style.display = 'none');
        const map = {'ジョグ':'sect-jog','インターバル':'sect-int','タイムトライアル':'sect-tt','ペース走':'sect-pace','ビルドアップ':'sect-bu','レスト':'sect-rest','その他':'sect-other'};
        if(map[menu]) document.getElementById(map[menu]).style.display = 'block';
    }

    function calcJog() {
        const d = parseFloat(document.getElementById('jog-dist').value);
        const m = parseFloat(document.getElementById('jog-min').value);
        if(d && m) {
            const s = (m * 60) / d;
            document.getElementById('jog-res').innerText = `ペース: ${Math.floor(s/60)}:${Math.round(s%60).toString().padStart(2,'0')}/km`;
        }
    }

    function calcPaceTime() {
        const d = parseFloat(document.getElementById('pace-dist').value);
        const pStr = document.getElementById('pace-val').value;
        if(d && pStr.includes(':')) {
            const [m, s] = pStr.split(':').map(Number);
            const totalSec = (m * 60 + s) * d;
            document.getElementById('pace-res').innerText = `合計タイム: ${Math.floor(totalSec/60)}分${Math.round(totalSec%60)}秒`;
        }
    }

    function openModal(d) { selectedDate = d; document.getElementById('modal-date-title').innerText = d; document.getElementById('entry-modal').style.display = 'block'; switchFields(); }
    function closeModal() { document.getElementById('entry-modal').style.display = 'none'; }
    function openSearch() { document.getElementById('search-modal').style.display = 'block'; runSearch(); }
    function closeSearch() { document.getElementById('search-modal').style.display = 'none'; }

    function runSearch() {
        const q = parseFloat(document.getElementById('search-dist').value);
        const results = cachedDiaries.filter(r => r.type === 'タイムトライアル' && (!q || parseFloat(r.dist) === q));
        results.sort((a,b) => a.date < b.date ? 1 : -1);
        const body = document.getElementById('search-body');
        body.innerHTML = results.length ? results.map(r => `<tr><td>${r.date}</td><td>${r.dist}km</td><td><b>${r.detail}</b></td><td>${r.weather}</td></tr>`).join('') : '<tr><td colspan="4" style="text-align:center;">記録なし</td></tr>';
    }

    async function saveDiary() {
        const btn = document.getElementById('save-btn'); btn.disabled = true;
        const menu = document.getElementById('menu-select').value;
        let dist = 0, detail = "";

        if(menu==='ジョグ') {
            dist = parseFloat(document.getElementById('jog-dist').value)||0;
            detail = document.getElementById('jog-res').innerText;
        } else if(menu==='インターバル') {
            dist = (parseFloat(document.getElementById('int-dist').value)||0) * (parseInt(document.getElementById('int-count').value)||0);
            detail = `${document.getElementById('int-count').value}本 (${document.getElementById('int-rest').value})`;
        } else if(menu==='タイムトライアル') {
            dist = parseFloat(document.getElementById('tt-dist').value)||0;
            detail = `${document.getElementById('tt-min').value}:${document.getElementById('tt-sec').value.padStart(2,'0')}.${document.getElementById('tt-msec').value}`;
        } else if(menu==='ビルドアップ') {
            dist = parseFloat(document.getElementById('bu-dist').value)||0;
            detail = `${document.getElementById('bu-min-pace').value}→${document.getElementById('bu-max-pace').value}`;
        } else if(menu==='ペース走') {
            dist = parseFloat(document.getElementById('pace-dist').value)||0;
            detail = `${document.getElementById('pace-val').value}/km (${document.getElementById('pace-res').innerText})`;
        } else if(menu==='レスト') {
            detail = document.getElementById('rest-memo').value;
        } else if(menu==='その他') {
            dist = parseFloat(document.getElementById('other-dist').value)||0;
            detail = document.getElementById('other-memo').value;
        }

        // 天気取得
        let weather = "☁️--";
        try {
            let lat, lon;
            if (document.querySelector('input[name="loc-type"]:checked').value === 'gps') {
                const pos = await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej));
                lat = pos.coords.latitude; lon = pos.coords.longitude;
            } else {
                const city = document.getElementById('loc-manual-input').value;
                const gRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=ja`);
                const gData = await gRes.json();
                lat = gData.results[0].latitude; lon = gData.results[0].longitude;
            }
            const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=weathercode,temperature_2m&start_date=${selectedDate}&end_date=${selectedDate}&timezone=Asia%2FTokyo`);
            const wData = await wRes.json();
            const hour = parseInt(docu
