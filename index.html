<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ラン日誌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1-fr); gap: 2px; }
        .dot { width: 4px; height: 4px; border-radius: 50%; background-color: #6366f1; margin: 0 auto; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 font-sans text-slate-900">
    <div id="app" class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200 min-h-[90vh]">
        <!-- ヘッダー -->
        <div class="bg-gradient-to-br from-indigo-700 to-blue-500 p-6 text-white text-center">
            <h1 class="text-3xl font-black italic tracking-tighter">ラン日誌</h1>
            <div class="mt-2 inline-flex bg-white/20 rounded-full p-1 text-[10px] font-bold">
                <button @click="view = 'calendar'" :class="view === 'calendar' ? 'bg-white text-indigo-600' : ''" class="px-4 py-1 rounded-full transition-all">カレンダー</button>
                <button @click="view = 'entry'" :class="view === 'entry' ? 'bg-white text-indigo-600' : ''" class="px-4 py-1 rounded-full transition-all">+ 記録する</button>
            </div>
        </div>

        <div class="p-4">
            <!-- 記録入力ビュー -->
            <div v-if="view === 'entry'" class="space-y-4 bg-slate-50 p-5 rounded-2xl border border-slate-100 shadow-inner">
                <div class="grid grid-cols-3 gap-2 mb-2">
                    <button v-for="m in modes" :key="m" @click="changeMode(m)" :class="form.mode === m ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-200 text-slate-500'" class="text-[9px] py-2 rounded-lg font-black transition-all uppercase">{{ m }}</button>
                </div>
                
                <!-- 距離 ＋ 単位 -->
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">距離</label>
                    <div class="flex items-end gap-2">
                        <input v-model="form.distance" @input="autoCalc" type="number" step="0.01" class="flex-1 border-b-2 border-slate-200 bg-transparent p-1 text-xl font-bold outline-none focus:border-indigo-500 text-right">
                        <select v-model="form.unit" @change="autoCalc" class="bg-white border-2 border-slate-200 rounded-lg px-2 py-1 font-bold text-xs outline-none focus:border-indigo-500">
                            <option value="km">km</option><option value="m">m</option>
                        </select>
                    </div>
                </div>

                <!-- タイム -->
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">タイム</label>
                    <div class="flex items-end gap-2 text-lg font-bold">
                        <input v-model="form.dur_m" @input="autoCalc" type="number" placeholder="0" class="flex-1 border-b-2 border-slate-200 bg-transparent p-1 outline-none focus:border-indigo-500 text-right">
                        <span class="text-xs pb-1">分</span>
                        <input v-model="form.dur_s" @input="autoCalc" type="number" placeholder="00" class="flex-1 border-b-2 border-slate-200 bg-transparent p-1 outline-none focus:border-indigo-500 text-right">
                        <span class="text-xs pb-1">秒</span>
                    </div>
                </div>

                <!-- ペース計算 -->
                <div v-if="['ジョグ', 'ペース走', 'ビルドアップ'].includes(form.mode)">
                    <label class="text-[10px] font-bold text-indigo-500 uppercase italic">計算ペース (/km)</label>
                    <div class="flex items-end gap-2 text-indigo-600 font-bold text-lg">
                        <input v-model="form.pace_m" @input="autoCalc" type="number" class="flex-1 border-b-2 border-slate-300 bg-transparent p-1 outline-none focus:border-indigo-500 text-right">
                        <span class="text-xs pb-1">分</span>
                        <input v-model="form.pace_s" @input="autoCalc" type="number" class="flex-1 border-b-2 border-slate-300 bg-transparent p-1 outline-none focus:border-indigo-500 text-right">
                        <span class="text-xs pb-1">秒</span>
                    </div>
                </div>

                <div v-if="['インターバル', 'レストトレーニング'].includes(form.mode)" class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-bold text-slate-400">本数</label><input v-model="form.sets" type="number" class="w-full border-b-2 border-slate-200 bg-transparent p-1 font-bold outline-none focus:border-indigo-500"></div>
                    <div><label class="text-[10px] font-bold text-slate-400">休憩(秒)</label><input v-model="form.rest" type="number" class="w-full border-b-2 border-slate-200 bg-transparent p-1 font-bold outline-none focus:border-indigo-500"></div>
                </div>

                <textarea v-model="form.note" rows="2" class="w-full border-2 border-slate-200 rounded-xl p-3 outline-none focus:border-indigo-500 text-xs font-medium" placeholder="メモ..."></textarea>
                <button @click="saveRun" :disabled="loading" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-xl">
                    {{ loading ? '送信中...' : '記録！！' }}
                </button>
            </div>

            <!-- カレンダービュー -->
            <div v-if="view === 'calendar'" class="space-y-4">
                <!-- 月切り替え -->
                <div class="flex justify-between items-center px-2">
                    <button @click="prevMonth" class="p-2 font-bold text-indigo-600">←</button>
                    <div class="text-center">
                        <div class="text-xl font-black italic">{{ currentYear }} / {{ currentMonth + 1 }}</div>
                        <div class="text-[10px] font-bold text-slate-400">月間走行距離: {{ monthlyTotal }} km</div>
                    </div>
                    <button @click="nextMonth" class="p-2 font-bold text-indigo-600">→</button>
                </div>

                <!-- カレンダー本体 -->
                <div class="grid grid-cols-7 text-center text-[10px] font-black text-slate-300 mb-1">
                    <div v-for="d in ['SUN','MON','TUE','WED','THU','FRI','SAT']">{{d}}</div>
                </div>
                <div class="grid grid-cols-7 gap-1">
                    <div v-for="blank in firstDayOfMonth" class="h-12"></div>
                    <div v-for="day in daysInMonth" :key="day" 
                         @click="selectDay(day)"
                         :class="isSelected(day) ? 'bg-indigo-600 text-white rounded-xl shadow-md' : 'text-slate-700'"
                         class="h-12 flex flex-col items-center justify-center cursor-pointer transition-all hover:bg-slate-100 rounded-xl relative">
                        <span class="font-bold text-xs">{{ day }}</span>
                        <div v-if="hasData(day)" class="dot mt-1" :class="isSelected(day) ? 'bg-white' : ''"></div>
                    </div>
                </div>

                <!-- 選択日の詳細表示 -->
                <div v-if="selectedDateRecords.length" class="mt-6 space-y-3 animate-fade-in">
                    <h3 class="text-xs font-black text-slate-400 uppercase border-b border-slate-100 pb-1">{{ currentMonth+1 }}月{{ selectedDay }}日の記録</h3>
                    <div v-for="run in selectedDateRecords" :key="run.id" class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-[9px] font-black bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded uppercase">{{ run.mode }}</span>
                        </div>
                        <div class="text-2xl font-black text-slate-800 tracking-tighter">{{ run.distance }} <span class="text-xs font-normal text-slate-400 uppercase">km</span></div>
                        <div class="text-[10px] text-slate-500 mt-1 font-bold uppercase flex flex-wrap gap-2">
                            <span v-if="run.duration">⏱ {{ formatTime(run.duration) }}</span>
                            <span v-if="run.pace && !['TT', 'レストトレーニング'].includes(run.mode)">📈 {{ formatTime(run.pace) }}/km</span>
                        </div>
                        <div v-if="run.note" class="mt-2 text-[11px] text-slate-600 italic bg-white p-2 rounded-lg border-l-2 border-indigo-400">"{{ run.note }}"</div>
                    </div>
                </div>
                <div v-else class="text-center py-10 text-slate-300 text-[10px] font-bold uppercase tracking-widest">
                    日付をタップすると詳細が見れます
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        const SUPABASE_URL = 'https://gzbczdezunhooqsfuipk.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_HxQHVDlq0fgVjiOB4yeKOg_OJEYBhU_';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        createApp({
            setup() {
                const view = ref('calendar');
                const modes = ['ジョグ', 'インターバル', 'ペース走', 'TT', 'ビルドアップ', 'レストトレーニング'];
                const runs = ref([]);
                const loading = ref(false);
                const form = ref({ mode: 'ジョグ', distance: '', unit: 'km', dur_m: '', dur_s: '', pace_m: '', pace_s: '', sets: '', rest: '', note: '' });

                // カレンダー管理
                const now = new Date();
                const currentYear = ref(now.getFullYear());
                const currentMonth = ref(now.getMonth());
                const selectedDay = ref(now.getDate());

                const daysInMonth = computed(() => new Date(currentYear.value, currentMonth.value + 1, 0).getDate());
                const firstDayOfMonth = computed(() => new Date(currentYear.value, currentMonth.value, 1).getDay());

                const fetchRuns = async () => {
                    const { data } = await _supabase.from('runs').select('*').order('created_at', { ascending: false });
                    if (data) runs.value = data;
                };

                const hasData = (day) => {
                    return runs.value.some(r => {
                        const d = new Date(r.created_at);
                        return d.getFullYear() === currentYear.value && d.getMonth() === currentMonth.value && d.getDate() === day;
                    });
                };

                const isSelected = (day) => selectedDay.value === day;
                const selectDay = (day) => selectedDay.value = day;

                const selectedDateRecords = computed(() => {
                    return runs.value.filter(r => {
                        const d = new Date(r.created_at);
                        return d.getFullYear() === currentYear.value && d.getMonth() === currentMonth.value && d.getDate() === selectedDay.value;
                    });
                });

                const monthlyTotal = computed(() => {
                    const total = runs.value.reduce((acc, r) => {
                        const d = new Date(r.created_at);
                        if (d.getFullYear() === currentYear.value && d.getMonth() === currentMonth.value) return acc + r.distance;
                        return acc;
                    }, 0);
                    return total.toFixed(2);
                });

                const prevMonth = () => { if (currentMonth.value === 0) { currentYear.value--; currentMonth.value = 11; } else { currentMonth.value--; } };
                const nextMonth = () => { if (currentMonth.value === 11) { currentYear.value++; currentMonth.value = 0; } else { currentMonth.value++; } };

                // 計算ロジック
                const getSec = (m, s) => (parseInt(m || 0) * 60) + parseInt(s || 0);
                const setFromSec = (total) => {
                    if (!total || total <= 0 || !isFinite(total)) return { m: '', s: '' };
                    return { m: Math.floor(total / 60), s: Math.round(total % 60).toString().padStart(2, '0') };
                };
                const autoCalc = () => {
                    const distKm = form.value.unit === 'm' ? parseFloat(form.value.distance) / 1000 : parseFloat(form.value.distance);
                    const dur = getSec(form.value.dur_m, form.value.dur_s);
                    const pace = getSec(form.value.pace_m, form.value.pace_s);
                    if (form.value.mode === 'ジョグ' && distKm && dur) { const res = setFromSec(dur / distKm); form.value.pace_m = res.m; form.value.pace_s = res.s; }
                    else if (form.value.mode === 'ペース走') {
                        if (distKm && dur && !form.value.pace_m) { const res = setFromSec(dur / distKm); form.value.pace_m = res.m; form.value.pace_s = res.s; }
                        else if (distKm && pace && !form.value.dur_m) { const res = setFromSec(distKm * pace); form.value.dur_m = res.m; form.value.dur_s = res.s; }
                    }
                };

                const saveRun = async () => {
                    loading.value = true;
                    const distKm = form.value.unit === 'm' ? parseFloat(form.value.distance) / 1000 : parseFloat(form.value.distance);
                    const dur = (form.value.dur_m || form.value.dur_s) ? `${form.value.dur_m || 0}:${(form.value.dur_s || 0).toString().padStart(2,'0')}` : null;
                    const pace = (form.value.pace_m || form.value.pace_s) ? `${form.value.pace_m || 0}:${(form.value.pace_s || 0).toString().padStart(2,'0')}` : null;

                    const { error } = await _supabase.from('runs').insert([{
                        mode: form.value.mode, distance: distKm || 0, duration: dur,
                        sets: form.value.sets || null, rest: form.value.rest?.toString() || null,
                        pace: pace, note: form.value.note
                    }]);
                    if (!error) { 
                        await fetchRuns(); 
                        view.value = 'calendar';
                        Object.keys(form.value).forEach(k => { if(k!=='mode'&&k!=='unit') form.value[k]='' });
                    }
                    loading.value = false;
                };

                const formatTime = (s) => {
                    const [m, sec] = s.split(':');
                    return `${m}分${sec.padStart(2, '0')}秒`;
                };
                const formatDate = (s) => {
                    const d = new Date(s);
                    return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}`;
                };

                onMounted(fetchRuns);
                return { view, modes, form, runs, loading, currentYear, currentMonth, selectedDay, daysInMonth, firstDayOfMonth, hasData, isSelected, selectDay, selectedDateRecords, monthlyTotal, prevMonth, nextMonth, saveRun, formatTime, formatDate, autoCalc, changeMode: (m) => form.value.mode = m };
            }
        }).mount('#app');
    </script>
</body>
</html>
