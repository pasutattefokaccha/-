<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Running Logger Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 p-4">
    <div id="app" class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-xl border border-slate-200">
        <h1 class="text-2xl font-black text-center mb-6 text-slate-800">🏃‍♂️ RUNNING LOG</h1>

        <!-- モード選択 -->
        <div class="mb-6">
            <label class="block text-sm font-bold text-slate-700 mb-2">トレーニングモード</label>
            <select v-model="form.mode" class="w-full border-2 border-slate-200 p-3 rounded-lg bg-white focus:border-blue-500 outline-none transition-all">
                <option value="ジョグ">🏃 ジョグ</option>
                <option value="インターバル">⚡ インターバル</option>
                <option value="ペース走">⏱ ペース走</option>
                <option value="TT">🏁 TT (タイムトライアル)</option>
                <option value="ビルドアップ">📈 ビルドアップ</option>
                <option value="レスト">🧘 レストトレーニング</option>
            </select>
        </div>

        <!-- 入力フォーム (モードによって表示が変わる) -->
        <div class="space-y-4 bg-slate-50 p-4 rounded-xl mb-6">
            
            <!-- 距離 (全モード共通) -->
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase">距離 (km)</label>
                <input v-model="form.distance" type="number" step="0.1" class="w-full border-b-2 border-slate-300 bg-transparent p-1 focus:border-blue-500 outline-none">
            </div>

            <!-- インターバル専用 -->
            <div v-if="form.mode === 'インターバル'" class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">セット数</label>
                    <input v-model="form.sets" type="number" placeholder="5" class="w-full border-b-2 border-slate-300 bg-transparent p-1 outline-none">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">レスト(秒/分)</label>
                    <input v-model="form.rest_time" type="text" placeholder="60s" class="w-full border-b-2 border-slate-300 bg-transparent p-1 outline-none">
                </div>
            </div>

            <!-- タイム/時間 (ジョグ、TT、ペース走、ビルドアップ用) -->
            <div v-if="['ジョグ', 'TT', 'ペース走', 'ビルドアップ'].includes(form.mode)">
                <label class="text-xs font-bold text-slate-500 uppercase">タイム / 合計時間</label>
                <input v-model="form.duration" type="text" placeholder="00:45:00" class="w-full border-b-2 border-slate-300 bg-transparent p-1 outline-none">
            </div>

            <!-- ペース (ペース走、ビルドアップ用) -->
            <div v-if="['ペース走', 'ビルドアップ'].includes(form.mode)">
                <label class="text-xs font-bold text-slate-500 uppercase">設定ペース (分/km)</label>
                <input v-model="form.pace" type="text" placeholder="4:30" class="w-full border-b-2 border-slate-300 bg-transparent p-1 outline-none">
            </div>

            <button @click="saveRun" :disabled="loading" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow-lg hover:bg-blue-700 active:scale-95 transition-all disabled:bg-slate-400">
                {{ loading ? '送信中...' : '記録を保存する' }}
            </button>
        </div>

        <!-- 記録一覧 -->
        <h2 class="font-bold text-slate-700 mb-4 border-l-4 border-blue-500 pl-2">最近の記録</h2>
        <div class="space-y-3">
            <div v-for="run in runs" :key="run.id" class="bg-white border border-slate-100 p-3 rounded-lg shadow-sm flex justify-between items-center">
                <div>
                    <span class="text-[10px] font-bold bg-slate-200 px-2 py-0.5 rounded text-slate-600">{{ run.mode }}</span>
                    <div class="font-black text-slate-800 text-lg">{{ run.distance }} <span class="text-sm font-normal text-slate-500">km</span></div>
                    <div class="text-xs text-slate-500">
                        <span v-if="run.duration">⏱ {{ run.duration }}</span>
                        <span v-if="run.sets"> | {{ run.sets }}セット</span>
                    </div>
                </div>
                <div class="text-[10px] text-slate-400 font-mono">{{ formatDate(run.created_at) }}</div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        // --- 設定：ここにSupabaseの情報を入れてください ---
        const SUPABASE_URL = 'あなたのURL';
        const SUPABASE_KEY = 'あなたのAPIキー';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        createApp({
            setup() {
                const runs = ref([]);
                const loading = ref(false);
                const form = ref({
                    mode: 'ジョグ',
                    distance: '',
                    duration: '',
                    sets: '',
                    rest_time: '',
                    pace: ''
                });

                const fetchRuns = async () => {
                    const { data, error } = await _supabase.from('runs').select('*').order('created_at', { ascending: false });
                    if (error) console.error(error);
                    else runs.value = data;
                };

                const saveRun = async () => {
                    if (!form.value.distance) return alert('距離を入力してください');
                    loading.value = true;
                    
                    const { error } = await _supabase.from('runs').insert([{
                        mode: form.value.mode,
                        distance: parseFloat(form.value.distance),
                        duration: form.value.duration,
                        sets: form.value.sets ? parseInt(form.value.sets) : null,
                        rest_time: form.value.rest_time,
                        pace: form.value.pace
                    }]);

                    if (error) {
                        alert('エラー発生: ' + error.message);
                    } else {
                        // フォームをリセット
                        form.value.distance = '';
                        form.value.duration = '';
                        form.value.sets = '';
                        form.value.rest_time = '';
                        form.value.pace = '';
                        await fetchRuns();
                    }
                    loading.value = false;
                };

                const formatDate = (dateStr) => {
                    const d = new Date(dateStr);
                    return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
                };

                onMounted(fetchRuns);

                return { form, runs, loading, saveRun, formatDate };
            }
        }).mount('#app');
    </script>
</body>
</html>
