<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Running Log Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 font-sans text-slate-900">
    <div id="app" class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
        <div class="bg-gradient-to-br from-indigo-600 to-blue-500 p-6 text-white text-center">
            <h1 class="text-2xl font-black italic tracking-widest">RUNNING LOG</h1>
            <p class="text-[10px] uppercase opacity-70 mt-1 tracking-tighter">Powered by Supabase & GitHub</p>
        </div>

        <div class="p-6">
            <div class="mb-6">
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest text-center">Training Mode</label>
                <div class="grid grid-cols-3 gap-2">
                    <button v-for="m in modes" :key="m" @click="form.mode = m"
                        :class="form.mode === m ? 'bg-indigo-600 text-white shadow-md scale-105' : 'bg-slate-100 text-slate-500'"
                        class="text-[10px] py-2.5 rounded-xl font-black transition-all duration-200">
                        {{ m }}
                    </button>
                </div>
            </div>

            <div class="space-y-5 bg-slate-50 p-5 rounded-2xl border border-slate-100 mb-8 shadow-inner">
                <h2 class="text-center font-black text-indigo-600 text-sm italic tracking-widest">ENTRY: {{ form.mode }}</h2>
                
                <div class="relative">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">距離 (km)</label>
                    <input v-model="form.distance" type="number" step="0.1" placeholder="0.0" class="w-full border-b-2 border-slate-200 bg-transparent p-2 text-2xl font-black outline-none focus:border-indigo-500 transition-all">
                </div>

                <div v-if="form.mode !== 'レストトレーニング'">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">タイム / 合計時間</label>
                    <input v-model="form.duration" type="text" placeholder="例: 25:40" class="w-full border-b-2 border-slate-200 bg-transparent p-2 font-bold outline-none focus:border-indigo-500 transition-all">
                </div>

                <div v-if="form.mode === 'インターバル'" class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">本数 (sets)</label>
                        <input v-model="form.sets" type="number" placeholder="5" class="w-full border-b-2 border-slate-200 bg-transparent p-2 font-bold outline-none focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">レスト (rest)</label>
                        <input v-model="form.rest" type="text" placeholder="60s" class="w-full border-b-2 border-slate-200 bg-transparent p-2 font-bold outline-none focus:border-indigo-500">
                    </div>
                </div>

                <div v-if="['ペース走', 'ビルドアップ'].includes(form.mode)">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">設定ペース (/km)</label>
                    <input v-model="form.pace" type="text" placeholder="4:30" class="w-full border-b-2 border-slate-200 bg-transparent p-2 font-bold outline-none focus:border-indigo-500">
                </div>

                <button @click="saveRun" :disabled="loading" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-indigo-700 active:scale-95 transition-all disabled:bg-slate-300 mt-2">
                    {{ loading ? 'SENDING...' : 'RECORD RUN' }}
                </button>
            </div>

            <h3 class="font-black text-slate-800 text-sm mb-4 flex items-center gap-2 uppercase tracking-tighter">
                <span class="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></span> Recent Activity
            </h3>
            <div class="space-y-3">
                <div v-for="run in runs" :key="run.id" class="bg-white border border-slate-100 p-4 rounded-2xl shadow-sm flex justify-between items-center hover:border-indigo-200 transition-colors">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[9px] font-black bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded uppercase tracking-tighter">{{ run.mode }}</span>
                            <span class="text-[10px] text-slate-300 font-mono">{{ formatDate(run.created_at) }}</span>
                        </div>
                        <div class="text-2xl font-black text-slate-800 tracking-tighter">{{ run.distance }} <span class="text-xs font-normal text-slate-400">km</span></div>
                        <div class="text-[10px] text-slate-500 mt-0.5 flex flex-wrap gap-x-3 gap-y-1 font-bold">
                            <span v-if="run.duration">⏱ {{ run.duration }}</span>
                            <span v-if="run.sets">⚡ {{ run.sets }}sets ({{ run.rest }})</span>
                            <span v-if="run.pace">📈 {{ run.pace }}/km</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        const SUPABASE_URL = 'https://gzbczdezunhooqsfuipk.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_HxQHVDlq0fgVjiOB4yeKOg_OJEYBhU_';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        createApp({
            setup() {
                const modes = ['ジョグ', 'インターバル', 'ペース走', 'TT', 'ビルドアップ', 'レストトレーニング'];
                const runs = ref([]);
                const loading = ref(false);
                const form = ref({ mode: 'ジョグ', distance: '', duration: '', sets: '', rest: '', pace: '' });

                const fetchRuns = async () => {
                    const { data, error } = await _supabase.from('runs').select('*').order('created_at', { ascending: false });
                    if (!error) runs.value = data;
                };

                const saveRun = async () => {
                    if (!form.value.distance) return alert('距離を入力してください！');
                    loading.value = true;
                    
                    const postData = {
                        mode: form.value.mode,
                        distance: parseFloat(form.value.distance),
                        duration: form.value.duration || null,
                        sets: form.value.sets ? parseInt(form.value.sets) : null,
                        rest: form.value.rest || null,
                        pace: form.value.pace || null
                    };

                    const { error } = await _supabase.from('runs').insert([postData]);

                    if (error) {
                        alert('エラー: ' + error.message);
                    } else {
                        const currentMode = form.value.mode;
                        form.value = { mode: currentMode, distance: '', duration: '', sets: '', rest: '', pace: '' };
                        await fetchRuns();
                    }
                    loading.value = false;
                };

                const formatDate = (s) => {
                    const d = new Date(s);
                    return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
                };

                onMounted(fetchRuns);
                return { modes, form, runs, loading, saveRun, formatDate };
            }
        }).mount('#app');
    </script>
</body>
</html>
