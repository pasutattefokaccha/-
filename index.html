<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN DIARY</title>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary:#007AFF; --bg:#f2f2f7; --today:#fff9c4; }
        body { font-family:-apple-system; background:var(--bg); margin:0; padding:10px;}
        .container{max-width:600px;margin:0 auto;}
        .calendar{display:grid;grid-template-columns:repeat(7,1fr);background:#fff;}
        .day{min-height:80px;border:1px solid #eee;padding:5px;cursor:pointer;}
        .today{background:var(--today);}
    </style>
</head>
<body>

<div id="auth-container">
    <input id="email" placeholder="email">
    <input id="password" type="password" placeholder="password">
    <button id="auth-btn">ログイン</button>
</div>

<div id="app-container" class="container" style="display:none;">
    <h2 id="month"></h2>
    <div class="calendar" id="calendar"></div>
    <button onclick="logout()">ログアウト</button>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "runnikki-a7d37.firebaseapp.com",
    projectId: "runnikki-a7d37"
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let current = new Date();
let selectedDateStr = "";

document.getElementById("auth-btn").onclick = async () => {
    const email = email.value;
    const password = password.value;

    try {
        await auth.signInWithEmailAndPassword(email,password);
    } catch {
        await auth.createUserWithEmailAndPassword(email,password);
    }
};

auth.onAuthStateChanged(user=>{
    if(user){
        auth-container.style.display="none";
        app-container.style.display="block";
        render();
    }else{
        auth-container.style.display="block";
        app-container.style.display="none";
    }
});

function render(){
    const cal=document.getElementById("calendar");
    cal.innerHTML="";
    const y=current.getFullYear();
    const m=current.getMonth();
    document.getElementById("month").innerText=`${y}年${m+1}月`;

    const last=new Date(y,m+1,0).getDate();

    for(let d=1;d<=last;d++){
        const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const el=document.createElement("div");
        el.className="day";
        if(dateStr===new Date().toISOString().split('T')[0]) el.classList.add("today");
        el.innerText=d;
        el.onclick=()=>{selectedDateStr=dateStr; saveDiary();};
        cal.appendChild(el);
    }
}

function convertWeatherCode(code){
    if(code===0) return "☀️";
    if(code<=3) return "🌤";
    if(code<=48) return "☁️";
    if(code<=67) return "🌧";
    return "☁️";
}

async function saveDiary(){
    let w="☁️", t="--°C";

    try{
        const startTime="12:00";
        const [hour,minute]=startTime.split(":");
        const target=`${selectedDateStr}T${hour}:${minute}`;
        const today=new Date().toISOString().split('T')[0];

        if(selectedDateStr<=today){
            const pos=await new Promise(res=>navigator.geolocation.getCurrentPosition(res));
            const lat=pos.coords.latitude;
            const lon=pos.coords.longitude;

            const res=await fetch(`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${selectedDateStr}&end_date=${selectedDateStr}&hourly=temperature_2m,weathercode`);
            const data=await res.json();

            const i=data.hourly.time.findIndex(x=>x===target);
            if(i!==-1){
                t=Math.round(data.hourly.temperature_2m[i])+"°C";
                w=convertWeatherCode(data.hourly.weathercode[i]);
            }
        }
    }catch(e){}

    await db.collection("users").doc(auth.currentUser.uid)
    .collection("diaries").doc(selectedDateStr)
    .set({date:selectedDateStr,weather:w,temp:t});

    alert("保存:"+w+" "+t);
}

function logout(){auth.signOut();}
</script>

</body>
</html>
