<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Running Log Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 font-sans text-slate-900">
    <div id="app" class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
        <div class="bg-gradient-to-br from-indigo-700 to-blue-500 p-6 text-white text-center">
            <h1 class="text-2xl font-black italic tracking-widest uppercase">Running Log</h1>
        </div>

        <div class="p-6">
            <!-- モード選択 -->
            <div class="mb-4">
                <div class="grid grid-cols-3 gap-2">
                    <button v-for="m in modes" :key="m" @click="changeMode(m)"
                        :class="form.mode === m ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-100 text-slate-500'"
                        class="text-[10px] py-2.5 rounded-xl font-black transition-all">
                        {{ m }}
                    </button>
                </div>
            </div>

            <!-- 入力フォーム -->
            <div class="space-y-5 bg-slate-50 p-5 rounded-2xl border border-slate-100 mb-6 shadow-inner text-sm">
                <h2 class="text-center font-black text-indigo-600 text-sm italic tracking-widest uppercase italic">Entry: {{ form.mode }}</h2>
                
                <!-- 距離 -->
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">距離 (km)</label>
                    <input v-model="form.distance" @input="autoCalc" type="number" step="0.1" placeholder="0.0" class="w-full border-b-2 border-slate-200 bg-transparent p-1 text-xl font-bold outline-none focus:border-indigo-500 transition-all">
                </div>

                <!-- タイム (分・秒 別枠) -->
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">タイム</label>
                    <div class="flex items-end gap-2">
                        <div class="flex-1">
                            <input v-model="form.dur_m" @input="autoCalc" type="number" placeholder="0" class="w-full border-b-2 border-slate-200 bg-transparent p-1 text-lg font-bold outline-none focus:border-indigo-500 text-right">
                        </div>
                        <span class="font-bold pb-1">分</span>
                        <div class="flex-1">
                            <input v-model="form.dur_s" @input="autoCalc" type="number" placeholder="00" class="w-full border-b-2 border-slate-200 bg-transparent p-1 text-lg font-bold outline-none focus:border-indigo-500 text-right">
                        </div>
                        <span class="font-bold pb-1">秒</span>
                    </div>
                </div>

                <!-- ペース計算 (ジョグ、ペース走、ビルドアップ用) -->
                <div v-if="['ジョグ', 'ペース走', 'ビルドアップ'].includes(form.mode)">
                    <label class="text-[10px] font-bold text-indigo-500 uppercase tracking-tighter">ペース (/km)</label>
                    <div class="flex items-end gap-2 text-indigo-600">
                        <div class="flex-1">
                            <input v-model="form.pace_m" @input="autoCalc" type="number" class="w-full border-b-2 border-slate-300 bg-transparent p-1 text-lg font-bold outline-none focus:border-indigo-500 text-right">
                        </div>
                        <span class="font-bold pb-1 text-xs">分</span>
                        <div class="flex-1">
                            <input v-model="form.pace_s" @input="autoCalc" type="number" class="w-full border-b-2 border-slate-300 bg-transparent p-1 text-lg font-bold outline-none focus:border-indigo-500 text-right">
                        </div>
                        <span class="font-bold pb-1 text-xs">秒</span>
                    </div>
                </div>

                <!-- セット数・レスト時間 (インターバル、レストトレーニング用) -->
                <div v-if="['インターバル', 'レストトレーニング'].includes(form.mode)" class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">本数 (sets)</label>
                        <input v-model="form.sets" type="number" placeholder="1" class="w-full border-b-2 border-slate-200 bg-transparent p-1 font-bold outline-none focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">休憩 (秒)</label>
                        <input v-model="form.rest" type="number" placeholder="60" class="w-full border-b-2 border-slate-200 bg-transparent p-1 font-bold outline-none focus:border-indigo-500">
                    </div>
                </div>

                <!-- メモ -->
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">メモ</label>
                    <textarea v-model="form.note" rows="2" class="w-full border-2 border-slate-200 rounded-lg bg-white p-2 outline-none focus:border-indigo-500 text-xs mt-1 font-medium" placeholder="感想など..."></textarea>
                </div>

                <button @click="saveRun" :disabled="loading" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-indigo-700 active:scale-95 transition-all disabled:bg-slate-300 mt-2 tracking-widest uppercase">
                    {{ loading ? 'SENDING...' : 'Record Run' }}
                </button>
            </div>

            <!-- 検索 -->
            <div class="mb-6 relative">
                <input v-model="searchQuery" type="text" placeholder="キーワードで履歴を検索..." class="w-full bg-slate-100 rounded-xl py-3 px-4 pl-10 text-xs font-bold outline-none focus:ring-2 focus:ring-indigo-300 transition-all shadow-inner">
                <span class="absolute left-3 top-3 opacity-30 text-sm">🔍</span>
            </div>

            <!-- 履歴リスト -->
            <div class="space-y-4 max-h-[400px] overflow-y-auto pr-1">
                <div v-for="run in filteredRuns" :key="run.id" class="bg-white border border-slate-100 p-4 rounded-2xl shadow-sm hover:border-indigo-200 transition-all">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[9px] font-black bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded uppercase tracking-tighter">{{ run.mode }}</span>
                        <span class="text-[10px] text-slate-300 font-mono">{{ formatDate(run.created_at) }}</span>
                    </div>
                    <div class="text-3xl font-black text-slate-800 tracking-tighter">{{ run.distance }} <span class="text-xs font-normal text-slate-400 uppercase">km</span></div>
                    <div class="text-[10px] text-slate-500 mt-1 flex flex-wrap gap-x-4 gap-y-1 font-black uppercase">
                        <span v-if="run.duration" class="flex items-center gap-1 text-slate-700 font-bold italic underline decoration-indigo-300 decoration-2 italic">⏱ {{ formatTimeDisplay(run.duration) }}</span>
                        <span v-if="run.pace && !['TT', 'レストトレーニング'].includes(run.mode)" class="text-indigo-500 italic decoration-indigo-300 decoration-2 italic">📈 {{ formatTimeDisplay(run.pace) }}/km</span>
                        <span v-if="run.sets" class="text-emerald-500">⚡ {{ run.sets }} sets</span>
                        <span v-if="run.rest" class="text-amber-500">🧘 {{ run.rest }}s rest</span>
                    </div>
                    <div v-if="run.note" class="mt-3 text-[11px] text-slate-600 bg-slate-50 p-3 rounded-xl border-l-4 border-indigo-400 break-words font-medium leading-relaxed italic">
                        "{{ run.note }}"
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        const SUPABASE_URL = 'https://gzbczdezunhooqsfuipk.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_HxQHVDlq0fgVjiOB4yeKOg_OJEYBhU_';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        createApp({
            setup() {
                const modes = ['ジョグ', 'インターバル', 'ペース走', 'TT', 'ビルドアップ', 'レストトレーニング'];
                const runs = ref([]);
                const loading = ref(false);
                const searchQuery = ref('');
                const form = ref({ mode: 'ジョグ', distance: '', dur_m: '', dur_s: '', pace_m: '', pace_s: '', sets: '', rest: '', note: '' });

                const getSec = (m, s) => (parseInt(m || 0) * 60) + parseInt(s || 0);
                const setFromSec = (total) => {
                    if (!total || total <= 0) return { m: '', s: '' };
                    return { m: Math.floor(total / 60), s: Math.round(total % 60).toString().padStart(2, '0') };
                };

                const formatTimeDisplay = (str) => {
                    if(!str || !str.includes(':')) return str;
                    const [m, s] = str.split(':');
                    return `${m}分${s.padStart(2, '0')}秒`;
                };

                const autoCalc = () => {
                    if (['TT', 'レストトレーニング'].includes(form.value.mode)) return;
                    const dist = parseFloat(form.value.distance);
                    const dur = getSec(form.value.dur_m, form.value.dur_s);
                    const pace = getSec(form.value.pace_m, form.value.pace_s);

                    if (form.value.mode === 'ジョグ' && dist && dur) {
                        const res = setFromSec(dur / dist);
                        form.value.pace_m = res.m; form.value.pace_s = res.s;
                    } else if (form.value.mode === 'ペース走') {
                        if (dist && dur && (!form.value.pace_m && !form.value.pace_s)) {
                            const res = setFromSec(dur / dist); form.value.pace_m = res.m; form.value.pace_s = res.s;
                        } else if (dist && pace && (!form.value.dur_m && !form.value.dur_s)) {
                            const res = setFromSec(dist * pace); form.value.dur_m = res.m; form.value.dur_s = res.s;
                        } else if (dur && pace && !form.value.distance) {
                            form.value.distance = (dur / pace).toFixed(2);
                        }
                    }
                };

                const changeMode = (m) => {
                    form.value.mode = m;
                    Object.keys(form.value).forEach(k => { if(k !== 'mode') form.value[k] = '' });
                };

                const fetchRuns = async () => {
                    const { data } = await _supabase.from('runs').select('*').order('created_at', { ascending: false });
                    if (data) runs.value = data;
                };

                const filteredRuns = computed(() => {
                    const q = searchQuery.value.toLowerCase();
                    return runs.value.filter(r => r.mode.toLowerCase().includes(q) || (r.note && r.note.toLowerCase().includes(q)) || r.distance.toString().includes(q));
                });

                const saveRun = async () => {
                    if (!form.value.distance && form.value.mode !== 'レストトレーニング') return alert('距離を入れてね！');
                    loading.value = true;
                    
                    const durationStr = (form.value.dur_m || form.value.dur_s) ? `${form.value.dur_m || 0}:${(form.value.dur_s || 0).toString().padStart(2,'0')}` : null;
                    const paceStr = (form.value.pace_m || form.value.pace_s) ? `${form.value.pace_m || 0}:${(form.value.pace_s || 0).toString().padStart(2,'0')}` : null;

                    const { error } = await _supabase.from('runs').insert([{
                        mode: form.value.mode,
                        distance: parseFloat(form.value.distance) || 0,
                        duration: durationStr,
                        sets: form.value.sets ? parseInt(form.value.sets) : null,
                        rest: form.value.rest ? form.value.rest.toString() : null,
                        pace: paceStr,
                        note: form.value.note
                    }]);

                    if (!error) { await fetchRuns(); changeMode(form.value.mode); }
                    else { alert('エラー: ' + error.message); }
                    loading.value = false;
                };

                const formatDate = (s) => {
                    const d = new Date(s);
                    return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
                };

                onMounted(fetchRuns);
                return { modes, form, runs, searchQuery, filteredRuns, loading, saveRun, formatDate, autoCalc, changeMode, formatTimeDisplay };
            }
        }).mount('#app');
    </script>
</body>
</html>
