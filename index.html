<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RUN DIARY - ver 1.8.5</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; --card: #ffffff; --today: #fff9c4; --danger: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }
        
        #auth-container { display: flex; align-items: center; justify-content: center; height: 100vh; position: relative; }
        .auth-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #auth-error { color: #d32f2f; font-size: 0.85rem; margin-top: 15px; background: #ffebee; padding: 10px; border-radius: 8px; display: none; text-align: left; word-break: break-all; white-space: pre-wrap; }
        .version-tag { position: absolute; right: 10px; bottom: 10px; font-size: 10px; color: #999; }

        .monthly-stats { background: var(--primary); color: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; text-align: center; }
        .monthly-stats-value { font-size: 1.8rem; font-weight: bold; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-radius: 15px 15px 0 0; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); background: white; border-radius: 0 0 15px 15px; border-top: 1px solid #eee; overflow: hidden; }
        .day-label { text-align: center; font-size: 0.7rem; color: #888; padding: 10px 0; }
        .day { min-height: 85px; padding: 5px; border-right: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .day-num { font-size: 0.8rem; font-weight: bold; }
        .today { background: var(--today) !important; border: 2px solid #f9a825 !important; }
        
        .cal-record { font-size: 0.6rem; margin-top: 4px; padding: 2px 4px; border-radius: 4px; line-height: 1.2; }
        .bg-jog { background-color: #e3f2fd; color: #1565c0; border-left: 3px solid #1565c0; }
        .bg-interval { background-color: #ffebee; color: #c62828; border-left: 3px solid #c62828; }
        .bg-tt { background-color: #fffde7; color: #f9a825; border-left: 3px solid #f9a825; }
        .bg-pace { background-color: #f1f8e9; color: #2e7d32; border-left: 3px solid #2e7d32; }
        .bg-bu { background-color: #f3e5f5; color: #7b1fa2; border-left: 3px solid #7b1fa2; }
        .bg-rest { background-color: #eeeeee; color: #616161; }
        .bg-other { background-color: #e0f7fa; color: #00838f; border-left: 3px solid #00838f; }

        .search-fab { position: fixed; right: 20px; bottom: 20px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 30px; display: none; justify-content: center; align-items: center; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: none; z-index: 90; }
        #entry-modal, #search-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; width: 92%; max-width: 450px; padding: 20px; border-radius: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 14px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-save { background: var(--primary); color: white; }
        .btn-cancel { background: #eee; color: #666; }
        .btn-delete { background: var(--danger); color: white; margin-top: 20px; }
        .hidden { display: none !important; }
        
        /* 固定表示用スタイル */
        .fixed-view { background: #f8f9fa; padding: 15px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 15px; }
        .fixed-row { margin-bottom: 10px; font-size: 1rem; border-bottom: 1px dashed #ddd; padding-bottom: 6px; }
        .fixed-label { color: #888; font-size: 0.75rem; display: block; margin-bottom: 2px; }
        .dynamic-section { background: #f9f9f9; padding: 10px; border-radius: 10px; margin-top: 10px; border-left: 4px solid var(--primary); }
        .result-box { margin-top: 10px; padding: 10px; background: #eef6ff; border-radius: 10px; font-size: 0.9rem; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-box">
        <h2 style="color:var(--primary)">RUN DIARY</h2>
        <input type="email" id="email" placeholder="メールアドレス">
        <input type="password" id="password" placeholder="パスワード(6文字以上)">
        <button id="auth-btn" class="btn btn-save" onclick="handleAuth()">ログイン / 新規登録</button>
        <div id="auth-error"></div>
    </div>
    <div class="version-tag">ver 1.8.5</div>
</div>

<div id="app-container" class="container hidden">
    <div class="monthly-stats">
        <div id="stats-month-label">今月の合計距離</div>
        <div class="monthly-stats-value"><span id="month-total-val">0.00</span> <small>km</small></div>
    </div>
    <div class="cal-header">
        <button onclick="changeMonth(-1)" style="border:none; background:none; font-size:1.2rem;">◀</button>
        <div id="current-month-display" style="font-weight:bold;"></div>
        <button onclick="changeMonth(1)" style="border:none; background:none; font-size:1.2rem;">▶</button>
    </div>
    <div class="calendar" id="calendar-grid"></div>
    <button id="logout-btn" onclick="auth.signOut()" style="width:100%; margin-top:20px; border:none; background:none; color:#999; font-size:0.8rem; text-decoration:underline;">ログアウト</button>
</div>

<button class="search-fab" id="fab-search" onclick="openSearch()">🔍</button>

<div id="entry-modal">
    <div class="modal-content">
        <h3 id="modal-date-title" style="margin-top:0; color:var(--primary)"></h3>
        
        <div id="view-section" class="hidden">
            <div class="fixed-view" id="fixed-content"></div>
            <button class="btn btn-cancel" onclick="closeModal()">閉じる</button>
            <button class="btn btn-delete" onclick="deleteDiary()">この日の記録を削除</button>
        </div>

        <div id="edit-section">
            <label style="font-size:0.8rem; color:#666;">時間</label>
            <div style="display:flex; gap:10px; align-items:center;">
                <input type="time" id="start-time" value="17:00" oninput="calcJog()"><span>〜</span><input type="time" id="end-time" oninput="calcJog()">
            </div>
            <label style="font-size:0.8rem; color:#666;">メニュー</label>
            <select id="menu-select" onchange="toggleMenuFields()">
                <option value="ジョグ">ジョグ</option>
                <option value="インターバル">インターバル</option>
                <option value="レストトレーニング">レストトレーニング</option>
                <option value="タイムトライアル">タイムトライアル</option>
                <option value="ペース走">ペース走</option>
                <option value="ビルドアップ">ビルドアップ</option>
                <option value="レスト">レスト(完全休養)</option>
                <option value="その他">その他</option>
            </select>
            <div id="fields-jog" class="dynamic-section">
                <input type="number" id="jog-dist" step="0.01" placeholder="距離(km)" oninput="calcJog()">
                <input type="number" id="jog-min" placeholder="時間(分)" oninput="calcJog()">
                <div id="jog-res" class="result-box">平均ペース: --:--/km</div>
            </div>
            <div id="fields-int" class="dynamic-section" style="display:none;">
                <input type="text" id="int-dist-v2" placeholder="距離 (例: 400m)">
                <input type="text" id="int-time-v2" placeholder="タイム (例: 72秒)">
                <input type="text" id="int-connect-v2" placeholder="つなぎ (例: 200m)">
            </div>
            <div id="fields-rt" class="dynamic-section" style="display:none;">
                <input type="number" id="rt-dist" placeholder="距離(m)">
                <input type="number" id="rt-count" placeholder="本数">
                <input type="number" id="rt-rest" placeholder="休憩(秒)">
                <input type="number" id="rt-time" placeholder="設定タイム(秒)">
            </div>
            <div id="fields-tt" class="dynamic-section" style="display:none;">
                <input type="number" id="tt-dist-km" step="0.01" placeholder="距離(km)">
                <div style="display:flex; gap:5px; align-items:center;">
                    <input type="number" id="tt-min" placeholder="分"> :
                    <input type="number" id="tt-sec" placeholder="秒"> .
                    <input type="number" id="tt-msec" placeholder="少数">
                </div>
            </div>
            <div id="fields-pace" class="dynamic-section" style="display:none;">
                <input type="number" id="pace-dist" placeholder="距離(km)">
                <input type="text" id="pace-val" placeholder="設定ペース">
            </div>
            <div id="fields-bu" class="dynamic-section" style="display:none;">
                <input type="number" id="bu-dist" placeholder="距離(km)">
                <input type="text" id="bu-start" placeholder="開始ペース">
                <input type="text" id="bu-end" placeholder="終了ペース">
            </div>
            <div id="fields-other" class="dynamic-section" style="display:none;">
                <input type="number" id="other-dist" placeholder="距離(km)">
                <input type="text" id="other-menu-name" placeholder="メニュー名">
                <textarea id="other-content" placeholder="内容" style="height:60px;"></textarea>
            </div>
            <textarea id="common-memo" placeholder="メモ・感想" rows="3" style="margin-top:10px;"></textarea>
            <button class="btn btn-save" id="save-btn" onclick="saveDiary()">日誌を保存（天気取得）</button>
            <button class="btn btn-cancel" onclick="closeModal()">キャンセル</button>
        </div>
    </div>
</div>

<div id="search-modal">
    <div class="modal-content">
        <h3>TT記録検索</h3>
        <input type="number" id="search-query" step="0.01" placeholder="検索距離(km)" oninput="searchTT()">
        <div id="search-results" style="margin-top:20px; max-height:300px; overflow-y:auto; border-top:1px solid #eee;"></div>
        <button class="btn btn-cancel" onclick="closeSearch()">閉じる</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC0VeVEdEpcRP8dOvJokXq0lg2gBzloVls",
        authDomain: "runnikki-a7d37.firebaseapp.com",
        projectId: "runnikki-a7d37",
        storageBucket: "runnikki-a7d37.firebasestorage.app",
        messagingSenderId: "623990853537",
        appId: "1:623990853537:web:68417f21002106b5c745e0"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentViewDate = new Date();
    let selectedDateStr = "";
    let cachedDiaries = [];

    // --- 認証ロジック（成功パターン維持） ---
    async function handleAuth() {
        const btn = document.getElementById('auth-btn');
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errDiv = document.getElementById('auth-error');
        errDiv.style.display = 'none';
        if (!email || !password || password.length < 6) {
            errDiv.innerText = "メールと6文字以上のパスワードを入力してください";
            errDiv.style.display = 'block';
            return;
        }
        btn.innerText = "通信中..."; btn.disabled = true;
        try {
            await auth.signInWithEmailAndPassword(email, password);
        } catch (error) {
            if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-login-credentials') {
                try {
                    await auth.createUserWithEmailAndPassword(email, password);
                } catch (regErr) {
                    errDiv.innerText = "エラー: " + regErr.message;
                    errDiv.style.display = 'block';
                }
            } else {
                errDiv.innerText = "エラー: " + error.message;
                errDiv.style.display = 'block';
            }
        }
        btn.innerText = "ログイン / 新規登録"; btn.disabled = false;
    }

    auth.onAuthStateChanged(user => {
        const fab = document.getElementById('fab-search');
        if (user) {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            fab.style.display = 'flex';
            loadCloudData();
        } else {
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('app-container').classList.add('hidden');
            fab.style.display = 'none';
        }
    });

    // --- カレンダー描画 ---
    async function loadCloudData() {
        if(!auth.currentUser) return;
        try {
            const snap = await db.collection('users').doc(auth.currentUser.uid).collection('diaries').get();
            cachedDiaries = snap.docs.map(doc => doc.data());
            renderCalendar();
        } catch(e) { console.error(e); }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = "";
        const year = currentViewDate.getFullYear(), month = currentViewDate.getMonth();
        document.getElementById('current-month-display').innerText = `${year}年 ${month + 1}月`;
        ['日','月','火','水','木','金','土'].forEach(l => {
            const el = document.createElement('div'); el.className = 'day-label'; el.innerText = l; grid.appendChild(el);
        });
        const firstDay = new Date(year, month, 1).getDay(), lastDate = new Date(year, month + 1, 0).getDate();
        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
        
        let monthlyTotal = 0;
        const todayStr = new Date().toLocaleDateString('sv-SE');
        for (let d = 1; d <= lastDate; d++) {
            const dateStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
            const dayEl = document.createElement('div'); dayEl.className = 'day';
            if (todayStr === dateStr) dayEl.classList.add('today');
            dayEl.innerHTML = `<div class="day-num">${d}</div>`;
            const record = cachedDiaries.find(item => item.date === dateStr);
            if (record) {
                dayEl.innerHTML += `<div class="cal-record ${getColorClass(record.type)}"><b>${record.dist}k</b><br>${record.weather || ''}</div>`;
                monthlyTotal += parseFloat(record.dist || 0);
            }
            dayEl.onclick = () => openModal(dateStr);
            grid.appendChild(dayEl);
        }
        document.getElementById('month-total-val').innerText = monthlyTotal.toFixed(2);
    }

    function getColorClass(type) {
        const classes = { 'ジョグ':'bg-jog', 'インターバル':'bg-interval', 'タイムトライアル':'bg-tt', 'ペース走':'bg-pace', 'ビルドアップ':'bg-bu', 'レスト':'bg-rest' };
        return classes[type] || 'bg-other';
    }

    // --- モーダル制御（固定化ロジック） ---
    function openModal(dateStr) {
        selectedDateStr = dateStr;
        document.getElementById('modal-date-title').innerText = dateStr.replace(/-/g, '/');
        const record = cachedDiaries.find(item => item.date === dateStr);
        const viewSec = document.getElementById('view-section'), editSec = document.getElementById('edit-section');
        
        if(record) {
            // 【固定表示モード】
            viewSec.classList.remove('hidden'); editSec.classList.add('hidden');
            document.getElementById('fixed-content').innerHTML = `
                <div class="fixed-row"><span class="fixed-label">開始時間</span><b>${record.time || '--:--'}</b></div>
                <div class="fixed-row"><span class="fixed-label">メニュー</span><b>${record.type}</b></div>
                <div class="fixed-row"><span class="fixed-label">合計距離</span><b>${record.dist} km</b></div>
                <div class="fixed-row"><span class="fixed-label">内容・計測詳細</span>${record.detail || 'なし'}</div>
                <div class="fixed-row" style="border:none;"><span class="fixed-label">メモ・感想</span>${record.memo || '-'}</div>
                <div style="font-size:0.7rem; color:#999; text-align:right;">天気: ${record.weather || '--'}</div>
            `;
        } else {
            // 【新規入力モード】
            viewSec.classList.add('hidden'); editSec.classList.remove('hidden');
            document.getElementById('menu-select').value = "ジョグ";
            document.getElementById('start-time').value = "17:00";
            document.getElementById('jog-dist').value = "";
            document.getElementById('jog-min').value = "";
            document.getElementById('common-memo').value = "";
            toggleMenuFields();
        }
        document.getElementById('entry-modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('entry-modal').style.display = 'none'; }
    function openSearch() { document.getElementById('search-modal').style.display = 'block'; }
    function closeSearch() { document.getElementById('search-modal').style.display = 'none'; }
    function changeMonth(diff) { currentViewDate.setMonth(currentViewDate.getMonth() + diff); renderCalendar(); }
    
    function toggleMenuFields() {
        const menu = document.getElementById('menu-select').value;
        ['fields-jog', 'fields-int', 'fields-rt', 'fields-tt', 'fields-pace', 'fields-bu', 'fields-other'].forEach(id => document.getElementById(id).style.display = 'none');
        const target = {'ジョグ':'fields-jog','インターバル':'fields-int','レストトレーニング':'fields-rt','タイムトライアル':'fields-tt','ペース走':'fields-pace','ビルドアップ':'fields-bu','その他':'fields-other'}[menu];
        if(target) document.getElementById(target).style.display = 'block';
    }

    function calcJog() {
        const s = document.getElementById('start-time').value, e = document.getElementById('end-time').value;
        const dI = document.getElementById('jog-dist'), mI = document.getElementById('jog-min');
        if(s && e) {
            const [sH, sM] = s.split(':').map(Number), [eH, eM] = e.split(':').map(Number);
            let diff = (eH * 60 + eM) - (sH * 60 + sM);
            if(diff < 0) diff += 1440;
            mI.value = diff;
        }
        const d = parseFloat(dI.value), m = parseFloat(mI.value);
        if(d > 0 && m > 0) {
            const ps = (m * 60) / d;
            document.getElementById('jog-res').innerText = `平均ペース: ${Math.floor(ps/60)}:${Math.round(ps%60).toString().padStart(2,'0')}/km`;
        }
    }

    // --- 保存・削除 ---
    async function deleteDiary() {
        if(confirm("この日の記録を完全に削除しますか？\n（削除後は再入力が可能になります）")) {
            await db.collection('users').doc(auth.currentUser.uid).collection('diaries').doc(selectedDateStr).delete();
            closeModal(); loadCloudData();
        }
    }

    async function saveDiary() {
        const menuType = document.getElementById('menu-select').value;
        let dist = 0, detail = "", ttTime = "";
        if (menuType === 'ジョグ') {
            dist = parseFloat(document.getElementById('jog-dist').value) || 0;
            detail = document.getElementById('jog-res').innerText;
        } else if (menuType === 'タイムトライアル') {
            dist = parseFloat(document.getElementById('tt-dist-km').value) || 0;
            ttTime = `${document.g
