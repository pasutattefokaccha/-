<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN DIARY - Firebase Debug</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; --card: #ffffff; --today: #fff9c4; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }
        #auth-container { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #auth-error { color: #d32f2f; font-size: 0.85rem; margin-top: 15px; background: #ffebee; padding: 10px; border-radius: 8px; display: none; text-align: left; white-space: pre-wrap; }
        .monthly-stats { background: var(--primary); color: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; text-align: center; }
        .monthly-stats-value { font-size: 1.8rem; font-weight: bold; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-radius: 15px 15px 0 0; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); background: white; border-radius: 0 0 15px 15px; border-top: 1px solid #eee; overflow: hidden; }
        .day-label { text-align: center; font-size: 0.7rem; color: #888; padding: 10px 0; }
        .day { min-height: 85px; padding: 5px; border-right: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .day-num { font-size: 0.8rem; font-weight: bold; }
        .today { background: var(--today) !important; }
        .cal-record { font-size: 0.6rem; margin-top: 4px; padding: 2px 4px; border-radius: 4px; }
        .bg-jog { background-color: #e3f2fd; color: #1565c0; border-left: 3px solid #1565c0; }
        .bg-interval { background-color: #ffebee; color: #c62828; border-left: 3px solid #c62828; }
        .bg-tt { background-color: #fffde7; color: #f9a825; border-left: 3px solid #f9a825; }
        .bg-pace { background-color: #f1f8e9; color: #2e7d32; border-left: 3px solid #2e7d32; }
        .bg-bu { background-color: #f3e5f5; color: #7b1fa2; border-left: 3px solid #7b1fa2; }
        .bg-rest { background-color: #eeeeee; color: #616161; }
        .bg-other { background-color: #e0f7fa; color: #00838f; }
        .search-fab { position: fixed; right: 20px; bottom: 20px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 30px; display: none; justify-content: center; align-items: center; font-size: 24px; }
        #entry-modal, #search-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 5% auto; width: 90%; max-width: 450px; padding: 20px; border-radius: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #eee; border-radius: 10px; }
        .btn { width: 100%; padding: 14px; border-radius: 25px; border: none; margin-top: 10px; }
        .btn-save { background: var(--primary); color: white; }
        .btn-cancel { background: #eee; }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-box">
        <h2 style="color:var(--primary)">RUN DIARY</h2>
        <input type="email" id="email" placeholder="メールアドレス">
        <input type="password" id="password" placeholder="パスワード(6文字以上)">
        <button id="auth-btn" class="btn btn-save">ログイン / 新規登録</button>
        <div id="auth-error"></div>
    </div>
</div>

<div id="app-container" class="container hidden">
    <div class="monthly-stats">
        <div id="stats-month-label">今月の合計距離</div>
        <div class="monthly-stats-value"><span id="month-total-val">0.00</span> km</div>
    </div>
    <div class="cal-header">
        <button onclick="changeMonth(-1)">＜</button>
        <div id="current-month-display"></div>
        <button onclick="changeMonth(1)">＞</button>
    </div>
    <div class="calendar" id="calendar-grid"></div>
</div>

<div id="entry-modal">
    <div class="modal-content">
        <h3 id="modal-date-title"></h3>

        <label>走行時間</label>
        <div style="display:flex; gap:10px;">
            <input type="time" id="start-time">
            <span>〜</span>
            <input type="time" id="end-time">
        </div>

        <label>場所（任意）</label>
        <select id="city-select">
            <option value="">現在地</option>
            <option value="35.6895,139.6917">東京</option>
            <option value="34.6937,135.5023">大阪</option>
        </select>

        <button class="btn btn-save" onclick="saveDiary()">保存</button>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyC0VeVEdEpcRP8dOvJokXq0lg2gBzloVls",
    authDomain: "runnikki-a7d37.firebaseapp.com",
    projectId: "runnikki-a7d37"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let selectedDateStr = "";

function convertWeatherCode(code) {
    if (code === 0) return "☀️";
    if (code <= 3) return "🌤";
    if (code <= 48) return "☁️";
    if (code <= 67) return "🌧";
    return "☁️";
}

async function saveDiary() {
    let w = "☁️", t = "--°C";

    try {
        const startTime = document.getElementById('start-time').value || "12:00";
        const [hour, minute] = startTime.split(":");
        const targetDateTime = `${selectedDateStr}T${hour}:${minute}`;

        const today = new Date().toISOString().split('T')[0];

        if (selectedDateStr <= today) {

            let lat, lon;
            const selectedCity = document.getElementById('city-select').value;

            if (selectedCity) {
                [lat, lon] = selectedCity.split(',');
            } else {
                const pos = await new Promise((res, rej) =>
                    navigator.geolocation.getCurrentPosition(res, rej)
                );
                lat = pos.coords.latitude;
                lon = pos.coords.longitude;
            }

            const res = await fetch(
                `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${selectedDateStr}&end_date=${selectedDateStr}&hourly=temperature_2m,weathercode`
            );

            const data = await res.json();
            const index = data.hourly.time.findIndex(t => t === targetDateTime);

            if (index !== -1) {
                t = Math.round(data.hourly.temperature_2m[index]) + "°C";
                w = convertWeatherCode(data.hourly.weathercode[index]);
            }
        }

    } catch (e) {}

    await db.collection('users').doc(auth.currentUser.uid)
        .collection('diaries').doc(selectedDateStr)
        .set({ date: selectedDateStr, weather: w, temp: t });

    alert("保存完了");
}
</script>

</body>
</html>
