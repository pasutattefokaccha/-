<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO RUN DIARY</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; --card: #ffffff; --today: #fff9c4; --success: #2ecc71; --accent: #f9a825; --danger: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }
        
        #system-monitor { font-size: 10px; background: #222; color: #0f0; padding: 8px; border-radius: 8px; margin-bottom: 10px; font-family: monospace; border-left: 4px solid #0f0; }
        
        /* 認証画面 */
        #auth-container { display: flex; align-items: center; justify-content: center; height: 80vh; flex-direction: column; }
        .auth-box { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 380px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* カレンダーヘッダー */
        .monthly-header { background: var(--primary); color: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        .monthly-info { text-align: center; }
        .total-val { font-size: 1.8rem; font-weight: bold; }

        /* カレンダー（詳細表示対応） */
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #ddd; }
        .day-label { text-align: center; font-size: 0.7rem; color: #888; padding: 5px 0; background: #fafafa; border-bottom: 1px solid #eee; }
        .day { aspect-ratio: 1 / 1.3; padding: 4px; border-right: 0.1px solid #f0f0f0; border-bottom: 0.1px solid #f0f0f0; cursor: pointer; position: relative; display: flex; flex-direction: column; }
        .day-num { font-size: 0.75rem; font-weight: bold; margin-bottom: 2px; }
        .is-today { background-color: var(--today) !important; border: 1.5px solid var(--accent) !important; z-index: 1; }
        
        /* カレンダー内の記録表示 */
        .cal-record { font-size: 0.6rem; border-radius: 3px; border-left: 2px solid #ccc; line-height: 1.2; padding: 1px 2px; margin-top: 1px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .bg-jog { background: #e3f2fd; color: #1565c0; border-left-color: #1565c0; }
        .bg-int { background: #ffebee; color: #c62828; border-left-color: #c62828; }
        .bg-tt { background: #fffde7; color: #f9a825; border-left-color: #f9a825; }
        .bg-pace { background: #f1f8e9; color: #2e7d32; border-left-color: #2e7d32; }
        .bg-bu { background: #f3e5f5; color: #7b1fa2; border-left-color: #7b1fa2; }
        .bg-rest { background: #f5f5f5; color: #616161; border-left-color: #95a5a6; }
        .bg-other { background: #eceff1; color: #455a64; border-left-color: #455a64; }

        .rec-dist { font-weight: 800; font-size: 0.7rem; }
        .rec-weather { font-size: 0.55rem; color: #555; }

        /* モーダル */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; width: 92%; max-width: 500px; padding: 20px; border-radius: 20px; box-sizing: border-box; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 15px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        .btn-save { background: var(--success); color: white; }
        .btn-delete { background: var(--danger); color: white; margin-top: 20px; font-size: 0.9rem; }
        .hidden { display: none !important; }
        .dynamic-section { background: #f8f9fa; padding: 12px; border-radius: 12px; border-left: 4px solid var(--primary); margin: 8px 0; }
    </style>
</head>
<body>

<div id="system-monitor">Initializing...</div>

<div id="auth-container">
    <div class="auth-box">
        <h2 style="color:var(--primary); margin-bottom:20px;">PRO RUN DIARY</h2>
        <input type="email" id="email" placeholder="メールアドレス">
        <input type="password" id="password" placeholder="パスワード">
        <button onclick="handleLogin()" class="btn" style="background:var(--primary); color:white;">ログイン</button>
        <button onclick="handleSignup()" class="btn" style="background:#5856d6; color:white;">新規登録</button>
        <p id="auth-error" style="color:red; font-size:0.8rem; margin-top:10px;"></p>
    </div>
</div>

<div id="app-container" class="container hidden">
    <div class="monthly-header">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <div class="monthly-info">
            <div id="month-label" style="font-size:0.8rem; opacity:0.9;"></div>
            <div class="total-val"><span id="month-total-val">0.00</span> <small style="font-size:0.8rem;">km</small></div>
        </div>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
    
    <div class="calendar" id="calendar-grid"></div>
    
    <div style="text-align:center; margin-top:20px;">
        <button onclick="auth.signOut()" style="background:none; border:none; color:#999; text-decoration:underline;">ログアウト</button>
    </div>
</div>

<div id="entry-modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-date-title" style="margin-top:0; color:var(--primary);"></h3>
        
        <div style="display:flex; gap:10px; align-items:center;">
            <input type="time" id="start-time" value="17:00"> <span>〜</span> <input type="time" id="end-time" value="18:30">
        </div>

        <div style="background:#f0f4f8; padding:12px; border-radius:12px; margin:10px 0; font-size:0.85rem;">
            <label><input type="radio" name="loc-type" value="gps" checked onchange="toggleLoc()"> GPS</label>
            <label style="margin-left:15px;"><input type="radio" name="loc-type" value="manual" onchange="toggleLoc()"> 手動(市区町村)</label>
            <input type="text" id="loc-manual-input" placeholder="市区町村 (例: 西東京市)" style="display:none; margin-top:8px;">
        </div>

        <select id="menu-select" onchange="switchFields()">
            <option value="ジョグ">ジョグ</option>
            <option value="インターバル">インターバル</option>
            <option value="タイムトライアル">タイムトライアル</option>
            <option value="ペース走">ペース走</option>
            <option value="ビルドアップ">ビルドアップ</option>
            <option value="レスト">レスト</option>
            <option value="その他">その他</option>
        </select>

        <div id="sect-jog" class="menu-sect dynamic-section">
            <input type="number" id="jog-dist" step="0.01" placeholder="距離 (km)">
            <input type="number" id="jog-min" placeholder="合計時間 (分)">
        </div>

        <div id="sect-int" class="menu-sect dynamic-section" style="display:none;">
            <input type="number" id="int-dist" placeholder="1本の距離 (km)">
            <input type="number" id="int-count" placeholder="本数">
            <input type="text" id="int-rest" placeholder="レスト (例: 200m 70s)">
        </div>

        <div id="sect-tt" class="menu-sect dynamic-section" style="display:none;">
            <input type="number" id="tt-dist" placeholder="距離 (km)">
            <div style="display:flex; gap:5px; align-items:center;">
                <input type="number" id="tt-min" placeholder="分" style="width:30%">:
                <input type="number" id="tt-sec" placeholder="秒" style="width:30%">.
                <input type="number" id="tt-msec" placeholder="0" style="width:20%">
            </div>
        </div>

        <div id="sect-pace" class="menu-sect dynamic-section" style="display:none;">
            <input type="number" id="pace-dist" placeholder="距離 (km)">
            <input type="text" id="pace-val" placeholder="設定ペース (例: 4:15)">
        </div>

        <div id="sect-bu" class="menu-sect dynamic-section" style="display:none;">
            <input type="number" id="bu-dist" placeholder="距離 (km)">
            <input type="text" id="bu-start-pace" placeholder="開始ペース">
            <input type="text" id="bu-end-pace" placeholder="終了ペース">
        </div>

        <div id="sect-rest" class="menu-sect dynamic-section" style="display:none;">
            <textarea id="rest-memo" placeholder="レスト内容" rows="2"></textarea>
        </div>

        <div id="sect-other" class="menu-sect dynamic-section" style="display:none;">
            <input type="number" id="other-dist" placeholder="距離 (km)">
            <textarea id="other-memo" placeholder="練習メモ" rows="2"></textarea>
        </div>

        <button class="btn btn-save" id="save-btn" onclick="saveDiary()">記録を保存 (天気を取得)</button>
        <button class="btn btn-delete hidden" id="delete-btn" onclick="deleteDiary()">この日の記録を削除</button>
        <button class="btn" style="background:#eee;" onclick="closeModal()">キャンセル</button>
    </div>
</div>

<script>
    const log = (m) => { document.getElementById('system-monitor').innerText = "Status: " + m; };

    // Firebase初期化
    const firebaseConfig = {
        apiKey: "AIzaSyC0VeVEdEpcRP8dOvJokXq0lg2gBzloVls",
        authDomain: "runnikki-a7d37.firebaseapp.com",
        projectId: "runnikki-a7d37",
        storageBucket: "runnikki-a7d37.firebasestorage.app",
        messagingSenderId: "623990853537",
        appId: "1:623990853537:web:68417f21002106b5c745e0"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let cachedDiaries = [];
    let selectedDate = "";
    let currentViewDate = new Date();

    auth.onAuthStateChanged(user => {
        if (user) {
            log("Logged in: " + user.email);
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            loadData();
        } else {
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('app-container').classList.add('hidden');
        }
    });

    async function handleLogin() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert(err.message); }
    }

    async function handleSignup() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        try { await auth.createUserWithEmailAndPassword(e, p); alert("登録完了"); } catch(err) { alert(err.message); }
    }

    async function loadData() {
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('diaries').get();
        cachedDiaries = snap.docs.map(doc => doc.data());
        renderCalendar();
    }

    function changeMonth(offset) {
        currentViewDate.setMonth(currentViewDate.getMonth() + offset);
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = "";
        const y = currentViewDate.getFullYear();
        const m = currentViewDate.getMonth();
        const firstDay = new Date(y, m, 1).getDay();
        const lastDate = new Date(y, m + 1, 0).getDate();
        
        document.getElementById('month-label').innerText = `${y}年 ${m + 1}月`;
        ['日','月','火','水','木','金','土'].forEach(d => {
            grid.innerHTML += `<div class="day-label">${d}</div>`;
        });

        for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));

        let monthTotal = 0;
        const nowStr = new Date().toISOString().split('T')[0];

        for(let d=1; d<=lastDate; d++) {
            const ds = `${y}-${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
            const el = document.createElement('div');
            el.className = 'day' + (ds === nowStr ? ' is-today' : '');
            el.innerHTML = `<div class="day-num">${d}</div>`;
            
            const rec = cachedDiaries.find(r => r.date === ds);
            if(rec) {
                monthTotal += parseFloat(rec.dist || 0);
                const typeClass = {'ジョグ':'bg-jog','インターバル':'bg-int','タイムトライアル':'bg-tt','ペース走':'bg-pace','ビルドアップ':'bg-bu','レスト':'bg-rest','その他':'bg-other'}[rec.type] || '';
                el.innerHTML += `
                    <div class="cal-record ${typeClass}">
                        <div class="rec-weather">${rec.weather || ''}</div>
                        <div class="rec-dist">${rec.dist}k</div>
                    </div>`;
            }
            el.onclick = () => openModal(ds);
            grid.appendChild(el);
        }
        document.getElementById('month-total-val').innerText = monthTotal.toFixed(2);
    }

    function toggleLoc() {
        document.getElementById('loc-manual-input').style.display = 
            document.querySelector('input[name="loc-type"]:checked').value === 'manual' ? 'block' : 'none';
    }

    function switchFields() {
        const menu = document.getElementById('menu-select').value;
        document.querySelectorAll('.menu-sect').forEach(s => s.style.display = 'none');
        const id = {'ジョグ':'sect-jog','インターバル':'sect-int','タイムトライアル':'sect-tt','ペース走':'sect-pace','ビルドアップ':'sect-bu','レスト':'sect-rest','その他':'sect-other'}[menu];
        if(id) document.getElementById(id).style.display = 'block';
    }

    function openModal(d) {
        selectedDate = d;
        document.getElementById('modal-date-title').innerText = d;
        const rec = cachedDiaries.find(r => r.date === d);
        
        // 初期化 & 既存データ反映
        document.getElementById('delete-btn').classList.toggle('hidden', !rec);
        if(rec) {
            document.getElementById('menu-select').value = rec.type;
            if(rec.type==='ジョグ') { document.getElementById('jog-dist').value = rec.dist; }
            if(rec.type==='タイムトライアル') { 
                document.getElementById('tt-dist').value = rec.dist;
                const parts = rec.detail.split(/[:.]/);
                document.getElementById('tt-min').value = parts[0];
                document.getElementById('tt-sec').value = parts[1];
                document.getElementById('tt-msec').value = parts[2];
            }
            // 他の項目も同様にセット
        }
        switchFields();
        document.getElementById('entry-modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('entry-modal').style.display = 'none'; }

    async function deleteDiary() {
        if(!confirm("この日の記録を削除しますか？")) return;
        await db.collection('users').doc(auth.currentUser.uid).collection('diaries').doc(selectedDate).delete();
        closeModal(); loadData();
    }

    async function saveDiary() {
        const btn = document.getElementById('save-btn'); btn.disabled = true;
        const menu = document.getElementById('menu-select').value;
        let dist = 0, detail = "";

        if(menu==='ジョグ') {
            dist = parseFloat(document.getElementById('jog-dist').value)||0;
        } else if(menu==='タイムトライアル') {
            dist = parseFloat(document.getElementById('tt-dist').value)||0;
            detail = `${document.getElementById('tt-min').value}:${document.getElementById('tt-sec').value.padStart(2,'0')}.${document.getElementById('tt-msec').value}`;
        } else if(menu==='インターバル') {
            dist = (parseFloat(document.getElementById('int-dist').value)||0) * (parseInt(document.getElementById('int-count').value)||0);
            detail = `${document.getElementById('int-count').value}本`;
        } else if(menu==='ビルドアップ') {
            dist = parseFloat(document.getElementById('bu-dist').value)||0;
        } else if(menu==='レスト') {
            detail = document.getElementById('rest-memo').value;
        } else if(menu==='その他') {
            dist = parseFloat(document.getElementById('other-dist').value)||0;
            detail = document.getElementById('other-memo').value;
        }

        let weather = "☁️--";
        try {
            let lat, lon;
            if (document.querySelector('input[name="loc-type"]:checked').value === 'gps') {
                const pos = await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:5000}));
                lat = pos.coords.latitude; lon = pos.coords.longitude;
            } else {
                const city = document.getElementById('loc-manual-input').value;
                const gRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`);
                const gData = await gRes.json();
                lat = gData.results[0].latitude; lon = gData.results[0].longitude;
            }
            const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=weathercode,temperature_2m&start_date=${selectedDate}&end_date=${selectedDate}&timezone=Asia%2FTokyo`);
            const wData = await wRes.json();
            const hour = parseInt(document.getElementById('start-time').value.split(':')[0]);
            const icons = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",61:"☔",95:"⚡"};
            weather = (icons[wData.hourly.weathercode[hour]] || "☁️") + Math.round(wData.hourly.temperature_2m[hour]) + "℃";
        } catch(e) { log("Weather skip: " + e.message); }

        await db.collection('users').doc(auth.currentUser.uid).collection('diaries').doc(selectedDate).set({
            date: selectedDate, type: menu, dist: dist.toFixed(2), detail: detail, weather: weather,
            time: document.getElementById('start-time').value
        });

        btn.disabled = false; closeModal(); loadData();
    }
</script>
</body>
</html>
